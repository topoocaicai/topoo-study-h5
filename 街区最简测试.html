<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>拓圈·街区·最简测试</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0A1020;overflow:hidden;font-family:-apple-system,"PingFang SC",sans-serif}
#c{display:block;width:100%;height:100%}
#err{position:fixed;inset:0;background:rgba(10,16,32,0.95);color:#E89090;display:none;align-items:center;justify-content:center;padding:30px;font-size:13px;text-align:center;z-index:999;line-height:2;white-space:pre-wrap}
#ok{position:fixed;inset:0;background:rgba(10,16,32,0.95);color:#A0B87A;display:none;align-items:center;justify-content:center;z-index:999;font-size:18px;letter-spacing:2px}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="err"></div>
<div id="ok"></div>

<script src="three.min.js"></script>
<script>
// 把所有错误都捕获并显示在页面标题和#err div里
function showErr(msg){
    document.title='ERROR: '+msg.substring(0,50);
    var el=document.getElementById('err');
    el.style.display='flex';
    el.textContent=msg;
}
// 全局错误捕获
window.onerror=function(m,u,l,c,e){
    showErr('JS错误:\n'+m+'\n行:'+l+'\nURL:'+(u||'inline'));
    return true;
};
window.addEventListener('error',function(e){showErr('Error:'+e.message);});
document.title='1. 开始加载...';

try {
    document.title='2. 检查WebGL...';
    var testCv=document.createElement('canvas');
    var gl=testCv.getContext('webgl2')||testCv.getContext('webgl');
    if(!gl){showErr('WebGL不支持');throw new Error('No WebGL');}
    document.title='3. WebGL OK, THREE='+(typeof THREE!=='undefined'?'YES':'NO');
    
    if(typeof THREE==='undefined'){showErr('THREE.js未加载！请确认three.min.js在同一文件夹');throw new Error('No THREE');}
    
    document.title='4. 创建场景...';
    var scn=new THREE.Scene();
    scn.background=new THREE.Color(0x0A1020);
    
    document.title='5. 创建相机...';
    var cam=new THREE.PerspectiveCamera(50,innerWidth/innerHeight,0.1,800);
    cam.position.set(0,20,30);
    cam.lookAt(0,0,0);
    
    document.title='6. 创建渲染器...';
    var ren=new THREE.WebGLRenderer({canvas:document.getElementById('c'),antialias:true});
    ren.setSize(innerWidth,innerHeight);
    ren.setPixelRatio(Math.min(devicePixelRatio||1,2));
    document.title='6b. 渲染器创建成功';
    
    document.title='7. 添加灯光...';
    scn.add(new THREE.AmbientLight(0xffffff,0.6));
    var dLight=new THREE.DirectionalLight(0xffffff,0.8);
    dLight.position.set(10,20,10);
    scn.add(dLight);
    document.title='7b. 灯光添加成功';
    
    document.title='8. 创建地面...';
    var ground=new THREE.Mesh(
        new THREE.PlaneGeometry(100,100),
        new THREE.MeshStandardMaterial({color:0x1A2A3A})
    );
    ground.rotation.x=-Math.PI/2;
    ground.receiveShadow=true;
    scn.add(ground);
    
    document.title='9. 创建测试建筑（1个方块）...';
    var building=new THREE.Mesh(
        new THREE.BoxGeometry(6,10,6),
        new THREE.MeshStandardMaterial({color:0x4A9EB8})
    );
    building.position.y=5;
    building.castShadow=true;
    building.receiveShadow=true;
    scn.add(building);
    
    document.title='10. 创建文字纹理...';
    var cv2=document.createElement('canvas');
    cv2.width=256;cv2.height=128;
    var ctx=cv2.getContext('2d');
    ctx.fillStyle='#1A1208';ctx.fillRect(0,0,256,128);
    ctx.strokeStyle='#D4A040';ctx.lineWidth=3;ctx.strokeRect(5,5,246,118);
    ctx.fillStyle='#D4A040';ctx.font='bold 20px sans-serif';ctx.textAlign='center';
    ctx.fillText('蛋生壹号街区',128,55);
    ctx.fillStyle='#FFCC66';ctx.font='14px sans-serif';
    ctx.fillText('测试建筑',128,85);
    var tex=new THREE.CanvasTexture(cv2);
    var sign=new THREE.Mesh(
        new THREE.PlaneGeometry(3,1.5),
        new THREE.MeshBasicMaterial({map:tex,transparent:true,side:THREE.DoubleSide})
    );
    sign.position.set(0,11,3.2);
    scn.add(sign);
    document.title='10b. 文字纹理创建成功';
    
    document.title='11. 开始渲染循环...';
    function animate(){
        requestAnimationFrame(animate);
        building.rotation.y+=0.005;
        ren.render(scn,cam);
    }
    animate();
    document.title='12. 完成！旋转建筑中...';
    
    // 3秒后显示成功
    setTimeout(function(){
        document.getElementById('ok').style.display='flex';
        document.getElementById('ok').textContent='✓ 3D渲染成功！旋转建筑中...';
        setTimeout(function(){document.getElementById('ok').style.display='none';},3000);
    },1000);
    
} catch(e) {
    showErr('捕获到错误:\n'+e.message+'\n堆栈:\n'+(e.stack||'无'));
    document.title='ERROR: '+e.message;
}
</script>
</body>
</html>
