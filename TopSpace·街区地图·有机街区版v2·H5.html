<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>TopSpace · 街区地图</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#F5F0E8;font-family:-apple-system,"PingFang SC","Helvetica Neue",sans-serif;overflow:hidden;height:100vh;width:100vw;touch-action:none;-webkit-user-select:none;user-select:none;-webkit-tap-highlight-color:transparent}
canvas{display:block;width:100%;height:100%}
.info-panel{position:fixed;bottom:0;left:0;right:0;z-index:100;background:rgba(245,240,232,0.97);border-top:1px solid rgba(42,42,62,0.10);border-radius:20px 20px 0 0;padding:20px 20px calc(20px + env(safe-area-inset-bottom,0px));transform:translateY(100%);transition:transform 0.35s cubic-bezier(0.4,0,0.2,1);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px)}
.info-panel.show{transform:translateY(0)}
.info-header{display:flex;align-items:center;gap:12px;margin-bottom:10px}
.info-avatar{width:48px;height:48px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:26px;flex-shrink:0}
.info-name{font-size:17px;font-weight:700;color:#1A1A1A;line-height:1.3}
.info-type{font-size:12px;margin-top:2px;letter-spacing:0.5px}
.info-desc{font-size:13px;color:rgba(26,26,26,0.55);line-height:1.6;margin-top:8px}
.hint{position:fixed;top:0;left:0;right:0;z-index:90;text-align:center;padding:12px;font-size:12px;color:rgba(26,26,26,0.3);letter-spacing:1px;pointer-events:none;transition:opacity 0.5s}
</style>
</head>
<body>

<div class="hint" id="hint">单指拖动 · 双指缩放 · 点击门牌查看</div>
<canvas id="mapCanvas"></canvas>

<div class="info-panel" id="infoPanel">
  <div class="info-header">
    <div class="info-avatar" id="infoAvatar"></div>
    <div>
      <div class="info-name" id="infoName">—</div>
      <div class="info-type" id="infoType">—</div>
    </div>
  </div>
  <div class="info-desc" id="infoDesc">点击地图其他位置关闭</div>
</div>

<script>
// ============================================================
//  TopSpace 街区地图 —— 有机街区版 v2
//  核心：地块大小随机合并 / 颜色错落有致 / 门牌颜色够实
//  VI：底#F5F0E8   文字#1A1A1A
//  五色：火#D96B6B  水#4A9EB8  木#A0B87A  金#E8B44C  土#9B7BBF
// ============================================================

var ELEM = {
  fire:  {c:'#D96B6B', label:'🔥 火·门店型', desc:'烟火气聚集地，线下体验空间'},
  water: {c:'#4A9EB8', label:'💧 水·内容型', desc:'无形流淌，触达每个角落'},
  wood:  {c:'#A0B87A', label:'🌱 木·产品型', desc:'从种子到果实，生长可见'},
  metal: {c:'#E8B44C', label:'⚙️ 金·服务型', desc:'高价值硬通货，专业交付'},
  earth: {c:'#9B7BBF', label:'🌍 土·活动型', desc:'承载万物的地基，连接你我'}
};
var ELEM_KEYS = ['fire','water','wood','metal','earth'];

// ===== 有机地块生成 =====
// 策略：先铺网格，再随机合并相邻 cell，制造大小不一＋随性排列
var GRID_COLS = 7;
var GRID_ROWS = 6;
var CELL_W = 110;
var CELL_H = 95;
var GAP = 18;  // 街道宽度

// 每个格子的 block 编号
var cellBlock = [];
var blocks = [];
var blockIdCounter = 0;

for (var r = 0; r < GRID_ROWS; r++) {
  cellBlock[r] = [];
  for (var c = 0; c < GRID_COLS; c++) {
    cellBlock[r][c] = blockIdCounter;
    blocks.push({ cells: [[r,c]], dead: false });
    blockIdCounter++;
  }
}

// 随机合并相邻 cell（40% 概率），制造大小不一的地块
var mergeTries = Math.floor(GRID_COLS * GRID_ROWS * 0.40);
for (var t = 0; t < mergeTries; t++) {
  var rr = Math.floor(Math.random() * GRID_ROWS);
  var cc = Math.floor(Math.random() * GRID_COLS);
  // 随机向右或向下合并
  var dr = 0, dc = 0;
  if (Math.random() < 0.5) { dc = 1; } else { dr = 1; }
  if (rr + dr >= GRID_ROWS || cc + dc >= GRID_COLS) continue;
  var idA = cellBlock[rr][cc];
  var idB = cellBlock[rr+dr][cc+dc];
  if (idA === idB) continue;
  // 把 idB 的所有 cell 合并到 idA
  for (var r2 = 0; r2 < GRID_ROWS; r2++) {
    for (var c2 = 0; c2 < GRID_COLS; c2++) {
      if (cellBlock[r2][c2] === idB) {
        cellBlock[r2][c2] = idA;
        blocks[idA].cells.push([r2,c2]);
      }
    }
  }
  blocks[idB].dead = true;
}

// 整理有效 block，计算 bounding box，分配属性
var liveBlocks = [];
for (var i = 0; i < blocks.length; i++) {
  if (blocks[i].dead) continue;
  var cells = blocks[i].cells;
  var minR = GRID_ROWS, maxR = 0, minC = GRID_COLS, maxC = 0;
  for (var j = 0; j < cells.length; j++) {
    minR = Math.min(minR, cells[j][0]);
    maxR = Math.max(maxR, cells[j][0]);
    minC = Math.min(minC, cells[j][1]);
    maxC = Math.max(maxC, cells[j][1]);
  }
  var bx = minC * (CELL_W + GAP) + GAP;
  var by = minR * (CELL_H + GAP) + GAP;
  var bw = (maxC - minC + 1) * CELL_W + (maxC - minC) * GAP;
  var bh = (maxR - minR + 1) * CELL_H + (maxR - minR) * GAP;

  // 五行属性随机（相邻块可能同色，更有机）
  var ek = ELEM_KEYS[Math.floor(Math.random()*5)];
  // 颜色深浅：0.15 ~ 1.0 （错落有致）
  var depth = 0.15 + Math.random() * 0.85;

  liveBlocks.push({
    x: bx, y: by, w: bw, h: bh,
    elem: ek,
    depth: depth,
    // 门牌位置：在 block 内部随机偏移
    nx: bx + bw * (0.2 + Math.random()*0.6),
    ny: by + bh * (0.2 + Math.random()*0.6),
    // 手绘感：边框微微歪斜
    skew: (Math.random()-0.5) * 5,
    visited: Math.random() < 0.58,
    name: '',
    emoji: ''
  });
}

// 重新映射 cellBlock → liveBlocks 索引
var blockRemap = {};
var liveIdx = 0;
for (var i = 0; i < blocks.length; i++) {
  if (!blocks[i].dead) {
    blockRemap[i] = liveIdx++;
  }
}
for (var r = 0; r < GRID_ROWS; r++) {
  for (var c = 0; c < GRID_COLS; c++) {
    cellBlock[r][c] = blockRemap[cellBlock[r][c]];
  }
}

// ===== 分配名称和 Emoji =====
var NAMES = [
  '星尘','流光','青木','金石','厚土','晨露','焱焰','碧藤','银铃','琥珀',
  '极光','赤松','云归','霜降','岚烟','墨染','月蚀','星轨','潮汐','萤火',
  '破晓','暮色','归鸿','逝川','空镜','浮岛','晚祷','迷迭','霜天','半夏',
  '长风','微澜','寒烟','素履','清欢','南风','北望','东篱','西洲','中岳'
];
var EMOJIS = [
  '🌙','✨','🌿','💎','⛰️','💧','🔥','🌱','⚙️','🌍',
  '🌈','🎋','⛰️','🌊','🍂','🗿','🌾','🔮','🎐','💫',
  '🦊','🐉','🦉','🐚','🌺','🌸','🍂️','🌻','🌷','🌹',
  '⚗️','🧪','🧬','📡','🔬','🔧','⚙️','🛠️','🧰','💊'
];
for (var i = 0; i < liveBlocks.length; i++) {
  liveBlocks[i].name  = NAMES[i % NAMES.length];
  liveBlocks[i].emoji = EMOJIS[i % EMOJIS.length];
}

// ===== 世界尺寸 =====
var WORLD_W = GRID_COLS * CELL_W + (GRID_COLS + 1) * GAP + 60;
var WORLD_H = GRID_ROWS * CELL_H + (GRID_ROWS + 1) * GAP + 60;

// ===== Canvas 初始化 =====
var canvas = document.getElementById('mapCanvas');
var ctx;
var W, H, dpr;
var viewX = WORLD_W / 2;
var viewY = WORLD_H / 2;
var zoom = 1;

function resize() {
  dpr = window.devicePixelRatio || 1;
  W = window.innerWidth;
  H = window.innerHeight;
  canvas.width  = W * dpr;
  canvas.height = H * dpr;
  canvas.style.width  = W + 'px';
  canvas.style.height = H + 'px';
  ctx = canvas.getContext('2d');
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}

function init() {
  resize();
  requestAnimationFrame(loop);
}
if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', init);
} else {
  init();
}
window.addEventListener('load', function(){ resize(); });
window.addEventListener('resize', resize);

// ===== 坐标转换 =====
function toScreen(wx, wy) {
  return {
    x: W/2 + (wx - viewX) * zoom,
    y: H/2 + (wy - viewY) * zoom
  };
}

// ===== hex → rgba 工具 =====
function hexRGB(hex) {
  return [
    parseInt(hex.slice(1,3), 16),
    parseInt(hex.slice(3,5), 16),
    parseInt(hex.slice(5,7), 16)
  ];
}
function rgba(hex, a) {
  var c = hexRGB(hex);
  return 'rgba(' + c[0] + ',' + c[1] + ',' + c[2] + ',' + a.toFixed(2) + ')';
}

// ===== 触摸 / 鼠标控制 =====
var touching = false;
var pinching = false;
var tx0=0, ty0=0, vx0=0, vy0=0;
var pinchDist0=0, pinchZoom0=1;

canvas.addEventListener('touchstart', function(e) {
  e.preventDefault();
  if (e.touches.length === 1) {
    touching = true;
    pinching = false;
    tx0 = e.touches[0].clientX;
    ty0 = e.touches[0].clientY;
    vx0 = viewX;
    vy0 = viewY;
  } else if (e.touches.length === 2) {
    pinching = true;
    touching = false;
    var dx = e.touches[1].clientX - e.touches[0].clientX;
    var dy = e.touches[1].clientY - e.touches[0].clientY;
    pinchDist0 = Math.sqrt(dx*dx + dy*dy);
    pinchZoom0 = zoom;
  }
}, {passive: false});

canvas.addEventListener('touchmove', function(e) {
  e.preventDefault();
  if (pinching && e.touches.length === 2) {
    var dx = e.touches[1].clientX - e.touches[0].clientX;
    var dy = e.touches[1].clientY - e.touches[0].clientY;
    var dist = Math.sqrt(dx*dx + dy*dy);
    zoom = Math.max(0.2, Math.min(3, pinchZoom0 * dist / pinchDist0));
  } else if (touching && e.touches.length === 1) {
    viewX = vx0 - (e.touches[0].clientX - tx0) / zoom;
    viewY = vy0 - (e.touches[0].clientY - ty0) / zoom;
  }
}, {passive: false});

canvas.addEventListener('touchend', function() {
  touching = false;
  pinching = false;
});

// 鼠标
var mDown = false, mx0=0, my0=0, mvx0=0, mvy0=0;
canvas.addEventListener('mousedown', function(e) {
  mDown = true;
  mx0 = e.clientX;
  my0 = e.clientY;
  mvx0 = viewX;
  mvy0 = viewY;
});
canvas.addEventListener('mousemove', function(e) {
  if (!mDown) return;
  viewX = mvx0 - (e.clientX - mx0) / zoom;
  viewY = mvy0 - (e.clientY - my0) / zoom;
});
canvas.addEventListener('mouseup',   function(){ mDown=false; });
canvas.addEventListener('mouseleave', function(){ mDown=false; });
canvas.addEventListener('wheel', function(e) {
  e.preventDefault();
  zoom = Math.max(0.2, Math.min(3, zoom * (e.deltaY > 0 ? 0.92 : 1.08)));
}, {passive: false});

// ===== 点击检测 =====
canvas.addEventListener('click', function(e) {
  document.getElementById('hint').style.opacity = '0';
  var closest = -1, best = 40;
  for (var i = 0; i < liveBlocks.length; i++) {
    var p = toScreen(liveBlocks[i].nx, liveBlocks[i].ny);
    var dx = e.clientX - p.x;
    var dy = e.clientY - p.y;
    var d  = Math.sqrt(dx*dx + dy*dy);
    if (d < best) { closest = i; best = d; }
  }
  if (closest >= 0) {
    showInfo(closest);
  } else {
    document.getElementById('infoPanel').classList.remove('show');
  }
});

function showInfo(idx) {
  var b  = liveBlocks[idx];
  var ec = ELEM[b.elem];
  document.getElementById('infoAvatar').style.background = rgba(ec.c, 0.18);
  document.getElementById('infoAvatar').textContent  = b.emoji;
  document.getElementById('infoName').textContent    = b.name;
  document.getElementById('infoType').textContent    = ec.label;
  document.getElementById('infoType').style.color   = ec.c;
  document.getElementById('infoDesc').textContent    = ec.desc;
  document.getElementById('infoPanel').classList.add('show');
}

document.addEventListener('click', function(e) {
  var p = document.getElementById('infoPanel');
  if (!p.contains(e.target) && e.target !== canvas) {
    p.classList.remove('show');
  }
});

// ===== 渲染循环 =====
function loop() {
  requestAnimationFrame(loop);
  render();
}

function render() {
  if (!ctx || !W || !H) return;
  ctx.clearRect(0, 0, W, H);
  ctx.fillStyle = '#F5F0E8';
  ctx.fillRect(0, 0, W, H);

  var r0 = Math.max(7, 12 * zoom);

  // —— 1. 画地块 ——
  for (var i = 0; i < liveBlocks.length; i++) {
    var b  = liveBlocks[i];
    var ec = ELEM[b.elem];
    var sk = b.skew;
    var d  = b.depth;  // 0.15~1.0

    // 四个角（手绘偏移，每个角不同）
    var ox = [ sk*0.6, -sk*0.4,  sk*0.5, -sk*0.5];
    var oy = [-sk*0.4,  sk*0.3,  sk*0.6, -sk*0.3];
    var corners = [
      toScreen(b.x + ox[0],           b.y + oy[0]),
      toScreen(b.x + b.w + ox[1],     b.y + oy[1]),
      toScreen(b.x + b.w + ox[2],     b.y + b.h + oy[2]),
      toScreen(b.x + ox[3],           b.y + b.h + oy[3])
    ];

    // 裁剪：完全在屏幕外则跳过
    var allOut = true;
    for (var c = 0; c < 4; c++) {
      if (corners[c].x > -60 && corners[c].x < W+60 && corners[c].y > -60 && corners[c].y < H+60) {
        allOut = false;
        break;
      }
    }
    if (allOut) continue;

    ctx.beginPath();
    ctx.moveTo(corners[0].x, corners[0].y);
    for (var c = 1; c < 4; c++) ctx.lineTo(corners[c].x, corners[c].y);
    ctx.closePath();

    if (b.visited) {
      // 地块底色：随 depth 变化，0.06~0.16
      ctx.fillStyle = rgba(ec.c, 0.05 + d * 0.12);
    } else {
      ctx.fillStyle = 'rgba(42,42,62,0.022)';
    }
    ctx.fill();

    // 地块边框：手绘虚线，深浅随 depth
    ctx.strokeStyle = rgba(ec.c, 0.06 + d * 0.14);  // 0.10~0.50
    ctx.lineWidth = 1;
    ctx.setLineDash([4 + Math.abs(sk)*1.2, 3]);
    ctx.stroke();
    ctx.setLineDash([]);
  }

  // —— 2. 画街道（地块之间的间隙，淡淡的手绘横线/竖线）——
  ctx.lineCap = 'round';
  // 水平街道
  for (var row = 0; row <= GRID_ROWS; row++) {
    var sy = GAP + row * (CELL_H + GAP) - GAP / 2;
    if (sy < -20 || sy > WORLD_H + 20) continue;
    var p1 = toScreen(-20, sy);
    var p2 = toScreen(WORLD_W + 20, sy);
    if (p1.y > -15 && p1.y < H + 15) {
      ctx.strokeStyle = 'rgba(42,42,62,0.052)';
      ctx.lineWidth   = Math.max(1, 1.2 * zoom);
      ctx.beginPath();
      ctx.moveTo(Math.max(-30, p1.x), p1.y);
      ctx.lineTo(Math.min(W+30, p2.x), p2.y);
      ctx.stroke();
    }
  }
  // 垂直街道
  for (var col = 0; col <= GRID_COLS; col++) {
    var sx = GAP + col * (CELL_W + GAP) - GAP / 2;
    if (sx < -20 || sx > WORLD_W + 20) continue;
    var p1 = toScreen(sx, -20);
    var p2 = toScreen(sx, WORLD_H + 20);
    if (p1.x > -15 && p1.x < W + 15) {
      ctx.strokeStyle = 'rgba(42,42,62,0.052)';
      ctx.lineWidth   = Math.max(1, 1.2 * zoom);
      ctx.beginPath();
      ctx.moveTo(p1.x, Math.max(-30, p1.y));
      ctx.lineTo(p2.x, Math.min(H+30, p2.y));
      ctx.stroke();
    }
  }

  // —— 3. 画门牌之间的连接细线 ——
  ctx.lineCap = 'round';
  // 水平相邻 block 之间
  for (var r = 0; r < GRID_ROWS; r++) {
    for (var c = 0; c < GRID_COLS - 1; c++) {
      var ba = liveBlocks[cellBlock[r][c]];
      var bb = liveBlocks[cellBlock[r][c+1]];
      if (!ba || !bb || ba === bb) continue;
      var pa = toScreen(ba.nx, ba.ny);
      var pb = toScreen(bb.nx, bb.ny);
      ctx.strokeStyle = 'rgba(42,42,62,0.060)';
      ctx.lineWidth   = Math.max(1, 1.0 * zoom);
      ctx.beginPath();
      ctx.moveTo(pa.x, pa.y);
      ctx.lineTo(pb.x, pb.y);
      ctx.stroke();
    }
  }
  // 垂直相邻 block 之间
  for (var c = 0; c < GRID_COLS; c++) {
    for (var r = 0; r < GRID_ROWS - 1; r++) {
      var ba = liveBlocks[cellBlock[r][c]];
      var bb = liveBlocks[cellBlock[r+1][c]];
      if (!ba || !bb || ba === bb) continue;
      var pa = toScreen(ba.nx, ba.ny);
      var pb = toScreen(bb.nx, bb.ny);
      ctx.strokeStyle = 'rgba(42,42,62,0.060)';
      ctx.lineWidth   = Math.max(1, 1.0 * zoom);
      ctx.beginPath();
      ctx.moveTo(pa.x, pa.y);
      ctx.lineTo(pb.x, pb.y);
      ctx.stroke();
    }
  }

  // —— 4. 画节点（门牌）—— 颜色要实！——
  for (var i = 0; i < liveBlocks.length; i++) {
    var b  = liveBlocks[i];
    var p  = toScreen(b.nx, b.ny);
    if (p.x < -40 || p.x > W+40 || p.y < -40 || p.y > H+40) continue;

    var r  = r0;
    var ec = ELEM[b.elem];
    var d  = b.depth;

    if (b.visited) {
      // 外圈光晕（浅）
      ctx.fillStyle = rgba(ec.c, 0.09 + d * 0.11);  // 0.20 ~ 1.00 → 实际 0.09~0.20
      ctx.beginPath();
      ctx.arc(p.x, p.y, r + 5, 0, Math.PI * 2);
      ctx.fill();

      // 门牌底色 —— 够实！0.28 ~ 0.68
      ctx.fillStyle = rgba(ec.c, 0.28 + d * 0.40);
      ctx.beginPath();
      ctx.arc(p.x, p.y, r, 0, Math.PI * 2);
      ctx.fill();

      // 门牌边框 —— 0.45 ~ 0.95
      ctx.strokeStyle = rgba(ec.c, 0.45 + d * 0.50);
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.arc(p.x, p.y, r, 0, Math.PI * 2);
      ctx.stroke();

      // emoji
      ctx.font = (r * 1.3) + 'px sans-serif';
      ctx.textAlign    = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(b.emoji, p.x, p.y);

    } else {
      // 未探索：虚线圆圈
      ctx.strokeStyle = 'rgba(42,42,62,0.13)';
      ctx.lineWidth = 1;
      ctx.setLineDash([3, 4]);
      ctx.beginPath();
      ctx.arc(p.x, p.y, r, 0, Math.PI * 2);
      ctx.stroke();
      ctx.setLineDash([]);

      ctx.globalAlpha = 0.13;
      ctx.font = (r * 1.0) + 'px sans-serif';
      ctx.textAlign    = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillStyle = 'rgba(26,26,26,0.4)';
      ctx.fillText(b.emoji, p.x, p.y);
      ctx.globalAlpha = 1;
    }
  }
}
</script>
</body>
</html>
