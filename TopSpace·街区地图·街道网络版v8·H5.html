<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>TopSpace · 街区地图</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#F5F0E8;font-family:-apple-system,"PingFang SC","Helvetica Neue",sans-serif;overflow:hidden;height:100vh;width:100vw;touch-action:none;-webkit-user-select:none;user-select:none;-webkit-tap-highlight-color:transparent}
canvas{display:block;width:100%;height:100%}
.hint{position:fixed;top:0;left:0;right:0;z-index:90;text-align:center;padding:13px;font-size:12px;color:rgba(26,26,26,0.28);letter-spacing:1px;pointer-events:none;transition:opacity 0.5s}
.info-panel{position:fixed;bottom:0;left:0;right:0;z-index:100;background:rgba(245,240,232,0.97);border-top:1px solid rgba(42,42,62,0.10);border-radius:20px 20px 0 0;padding:20px 20px calc(20px + env(safe-area-inset-bottom,0px));transform:translateY(100%);transition:transform 0.35s cubic-bezier(0.4,0,0.2,1);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px)}
.info-panel.show{transform:translateY(0)}
.info-header{display:flex;align-items:center;gap:12px;margin-bottom:10px}
.info-avatar{width:52px;height:52px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:28px;flex-shrink:0}
.info-name{font-size:17px;font-weight:700;color:#1A1A1A;line-height:1.3}
.info-id{font-size:12px;color:rgba(26,26,26,0.40);font-family:"SF Mono","Menlo",monospace;margin-top:2px;letter-spacing:1px}
.info-type{font-size:12px;margin-top:2px;letter-spacing:0.5px}
.info-desc{font-size:13px;color:rgba(26,26,26,0.55);line-height:1.6;margin-top:8px}
</style>
</head>
<body>

<div class="hint" id="hint">单指拖动 · 双指缩放 · 点击门牌查看</div>
<canvas id="mapCanvas"></canvas>

<div class="info-panel" id="infoPanel">
  <div class="info-header">
    <div class="info-avatar" id="infoAvatar"></div>
    <div>
      <div class="info-name" id="infoName">—</div>
      <div class="info-id"   id="infoId"></div>
      <div class="info-type" id="infoType">—</div>
    </div>
  </div>
  <div class="info-desc" id="infoDesc">点击地图其他位置关闭</div>
</div>

<script>
// ============================================================
//  TopSpace 街区地图 —— 街道网络版 v8（逻辑正确精简版）
//  核心逻辑：
//    1. 每个cell独立，grid[r][c] = blockId
//    2. hStreet[r][c] = 横向街道存在？
//       vStreet[r][c] = 纵向街道存在？
//    3. 合并时：grid合并 + 街道删除
//    4. 渲染：先画街道灰色底 → 再画每个cell色块（有间隙）
//      同block的cell颜色相同 → 视觉上连成一片
//      街道虚线只画hStreet/vStreet=true的位置
//  VI：底#F5F0E8   文字#1A1A1A
//  五色：火#D96B6B  水#4A9EB8  木#A0B87A  金#E8B44C  土#9B7BBF
// ============================================================

var ELEM = {
  fire:  {c:'#D96B6B', label:'火 · 门店型', desc:'烟火气聚集地，线下体验空间', emoji:'🔥'},
  water: {c:'#4A9EB8', label:'水 · 内容型', desc:'无形流淌，触达每个角落', emoji:'💧'},
  wood:  {c:'#A0B87A', label:'木 · 产品型', desc:'从种子到果实，生长可见', emoji:'🌱'},
  metal: {c:'#E8B44C', label:'金 · 服务型', desc:'高价值硬通货，专业交付', emoji:'⚙️'},
  earth: {c:'#9B7BBF', label:'土 · 活动型', desc:'承载万物的地基，连接你我', emoji:'🌍'}
};
var ELEM_KEYS = ['fire','water','wood','metal','earth'];

// ===== 参数 =====
var COLS = 8, ROWS = 6;
var CELL = 110;           // 每格尺寸
var STREET = 14;         // 街道宽度
var ALLEY = 6;           // 超大块内部小巷宽度

// ===== 数据结构 =====
// grid[r][c] = blockId（哪个block拥有这个cell）
// blockById[blockId] = { elem, depth, visited, cells, ... }
// hStreet[r][c] : 第r行与第r+1行之间、第c列位置是否有横向街道
// vStreet[r][c] : 第c列与第c+1列之间、第r行位置是否有纵向街道

var grid = [];
var hStreet = [];
var vStreet = [];
var blockById = {};
var nextBid = 0;

// 初始化：每个cell一个block，所有街道存在
for (var r = 0; r < ROWS; r++) {
  grid[r] = [];
  hStreet[r] = [];
  vStreet[r] = [];
  for (var c = 0; c < COLS; c++) {
    grid[r][c] = nextBid;
    blockById[nextBid] = {
      id: nextBid,
      elem: ELEM_KEYS[Math.floor(Math.random()*5)],
      depth: 0.2 + Math.random() * 0.8,
      visited: Math.random() < 0.55,
      hasAlley: false,
      alleyDir: '',
      cells: [[r,c]],
      dead: false
    };
    nextBid++;
    // 街道初始都存在
    hStreet[r][c] = true;
    vStreet[r][c] = true;
  }
}
// 边界外无街道
for (var c = 0; c < COLS; c++) { hStreet[ROWS-1][c] = false; }
for (var r = 0; r < ROWS; r++) { vStreet[r][COLS-1] = false; }

// ===== 合并函数 =====
function mergeCells(ra, ca, rb, cb) {
  // 将cell (rb,cb)合并到cell (ra,ca)的block
  var idA = grid[ra][ca];
  var idB = grid[rb][cb];
  if (idA === idB) return;
  if (blockById[idA].dead || blockById[idB].dead) return;
  // 删除它们之间的街道
  if (rb === ra && cb === ca+1) { vStreet[ra][ca] = false; }
  else if (rb === ra+1 && cb === ca) { hStreet[ra][ca] = false; }
  else if (rb === ra+1 && cb === ca+1) { vStreet[ra][ca] = false; hStreet[ra][ca] = false; }
  // 将idB所有cell合并到idA
  for (var r2 = 0; r2 < ROWS; r2++) {
    for (var c2 = 0; c2 < COLS; c2++) {
      if (grid[r2][c2] === idB) {
        grid[r2][c2] = idA;
        blockById[idA].cells.push([r2,c2]);
      }
    }
  }
  blockById[idB].dead = true;
}

// ===== 执行合并 =====
var MERGE_TRIES = Math.floor(COLS * ROWS * 0.38);
for (var t = 0; t < MERGE_TRIES; t++) {
  var rr = Math.floor(Math.random() * ROWS);
  var cc = Math.floor(Math.random() * COLS);
  var dr = 0, dc = 0;
  var rnd = Math.random();
  if (rnd < 0.40)      { dc = 1; }
  else if (rnd < 0.80) { dr = 1; }
  else                   { dr = 1; dc = 1; }
  if (rr + dr >= ROWS || cc + dc >= COLS) continue;
  mergeCells(rr, cc, rr+dr, cc+dc);
}

// 超大块加内部小巷
for (var bid in blockById) {
  var b = blockById[bid];
  if (b.dead) continue;
  if (b.cells.length >= 4 && Math.random() < 0.5) {
    b.hasAlley = true;
    b.alleyDir = Math.random() < 0.5 ? 'H' : 'V';
  }
}

// ===== 整理存活block列表 =====
var liveBlocks = [];
var bidList = [];
for (var bid in blockById) {
  if (!blockById[bid].dead) bidList.push(parseInt(bid));
}
bidList.sort(function(a,b){return a-b;});
for (var i = 0; i < bidList.length; i++) {
  var b = blockById[bidList[i]];
  // 分配名字
  b.name = ['星尘','流光','青木','金石','厚土','晨露','焱焰','碧藤','银铃','琥珀','极光','赤松','云归','霜降','岚烟','墨染','月蚀','星轨','潮汐','萤火','破晓','暮色','归鸿','逝川','空镜','浮岛','晚祷','迷迭','霜天','半夏','长风','微澜','寒烟','素履','清欢','南风','北望','东篱','西洲','中岳'][i % 40];
  b.idStr = (1001 + i).toString();
  // 门牌位置：在地块边缘（先计算像素坐标后确定）
  b.doorEdge = ['top','bottom','left','right'][Math.floor(Math.random()*4)];
  liveBlocks.push(b);
}

// ===== 像素坐标工具 =====
function cellX(c) { return c * (CELL + STREET) + STREET; }
function cellY(r) { return r * (CELL + STREET) + STREET; }

// 计算block的像素bounding box（考虑消失的街道）
function blockRect(b) {
  var cells = b.cells;
  var minR=ROWS, maxR=-1, minC=COLS, maxC=-1;
  for (var i = 0; i < cells.length; i++) {
    minR = Math.min(minR, cells[i][0]);
    maxR = Math.max(maxR, cells[i][0]);
    minC = Math.min(minC, cells[i][1]);
    maxC = Math.max(maxC, cells[i][1]);
  }
  var x = cellX(minC);
  var y = cellY(minR);
  // 宽度：cells总宽 + 内部街道数*STREET
  var w = (maxC - minC + 1) * CELL;
  for (var c = minC; c < maxC; c++) {
    // 检查这一列间隙是否有纵向街道（只要该间隙中任意一行有街道，就有间隙）
    var has = false;
    for (var r = minR; r <= maxR; r++) {
      if (vStreet[r] && vStreet[r][c]) { has = true; break; }
    }
    if (has) w += STREET;
  }
  // 高度
  var h = (maxR - minR + 1) * CELL;
  for (var r = minR; r < maxR; r++) {
    var has = false;
    for (var c = minC; c <= maxC; c++) {
      if (hStreet[r] && hStreet[r][c]) { has = true; break; }
    }
    if (has) h += STREET;
  }
  return {x:x, y:y, w:w, h:h};
}

// 为每个block计算门牌位置
for (var i = 0; i < liveBlocks.length; i++) {
  var b = liveBlocks[i];
  var rect = blockRect(b);
  b.rect = rect;
  var m = 12;
  if (b.doorEdge === 'top') {
    b.doorX = rect.x + rect.w * (0.2 + Math.random()*0.6);
    b.doorY = rect.y + m;
  } else if (b.doorEdge === 'bottom') {
    b.doorX = rect.x + rect.w * (0.2 + Math.random()*0.6);
    b.doorY = rect.y + rect.h - m;
  } else if (b.doorEdge === 'left') {
    b.doorX = rect.x + m;
    b.doorY = rect.y + rect.h * (0.2 + Math.random()*0.6);
  } else {
    b.doorX = rect.x + rect.w - m;
    b.doorY = rect.y + rect.h * (0.2 + Math.random()*0.6);
  }
}

// ===== 世界尺寸 =====
var WORLD_W = COLS * CELL + (COLS+1) * STREET + 40;
var WORLD_H = ROWS * CELL + (ROWS+1) * STREET + 40;

// ===== Canvas =====
var canvas = document.getElementById('mapCanvas');
var ctx;
var W, H, dpr;
var viewX = WORLD_W/2, viewY = WORLD_H/2, zoom = 1;

function resize() {
  dpr = window.devicePixelRatio || 1;
  W = window.innerWidth;
  H = window.innerHeight;
  canvas.width  = W * dpr;
  canvas.height = H * dpr;
  canvas.style.width  = W + 'px';
  canvas.style.height = H + 'px';
  ctx = canvas.getContext('2d');
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}
function init() {
  resize();
  requestAnimationFrame(loop);
}
if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', init);
} else {
  init();
}
window.addEventListener('load', function(){ resize(); });
window.addEventListener('resize', resize);

// ===== 坐标转换 =====
function toScreen(wx, wy) {
  return { x: W/2 + (wx - viewX) * zoom, y: H/2 + (wy - viewY) * zoom };
}

// ===== 颜色工具 =====
function hexRGB(h) {
  return [parseInt(h.slice(1,3),16), parseInt(h.slice(3,5),16), parseInt(h.slice(5,7),16)];
}
function rgba(hex, a) {
  var c = hexRGB(hex);
  return 'rgba(' + c[0] + ',' + c[1] + ',' + c[2] + ',' + a.toFixed(3) + ')';
}

// ===== 触摸/鼠标 =====
var touch=false, pinch=false, tx0=0,ty0=0,vx0=0,vy0=0,pDist0=0,pZoom0=1;

canvas.addEventListener('touchstart', function(e){
  e.preventDefault();
  if(e.touches.length===1){touch=true;pinch=false;tx0=e.touches[0].clientX;ty0=e.touches[0].clientY;vx0=viewX;vy0=viewY;}
  else if(e.touches.length===2){pinch=true;touch=false;var dx=e.touches[1].clientX-e.touches[0].clientX,dy=e.touches[1].clientY-e.touches[0].clientY;pDist0=Math.sqrt(dx*dx+dy*dy);pZoom0=zoom;}
},{passive:false});

canvas.addEventListener('touchmove', function(e){
  e.preventDefault();
  if(pinch&&e.touches.length===2){
    var dx=e.touches[1].clientX-e.touches[0].clientX,dy=e.touches[1].clientY-e.touches[0].clientY;
    zoom=Math.max(0.15,Math.min(4,pZoom0*Math.sqrt(dx*dx+dy*dy)/pDist0));
  }else if(touch&&e.touches.length===1){
    viewX=vx0-(e.touches[0].clientX-tx0)/zoom;
    viewY=vy0-(e.touches[0].clientY-ty0)/zoom;
  }
},{passive:false});

canvas.addEventListener('touchend', function(){touch=false;pinch=false;});

var mDown=false,mx0=0,my0=0,mvx0=0,mvy0=0;
canvas.addEventListener('mousedown',function(e){mDown=true;mx0=e.clientX;my0=e.clientY;mvx0=viewX;mvy0=viewY;});
canvas.addEventListener('mousemove',function(e){if(!mDown)return;viewX=mvx0-(e.clientX-mx0)/zoom;viewY=mvy0-(e.clientY-my0)/zoom;});
canvas.addEventListener('mouseup',function(){mDown=false;});
canvas.addEventListener('mouseleave',function(){mDown=false;});
canvas.addEventListener('wheel',function(e){e.preventDefault();zoom=Math.max(0.15,Math.min(4,zoom*(e.deltaY>0?0.92:1.08))},{passive:false});

// ===== 点击检测 =====
canvas.addEventListener('click', function(e){
  document.getElementById('hint').style.opacity='0';
  var closest=-1, best=40;
  for(var i=0;i<liveBlocks.length;i++){
    var b=liveBlocks[i], p=toScreen(b.doorX,b.doorY);
    var dx=e.clientX-p.x, dy=e.clientY-p.y, d=Math.sqrt(dx*dx+dy*dy);
    if(d<best){closest=i;best=d;}
  }
  if(closest>=0) showInfo(closest);
  else document.getElementById('infoPanel').classList.remove('show');
});

function showInfo(i){
  var b=liveBlocks[i], ec=ELEM[b.elem];
  document.getElementById('infoAvatar').style.background=rgba(ec.c,0.20);
  document.getElementById('infoAvatar').textContent=ec.emoji;
  document.getElementById('infoName').textContent=b.name;
  document.getElementById('infoId').textContent='#'+b.idStr;
  document.getElementById('infoId').style.color=ec.c;
  document.getElementById('infoType').textContent=ec.label;
  document.getElementById('infoType').style.color=ec.c;
  document.getElementById('infoDesc').textContent=ec.desc;
  document.getElementById('infoPanel').classList.add('show');
}
document.addEventListener('click',function(e){
  var p=document.getElementById('infoPanel');
  if(!p.contains(e.target)&&e.target!==canvas&&e.target.id!=='infoAvatar') p.classList.remove('show');
});

// ===== 渲染 =====
function loop(){ requestAnimationFrame(loop); render(); }

function render(){
  if(!ctx||!W||!H) return;
  ctx.clearRect(0,0,W,H);

  // —— 0. 街道灰色底面 ——
  ctx.fillStyle = '#E8E2D8';
  ctx.fillRect(0, 0, W, H);

  var r0 = Math.max(7, 13*zoom);

  // —— 1. 画每个cell的色块（同block颜色相同 → 视觉连成一片）——
  // 策略：先填所有cell，同block的cell颜色一样，自然就连了
  // 但更好的是：按block填色（每个block填一个形状）
  // 简化处理：每个cell独立画，同block同色

  for (var r = 0; r < ROWS; r++) {
    for (var c = 0; c < COLS; c++) {
      var bid = grid[r][c];
      if (blockById[bid].dead) continue;
      var b = blockById[bid];

      var x = c * (CELL + STREET) + STREET;

      if (p0.y>H+60&&p1.y>H+60&&p2.y>H+60&&p3.y>H+60) continue;

      }

      ctx.strokeStyle = rgba(ec.c, 0.10 + b.depth*0.20);

      ctx.stroke();
      ctx.setLineDash([]);
    }
  }

  ctx.lineCap = 'round';
  // 横向街道中线
  for (var r = 0; r < ROWS-1; r++) {
    for (var c = 0; c < COLS; c++) {
      if (!hStreet[r][c]) continue;
      var streetY = (r+1) * CELL + (r+1) * STREET - STREET/2 - STREET/2 + STREET/2;
      // 简化：streetY = (r+1)*(CELL+STREET) - STREET/2
      streetY = (r+1) * CELL + r * STREET + STREET/2 + CELL;
      var p1 = toScreen(0, streetY);
