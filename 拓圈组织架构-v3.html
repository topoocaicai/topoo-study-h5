  :root {
    --bg: #FAF9F7;
    --text: #1A1A1A;
    --text-light: #555555;
    --text-lighter: #999999;
    --border: #E8E6E3;
    --border-light: #F0EEEB;
    --card-bg: #FFFFFF;
    --tag-bg: #F5F4F2;

    --c-market: #5E9470;
    --c-market-block: #7BAF8B;
    --c-market-light: #EDF5EF;
    --c-content: #C0633E;
    --c-content-block: #D4785A;
    --c-content-light: #FDF0EB;
    --c-business: #C49A20;
    --c-business-block: #D4A82E;
    --c-business-light: #FBF5E5;
    --c-product: #7D6B93;
    --c-product-block: #9B8AAE;
    --c-product-light: #F3EFF6;
    --c-exp: #5A9DAF;
    --c-exp-block: #7CB9C8;
    --c-exp-light: #E8F4F7;
    --c-hq: #8B7E6A;
    --c-hq-block: #A89880;
    --c-hq-light: #F5F2ED;
  }

  html { scroll-behavior: smooth; }

  body {
    font-family: -apple-system, "SF Pro Display", "Helvetica Neue", "PingFang SC", "Noto Sans SC", sans-serif;
    background: var(--bg);
    color: var(--text);
    font-size: 15px;
    line-height: 1.7;
    -webkit-font-smoothing: antialiased;
  }

  /* 容器 */
  .container {
    max-width: 720px;
    margin: 0 auto;
    padding: 0 24px;
  }

  /* 顶部 */
  .hero {
    padding: 80px 0 60px;
    text-align: center;
  }
  .hero-label {
    font-size: 11px;
    letter-spacing: 4px;
    color: var(--text-lighter);
    text-transform: uppercase;
    margin-bottom: 20px;
  }
  .hero-title {
    font-size: 28px;
    font-weight: 600;
    color: var(--text);
    letter-spacing: 2px;
    margin-bottom: 12px;
  }
  .hero-title span {
    font-weight: 300;
    color: var(--text-lighter);
    font-size: 18px;
    display: block;
    margin-top: 6px;
    letter-spacing: 3px;
  }
  .hero-slogan {
    font-size: 13px;
    color: var(--text-lighter);
    letter-spacing: 1px;
    margin-top: 20px;
    padding: 10px 24px;
    border: 1px solid var(--border);
    border-radius: 100px;
    display: inline-block;
  }

  /* Originator */
  .ceo-section {
    text-align: center;
    padding: 32px 0 48px;
  }
  .ceo-avatar {
    width: 64px;
    height: 64px;
    border-radius: 50%;
    margin: 0 auto 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    border: 2px solid var(--border);
  }
  .ceo-avatar img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    border-radius: 50%;
  }
  .ceo-name {
    font-size: 16px;
    font-weight: 600;
    margin-bottom: 4px;
  }
  .ceo-role {
    font-size: 12px;
    color: var(--text-lighter);
    letter-spacing: 2px;
  }
  .ceo-line {
    width: 1px;
    height: 32px;
    background: var(--border);
    margin: 24px auto 0;
  }

  /* 中心模块 */
  .centers {
    display: flex;
    flex-direction: column;
    gap: 16px;
    padding-bottom: 80px;
  }

  .center-card {
    background: var(--card-bg);
    border-radius: 16px;
    border: 1px solid var(--border-light);
    overflow: hidden;
    transition: box-shadow 0.3s ease;
  }
  .center-card:hover {
    box-shadow: 0 4px 24px rgba(0,0,0,0.04);
  }

  .center-header {
    display: flex;
    align-items: center;
    padding: 20px 24px;
    cursor: pointer;
    gap: 16px;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
  }
  .center-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .center-info {
    flex: 1;
  }
  .center-name {
    font-size: 16px;
    font-weight: 600;
    margin-bottom: 2px;
  }
  .center-sub {
    font-size: 11px;
    color: var(--text-lighter);
    letter-spacing: 1px;
  }
  .center-count {
    font-size: 11px;
    color: var(--text-lighter);
    background: var(--tag-bg);
    padding: 4px 12px;
    border-radius: 100px;
    flex-shrink: 0;
  }
  .center-arrow {
    font-size: 18px;
    color: var(--text-lighter);
    transition: transform 0.3s ease;
    flex-shrink: 0;
    width: 20px;
    text-align: center;
  }
  .center-card.open .center-arrow {
    transform: rotate(90deg);
  }

  /* 部门列表 */
  .dept-list {
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.4s ease;
  }
  .center-card.open .dept-list {
    max-height: 2000px;
  }
  .dept-list-inner {
    padding: 0 24px 20px;
    border-top: 1px solid var(--border-light);
  }

  .dept-item {
    padding: 18px 0;
    border-bottom: 1px solid var(--border-light);
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }
  .dept-item:last-child {
    border-bottom: none;
    padding-bottom: 4px;
  }
  .dept-top {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .dept-icon {
    width: 36px;
    height: 36px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    flex-shrink: 0;
  }
  .dept-name-box {
    flex: 1;
  }
  .dept-name {
    font-size: 14px;
    font-weight: 600;
  }
  .dept-trad {
    font-size: 11px;
    color: var(--text-lighter);
    margin-top: 1px;
  }
  .dept-arrow {
    font-size: 14px;
    color: var(--text-lighter);
    transition: transform 0.3s ease;
  }
  .dept-item.open .dept-arrow {
    transform: rotate(90deg);
  }

  /* 部门详情 */
  .dept-detail {
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.35s ease;
  }
  .dept-item.open .dept-detail {
    max-height: 600px;
  }
  .dept-detail-inner {
    padding: 14px 0 6px 48px;
  }

  .duties-title {
    font-size: 11px;
    color: var(--text-lighter);
    letter-spacing: 2px;
    margin-bottom: 10px;
    font-weight: 500;
  }
  .duty-list {
    list-style: none;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .duty-list li {
    font-size: 13px;
    color: var(--text-light);
    padding-left: 14px;
    position: relative;
    line-height: 1.6;
  }
  .duty-list li::before {
    content: '';
    position: absolute;
    left: 0;
    top: 9px;
    width: 4px;
    height: 4px;
    border-radius: 50%;
    background: var(--text-lighter);
  }

  .worker-section {
    margin-top: 14px;
    padding: 12px 14px;
    background: var(--tag-bg);
    border-radius: 10px;
    display: flex;
    gap: 16px;
  }
  .worker-col {
    flex: 1;
  }
  .worker-label {
    font-size: 10px;
    letter-spacing: 1px;
    color: var(--text-lighter);
    margin-bottom: 6px;
    font-weight: 500;

  .worker-text {

    color: var(--text-light);
    line-height: 1.5;

    padding: 40px 0 60px;
    font-size: 11px;
    color: var(--text-lighter);
    letter-spacing: 1px;
  }
  .footer-line {
    width: 32px;
    height: 1px;
    background: var(--border);
    margin: 0 auto 16px;

  /* 响应式 */

    .hero-title { font-size: 24px; }
    .center-header { padding: 16px 18px; }
    .dept-list-inner { padding: 0 18px 16px; }
    .dept-detail-inner { padding-left: 0; }
  }

                    <div class="worker-label silicon">硅基 AI</div>
                    <div class="worker-text">${dept.silicon}</div>
                  </div>
                </div>
              </div>
            </div>
          </div>
        `).join('')}
      </div>
    </div>
  `;

  container.appendChild(card);
});

function toggleCenter(index) {
  const cards = document.querySelectorAll('.center-card');
  cards[index].classList.toggle('open');
}

function toggleDept(el) {
  el.classList.toggle('open');
  event.stopPropagation();
}
</script>
</body>
