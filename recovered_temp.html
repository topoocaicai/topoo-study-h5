function onPosterMouseDown(e){pg.currentImg = pg.slider.querySelectorAll('img')[currentSlide];pg.startX = e.clientX;pg.startY = e.clientY;pg.dragging = true;pg.swiping = null;pg.dx = 0;pg.lastTouchX = e.clientX;pg.lastTouchY = e.clientY;pg.movingImg = (pg.imgScale > 1.05);document.addEventListener('mousemove',onPosterMouseMove);document.addEventListener('mouseup',onPosterMouseUp);}function onPosterMouseMove(e){if (!pg.dragging) return;var dx = e.clientX - pg.startX;var dy = e.clientY - pg.startY;if (!pg.swiping){if (Math.abs(dx) > 6 || Math.abs(dy) > 6){pg.swiping = Math.abs(dx) > Math.abs(dy) ? 'h':'v';}}if (pg.swiping === 'h'){if (pg.imgScale > 1.05){var mx = e.clientX - pg.lastTouchX;var my = e.clientY - pg.lastTouchY;pg.imgTransX += mx;pg.imgTransY += my;applyImgTransform();pg.lastTouchX = e.clientX;pg.lastTouchY = e.clientY;}else{pg.dx = dx;pg.track.style.transition = 'none';pg.track.style.transform = 'translateX(' + (-currentSlide * 100 + (dx / pg.slider.offsetWidth) * 100) + '%)';}}}function onPosterMouseUp(e){pg.dragging = false;document.removeEventListener('mousemove',onPosterMouseMove);document.removeEventListener('mouseup',onPosterMouseUp);if (pg.swiping === 'h' && pg.imgScale <= 1.05){if (pg.dx < -40 && currentSlide < posterImgs.length - 1){currentSlide++;}else if (pg.dx > 40 && currentSlide > 0){currentSlide--;}pg.track.style.transition = 'transform 0.35s cubic-bezier(0.25,0.46,0.45,0.94)';updatePosterTrack();}if (pg.imgScale < 1.05) resetImgTransform();}/* ========== 场景拖拽 ========== */
var sceneEl,vpEl,cvEl,skyEl,wallEl,groundEl;var drag ={active:false,startX:0,curScroll:0};var maxScroll = 0;var hasDragged = false;function bindDrag(){sceneEl = document.getElementById('scene');vpEl = document.getElementById('vp');cvEl = document.getElementById('cv');skyEl = document.getElementById('skyLayer');wallEl = document.getElementById('wallWrap');groundEl = document.getElementById('groundLayer');sceneEl.addEventListener('mousedown',onDown);sceneEl.addEventListener('touchstart',onDown,{passive:false});window.addEventListener('mousemove',onMove);window.addEventListener('touchmove',onMove,{passive:false});window.addEventListener('mouseup',onUp);window.addEventListener('touchend',onUp);}function onDown(e){drag.active = true;drag.startX = e.type === 'touchstart' ? e.touches[0].clientX:e.clientX;var cur = cvEl.style.transform || 'translateX(0px)';drag.curScroll = parseFloat(cur.replace('translateX(','').replace('px)','')) || 0;sceneEl.classList.add('grabbing');if (e.cancelable) e.preventDefault();}function onMove(e){if (!drag.active) return;var x = e.type === 'touchmove' ? e.touches[0].clientX:e.clientX;var dx = x - drag.startX;var target = Math.max(-maxScroll,Math.min(0,drag.curScroll + dx));applyParallax(target);if (Math.abs(target) > 20 && !hasDragged){hasDragged = true;var hint = document.getElementById('dragHint');if (hint) hint.style.opacity = '0';}}function onUp(){drag.active = false;sceneEl.classList.remove('grabbing');}function applyParallax(scrollX){cvEl.style.transform = 'translateX(' + scrollX + 'px)';skyEl.style.transform = 'translateX(' + (scrollX * 0.06) + 'px)';wallEl.style.transform = 'translateX(' + (scrollX * 0.25) + 'px)';groundEl.style.transform = 'translateX(' + (scrollX * 0.4) + 'px)';}/* ========== 初始化 ========== */
function init(){document.getElementById('starsLayer').innerHTML = buildStars();document.getElementById('skylineFar').innerHTML = buildNanjingSkyline();document.getElementById('wallTop').innerHTML = buildWallTop();var result = buildAllCards();document.getElementById('cv').innerHTML = result.html;document.getElementById('cv').style.width = result.totalW + 'px';maxScroll = Math.max(0,result.totalW - window.innerWidth);bindDrag();}document.addEventListener('DOMContentLoaded',init);</script>
