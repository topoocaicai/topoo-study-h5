<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>拓圈研学 · 俄罗斯 · 南京文脉探索营 / TOPOO Study Tour · Russia</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  :root {
    --paper:#F5F0E8; --paper-light:#FAF8F4;
    --text:#1A1A1A; --text-mid:#555; --text-light:#888780; --text-lighter:#B4B2A9;
    --border:#E8E6E3; --border-light:#F0EEEB;
    --amber:#E8B44C; --amber-light:#F7EFD5; --amber-dark:#C49520;
    --rust:#D96B6B; --rust-light:#F5E0E0; --rust-dark:#B85050;
    --blue:#4A9EB8; --blue-light:#DAEEF5; --blue-dark:#357A95;
    --purple:#9B7BBF; --purple-light:#EDE8F5; --purple-dark:#7A5CA0;
    --green:#A0B87A; --green-light:#EBF2E0; --green-dark:#7D9A58;
    --sky-dark:#0B0F1E;
    --heritage:#8B6F47; --heritage-light:#F0E8DB;
    --main:#D96B6B; --main-light:#F5E0E0; --main-dark:#B85050;
  }
  html { scroll-behavior:smooth; }
  body { font-family:-apple-system,"SF Pro Display","Helvetica Neue","PingFang SC","Noto Sans SC",sans-serif; background:var(--paper); color:var(--text); font-size:15px; line-height:1.7; -webkit-font-smoothing:antialiased; }
  .page { max-width:900px; margin:0 auto; padding:0 32px; }
  .cover { min-height:100vh; background:var(--sky-dark); display:flex; flex-direction:column; align-items:center; justify-content:center; position:relative; overflow:hidden; padding:60px 40px; }
  .cover::before { content:''; position:absolute; top:0; left:0; right:0; bottom:0; background:radial-gradient(1px 1px at 60% 62%, rgba(255,255,255,0.25550843847640065),transparent),radial-gradient(1px 1px at 82% 5%, rgba(217,107,107,0.62856219811446),transparent),radial-gradient(1px 1px at 48% 56%, rgba(217,107,107,0.5256339491833073),transparent),radial-gradient(1px 1px at 87% 81%, rgba(255,255,255,0.30030821196415214),transparent),radial-gradient(1px 1px at 70% 25%, rgba(255,255,255,0.26500145615107695),transparent),radial-gradient(1px 1px at 65% 47%, rgba(255,255,255,0.37639398974931193),transparent),radial-gradient(1px 1px at 7% 60%, rgba(217,107,107,0.32364673549198786),transparent),radial-gradient(1px 1px at 82% 87%, rgba(255,255,255,0.4790699365213431),transparent),radial-gradient(1px 1px at 14% 45%, rgba(217,107,107,0.4059826905958325),transparent),radial-gradient(1px 1px at 73% 53%, rgba(217,107,107,0.5038996609953832),transparent),radial-gradient(1px 1px at 67% 68%, rgba(217,107,107,0.5619489370708315),transparent),radial-gradient(1px 1px at 60% 80%, rgba(217,107,107,0.6002619520529399),transparent),radial-gradient(1px 1px at 40% 29%, rgba(255,255,255,0.3066273159692591),transparent),radial-gradient(1px 1px at 44% 46%, rgba(217,107,107,0.5445368852994918),transparent),radial-gradient(1px 1px at 5% 56%, rgba(217,107,107,0.5375280247819648),transparent); pointer-events:none; }
  .cover-pattern { position:absolute; bottom:0; left:0; right:0; height:180px; background:linear-gradient(to top,rgba(217,107,107,.12) 0%,transparent 100%); pointer-events:none; }
  .cover-pattern::before { content:''; position:absolute; bottom:0; left:0; right:0; height:3px; background:linear-gradient(90deg,transparent,rgba(217,107,107,.4),rgba(232,180,76,.3),rgba(74,158,184,.3),transparent); }
  .cover-badge { display:inline-flex; align-items:center; gap:8px; padding:6px 20px; border:1px solid rgba(255,255,255,.12); border-radius:100px; margin-bottom:40px; position:relative; z-index:1; }
  .cover-badge img { width:24px; height:24px; border-radius:6px; }
  .cover-badge span { font-size:11px; letter-spacing:3px; color:rgba(255,255,255,.45); font-family:Georgia,serif; }
  .cover-main { text-align:center; position:relative; z-index:1; }
  .cover-eyebrow { font-size:12px; letter-spacing:6px; color:var(--main); margin-bottom:16px; font-weight:500; }
  .cover-title { font-size:48px; font-weight:700; letter-spacing:8px; color:#fff; line-height:1.3; margin-bottom:8px; }
  .cover-title-accent { display:block; font-size:26px; font-weight:300; letter-spacing:4px; color:rgba(255,255,255,.45); margin-top:8px; }
  .cover-title-en { display:block; font-size:15px; font-weight:300; letter-spacing:2px; color:rgba(255,255,255,.3); margin-top:6px; font-family:Georgia,serif; }
  .cover-divider { width:48px; height:2px; background:linear-gradient(90deg,var(--main),var(--amber)); margin:32px auto; border-radius:1px; }
  .cover-subtitle { font-size:15px; color:rgba(255,255,255,.4); letter-spacing:2px; line-height:1.8; }
  .cover-meta { display:flex; gap:32px; margin-top:48px; position:relative; z-index:1; flex-wrap:wrap; justify-content:center; }
  .cover-meta-item { text-align:center; }
  .cover-meta-item .val { font-size:22px; font-weight:600; color:#fff; }
  .cover-meta-item .label { font-size:10px; color:rgba(255,255,255,.3); letter-spacing:2px; margin-top:4px; }
  .cover-version { position:absolute; bottom:40px; font-size:10px; color:rgba(255,255,255,.15); letter-spacing:2px; z-index:1; }
  .back-cover { min-height:40vh; background:var(--sky-dark); display:flex; flex-direction:column; align-items:center; justify-content:center; position:relative; overflow:hidden; padding:60px 40px; }
  .back-cover::before { content:''; position:absolute; top:0; left:0; right:0; bottom:0; background:radial-gradient(1px 1px at 20% 30%,rgba(255,255,255,.4),transparent),radial-gradient(1px 1px at 65% 18%,rgba(217,107,107,.5),transparent); pointer-events:none; }
  .back-cover .bc-logo { position:relative; z-index:1; margin-bottom:16px; width:64px; height:64px; border-radius:16px; background:#F5F0E8; display:flex; align-items:center; justify-content:center; }
  .back-cover .bc-logo img { width:40px; height:auto; }
  .back-cover .bc-slogan { position:relative; z-index:1; font-size:14px; color:rgba(255,255,255,.35); letter-spacing:2px; margin-top:8px; }
  .back-cover .bc-info { position:relative; z-index:1; margin-top:24px; font-size:11px; color:rgba(255,255,255,.2); letter-spacing:1px; text-align:center; line-height:2; }
  @media (max-width:768px){
    .page{padding:0 20px;}
    .cover-title{font-size:32px;letter-spacing:4px;}
    .cover-title-accent{font-size:18px;}
    .cover-title-en{font-size:13px;}
    .cover-meta{gap:20px;}
    .nj-grid{grid-template-columns:1fr;}
    .choose-grid{grid-template-columns:1fr;}
.choose-price{font-size:28px;}
  }

  .nj-section { padding:56px 0; border-bottom:1px solid var(--border-light); }
  .nj-section .section-label { font-size:10px; letter-spacing:4px; color:var(--text-lighter); text-transform:uppercase; margin-bottom:8px; }
  .nj-section .section-title { font-size:24px; font-weight:600; color:var(--text); letter-spacing:2px; margin-bottom:8px; }
  .nj-section .section-desc { font-size:13px; color:var(--text-mid); line-height:1.8; margin-bottom:24px; max-width:680px; }
  .nj-grid { display:grid; grid-template-columns:1fr 1fr; gap:16px; margin-bottom:24px; }
  .nj-card { background:var(--paper-light); border:1px solid var(--border); border-radius:12px; padding:20px; }
  .nj-card .nj-label { font-size:10px; letter-spacing:2px; color:var(--text-lighter); margin-bottom:8px; }
  .nj-card .nj-value { font-size:14px; font-weight:600; color:var(--text); line-height:1.6; }
  .nj-card .nj-note { font-size:12px; color:var(--text-light); margin-top:6px; line-height:1.6; }
  .nj-quote { background:var(--heritage-light); border-left:3px solid var(--heritage); border-radius:0 8px 8px 0; padding:16px 20px; margin-top:20px; }
  .nj-quote p { font-size:13px; color:var(--heritage); line-height:1.8; font-style:italic; }
  .choose-section { padding:56px 0; }
  .choose-section .section-label { font-size:10px; letter-spacing:4px; color:var(--text-lighter); text-transform:uppercase; margin-bottom:8px; }
  .choose-section .section-title { font-size:24px; font-weight:600; color:var(--text); letter-spacing:2px; margin-bottom:8px; }
  .choose-section .section-desc { font-size:13px; color:var(--text-mid); line-height:1.8; margin-bottom:40px; max-width:600px; }
  .choose-grid { display:grid; grid-template-columns:1fr; gap:24px; max-width:420px; margin:0 auto; }
  .choose-card { background:white; border:1.5px solid var(--border); border-radius:16px; padding:40px 32px; text-align:center; position:relative; overflow:hidden; transition:transform .2s,box-shadow .2s; cursor:pointer; text-decoration:none; display:block; }
  .choose-card:hover { transform:translateY(-4px); box-shadow:0 8px 30px rgba(0,0,0,.08); border-color:var(--main); }
  .choose-card::before { content:''; position:absolute; top:0; left:0; right:0; height:4px; background:linear-gradient(90deg,var(--main),var(--amber)); }
  .choose-icon { font-size:48px; margin-bottom:20px; }
  .choose-duration { font-size:10px; letter-spacing:4px; color:var(--text-lighter); margin-bottom:12px; }
  .choose-name { font-size:22px; font-weight:700; color:var(--text); letter-spacing:2px; margin-bottom:8px; }
  .choose-name-accent { display:block; font-size:13px; font-weight:400; color:var(--text-light); margin-top:4px; }
  .choose-price { font-size:36px; font-weight:700; color:var(--text); letter-spacing:1px; margin:20px 0 8px; }
  .choose-price .currency { font-size:18px; font-weight:500; color:var(--main-dark); margin-right:2px; }
  .choose-price .unit { font-size:13px; font-weight:400; color:var(--text-light); }
  .choose-tags { display:flex; flex-wrap:wrap; gap:6px; justify-content:center; margin-top:16px; }
  .choose-tag { display:inline-block; padding:3px 10px; border-radius:100px; font-size:11px; font-weight:500; background:var(--paper-light); color:var(--text-mid); }
  .choose-arrow { margin-top:20px; font-size:13px; color:var(--main-dark); font-weight:500; letter-spacing:1px; }
  .choose-arrow span { display:inline-block; transition:transform .2s; }
  .choose-card:hover .choose-arrow span { transform:translateX(4px); }


.proj-text h5 { font-size:13px; font-weight:600; color:var(--text); margin-bottom:2px; }
  .proj-text p { font-size:11px; color:var(--text-light); line-height:1.5; }


</style>
</head>
