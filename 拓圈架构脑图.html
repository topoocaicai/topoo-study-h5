// ===== 布局引擎 =====
const H_GAP = 190;
const V_GAP = 10;
const LEAF_V = 38;

function countLeaves(node) {
  if (!node.expanded || !node.children || node.children.length === 0) return 1;
  return node.children.reduce((s, c) => s + countLeaves(c), 0);
}

function layout(node, x, yStart, yEnd) {
  node.x = x;
  node.cy = (yStart + yEnd) / 2;
  
  if (!node.expanded || !node.children || node.children.length === 0) return;
  
  const total = countLeaves(node);
  const totalH = yEnd - yStart;
  let curY = yStart;
  
  node.children.forEach(child => {
    const leaves = countLeaves(child);
    const h = (leaves / total) * totalH;
    layout(child, x + H_GAP, curY, curY + h);
    curY += h;
  });
}

// ===== 绘制 =====
function getVisibleNodes(node, list = []) {
  list.push(node);
  if (node.expanded && node.children) {
    node.children.forEach(c => getVisibleNodes(c, list));
  }
  return list;
}

function hexToRgb(hex) {
  const r = parseInt(hex.slice(1,3), 16);
  const g = parseInt(hex.slice(3,5), 16);
  const b = parseInt(hex.slice(5,7), 16);
  return `${r},${g},${b}`;
}

function drawNode(node) {
  const lines = node.text.split('\n');
  const fs = node.size || 12;
  const lineHeight = fs * 1.5;
  const totalH = lines.length * lineHeight;
  const weight = node.weight || 400;
  
  // 节点圆角矩形背景
  const padX = fs * 0.75;
  const padY = fs * 0.55;
  const maxW = Math.max(...lines.map(l => ctx.measureText(l).width));
  const bx = node.x - padX;
  const by = node.cy - totalH/2 - padY;
  const bw = maxW + padX * 2;
  const bh = totalH + padY * 2;
  const r = 8;
  
  // node.color = 文字色（加深版），node.blockColor = 图形色（柔和版）
  const blockC = node.blockColor || node.color;
  const textC = node.color;
  
  // 判断是不是根节点
  const isRoot = node === data;
  
  if (isRoot) {
    // 根节点：更大、更醒目
    ctx.fillStyle = `rgba(${hexToRgb(blockC)}, 0.08)`;
    ctx.beginPath();
    ctx.roundRect(bx - 8, by - 6, bw + 16, bh + 12, 12);
    ctx.fill();
    
    ctx.strokeStyle = `rgba(${hexToRgb(blockC)}, 0.2)`;
    ctx.lineWidth = 1.5;
    ctx.stroke();
    
    // 左侧色条（粗一些）
    ctx.fillStyle = blockC;
    ctx.beginPath();
    ctx.roundRect(bx - 8, by - 6, 4, bh + 12, [12, 0, 0, 12]);
    ctx.fill();
  } else {
    // 普通节点背景
    ctx.fillStyle = `rgba(${hexToRgb(blockC)}, 0.06)`;
    ctx.beginPath();
    ctx.roundRect(bx, by, bw, bh, r);
    ctx.fill();
    
    // 细边框
    ctx.strokeStyle = `rgba(${hexToRgb(blockC)}, 0.18)`;
    ctx.lineWidth = 0.8;
    ctx.stroke();
    
    // 左侧色条
    ctx.fillStyle = blockC;
    ctx.beginPath();
    ctx.roundRect(bx, by, 3, bh, [r, 0, 0, r]);
    ctx.fill();
  }
  
  // 文字（用加深色）
  ctx.fillStyle = textC;
  ctx.font = `${weight} ${fs}px -apple-system, "SF Pro Display", "PingFang SC", "Noto Sans SC", sans-serif`;
  ctx.textBaseline = 'middle';
  ctx.textAlign = 'left';
  
  lines.forEach((line, i) => {
    const ly = node.cy - totalH/2 + lineHeight/2 + i * lineHeight;
    ctx.fillText(line, node.x, ly);
  });
  
  // 展开/收起指示器
  if (node.children && node.children.length > 0) {
    const ix = node.x + maxW + padX + 10;
    const iy = node.cy;
    
    // 小圆圈背景
    ctx.fillStyle = `rgba(${hexToRgb(blockC)}, 0.08)`;
    ctx.beginPath();
    ctx.arc(ix + 2, iy, 8, 0, Math.PI * 2);
    ctx.fill();
    
    ctx.fillStyle = textC;
    ctx.font = '500 11px -apple-system, sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(node.expanded ? '−' : '+', ix + 2, iy + 1);
  }
}

function drawConnections(node) {
  if (!node.expanded || !node.children) return;
  
  node.children.forEach(child => {
    // 获取父节点文本宽度
    const parentLines = node.text.split('\n');
    const parentFs = node.size || 12;
    const parentPadX = parentFs * 0.75;
    const parentMaxW = Math.max(...parentLines.map(l => ctx.measureText(l).width));
    const startX = node.x + parentMaxW + parentPadX + 20;
    const endX = child.x;
    const midX = (startX + endX) / 2;
    
    // 贝塞尔曲线——柔和的三顿半风格
    ctx.beginPath();
    ctx.moveTo(startX, node.cy);
    ctx.bezierCurveTo(midX, node.cy, midX, child.cy, endX, child.cy);
    ctx.strokeStyle = `rgba(${hexToRgb(child.color)}, 0.18)`;
    ctx.lineWidth = 1.2;
    ctx.stroke();
    
    drawConnections(child);
  });
}

function render() {
  ctx.clearRect(0, 0, W, H);
  
  // 白底背景
  ctx.fillStyle = colors.bg;
  ctx.fillRect(0, 0, W, H);
  
  // 极淡的装饰圆
  const t = Date.now() / 15000;
  for (let i = 0; i < 3; i++) {
    const cx = W * (0.2 + i * 0.3);
    const cy = H * 0.5 + Math.sin(t + i * 2) * 30;
    const radius = 150 + i * 80;
    ctx.beginPath();
    ctx.arc(cx, cy, radius, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(${hexToRgb(colors.accent)}, 0.015)`;
    ctx.fill();
  }
  
  ctx.save();
  ctx.translate(panX, panY);
  ctx.scale(scale, scale);
  
  // 连线
  drawConnections(data);
  
  // 节点
  const nodes = getVisibleNodes(data);
  nodes.forEach(n => drawNode(n));
  
  ctx.restore();
}

// ===== 交互 =====
let panX = 60, panY = 0, scale = 1;
let isDragging = false, lastX, lastY;
let pinchDist = 0;

function calcBounds() {
  const nodes = getVisibleNodes(data);
  let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
  nodes.forEach(n => {
    if (n.x < minX) minX = n.x;
    if (n.x > maxX) maxX = n.x + 200;
    if (n.cy < minY) minY = n.cy;
    if (n.cy > maxY) maxY = n.cy;
  });
  return { minX, maxX, minY, maxY };
}

function fitToScreen() {
  const bounds = calcBounds();
  const contentW = bounds.maxX - bounds.minX + 120;
  const contentH = bounds.maxY - bounds.minY + 120;
  
  const scaleX = W / contentW;
  const scaleY = H / contentH;
  scale = Math.min(scaleX, scaleY, 1.2);
  
  panX = (W - contentW * scale) / 2 - bounds.minX * scale + 60 * scale;
  panY = (H - contentH * scale) / 2 - bounds.minY * scale;
}

function findNodeAt(node, wx, wy) {
  const fs = node.size || 12;
  const lines = node.text.split('\n');
  const padX = fs * 0.75;
  const maxW = Math.max(...lines.map(l => ctx.measureText(l).width));
  const bh = lines.length * fs * 1.5 + fs * 1.1;
  
  const bx = node.x - padX;
  const by = node.cy - bh/2;
  
  if (wx >= bx && wx <= bx + maxW + padX * 2 && wy >= by && wy <= by + bh) {
    return node;
  }
  
  if (node.expanded && node.children) {
    for (const c of node.children) {
      const found = findNodeAt(c, wx, wy);
      if (found) return found;
    }
  }
  return null;
}

canvas.addEventListener('pointerdown', e => {
  if (e.pointerType === 'touch' && e.touches && e.touches.length >= 2) return;
  isDragging = true;
  lastX = e.clientX;
  lastY = e.clientY;
  canvas.setPointerCapture(e.pointerId);
});

canvas.addEventListener('pointermove', e => {
  if (!isDragging) return;
  panX += e.clientX - lastX;
  panY += e.clientY - lastY;
  lastX = e.clientX;
  lastY = e.clientY;
  render();
});

canvas.addEventListener('pointerup', e => {
  if (!isDragging) return;
  const dx = Math.abs(e.clientX - lastX);
  const dy = Math.abs(e.clientY - lastY);
  
  if (dx < 5 && dy < 5) {
    const wx = (e.clientX - panX) / scale;
    const wy = (e.clientY - panY) / scale;
    const hit = findNodeAt(data, wx, wy);
    if (hit && hit.children && hit.children.length > 0) {
      hit.expanded = !hit.expanded;
      layout(data, 0, 0, countLeaves(data) * LEAF_V);
      fitToScreen();
      render();
    }
  }
  isDragging = false;
});

canvas.addEventListener('wheel', e => {
  e.preventDefault();
  const zoomFactor = e.deltaY > 0 ? 0.92 : 1.08;
  const newScale = Math.max(0.3, Math.min(3, scale * zoomFactor));
  
  const mx = e.clientX;
  const my = e.clientY;
  panX = mx - (mx - panX) * (newScale / scale);
  panY = my - (my - panY) * (newScale / scale);
  scale = newScale;
  render();
}, { passive: false });

canvas.addEventListener('touchstart', e => {
  if (e.touches.length === 2) {
    pinchDist = Math.hypot(
      e.touches[0].clientX - e.touches[1].clientX,
      e.touches[0].clientY - e.touches[1].clientY
    );
  }
}, { passive: true });

canvas.addEventListener('touchmove', e => {
  if (e.touches.length === 2) {
    const dist = Math.hypot(
      e.touches[0].clientX - e.touches[1].clientX,
      e.touches[0].clientY - e.touches[1].clientY
    );
    const ratio = dist / pinchDist;
    const newScale = Math.max(0.3, Math.min(3, scale * ratio));
    
    const cx = (e.touches[0].clientX + e.touches[1].clientX) / 2;
    const cy = (e.touches[0].clientY + e.touches[1].clientY) / 2;
    panX = cx - (cx - panX) * (newScale / scale);
    panY = cy - (cy - panY) * (newScale / scale);
    scale = newScale;
    pinchDist = dist;
    render();
  }
}, { passive: true });

// 初始化
layout(data, 0, 0, countLeaves(data) * LEAF_V);
fitToScreen();
render();
</script>
</body>
</html>
