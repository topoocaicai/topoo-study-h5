<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 520" width="100%">
  <defs>
    <pattern id="lines" x="0" y="0" width="680" height="520" patternUnits="userSpaceOnUse">
      <line x1="0" y1="30" x2="680" y2="30" stroke="#d4cfc4" stroke-width="0.3"/>
      <line x1="0" y1="60" x2="680" y2="60" stroke="#d4cfc4" stroke-width="0.3"/>
      <line x1="0" y1="90" x2="680" y2="90" stroke="#d4cfc4" stroke-width="0.3"/>
      <line x1="0" y1="120" x2="680" y2="120" stroke="#d4cfc4" stroke-width="0.3"/>
      <line x1="0" y1="150" x2="680" y2="150" stroke="#d4cfc4" stroke-width="0.3"/>
      <line x1="0" y1="180" x2="680" y2="180" stroke="#d4cfc4" stroke-width="0.3"/>
      <line x1="0" y1="210" x2="680" y2="210" stroke="#d4cfc4" stroke-width="0.3"/>
      <line x1="0" y1="240" x2="680" y2="240" stroke="#d4cfc4" stroke-width="0.3"/>
      <line x1="0" y1="270" x2="680" y2="270" stroke="#d4cfc4" stroke-width="0.3"/>
      <line x1="0" y1="300" x2="680" y2="300" stroke="#d4cfc4" stroke-width="0.3"/>
      <line x1="0" y1="330" x2="680" y2="330" stroke="#d4cfc4" stroke-width="0.3"/>
      <line x1="0" y1="360" x2="680" y2="360" stroke="#d4cfc4" stroke-width="0.3"/>
      <line x1="0" y1="390" x2="680" y2="390" stroke="#d4cfc4" stroke-width="0.3"/>
      <line x1="0" y1="420" x2="680" y2="420" stroke="#d4cfc4" stroke-width="0.3"/>
      <line x1="0" y1="450" x2="680" y2="450" stroke="#d4cfc4" stroke-width="0.3"/>
      <line x1="0" y1="480" x2="680" y2="480" stroke="#d4cfc4" stroke-width="0.3"/>
    </pattern>
  </defs>

  <!-- Paper background -->
  <rect width="680" height="520" fill="#f5f0e8" rx="12"/>
  <rect width="680" height="520" fill="url(#lines)" rx="12"/>

  <!-- Top accent line -->
  <rect x="0" y="0" width="680" height="3" fill="#d96b6b" rx="1"/>

  <!-- TOPOO brand mark + logo - top left -->
  <image href="拓圈logo.png" x="28" y="28" width="28" height="28"/>
  <text x="62" y="46" font-family="Georgia, serif" font-size="15" fill="#2c2c2a" font-weight="bold" letter-spacing="3">TOPOO</text>
  <text x="136" y="46" font-family="sans-serif" font-size="10" fill="#888780">理念卡片</text>

  <!-- Number capsule -->
  <rect x="576" y="28" width="68" height="24" rx="12" fill="#d96b6b" opacity="0.15"/>
  <text x="610" y="44" font-family="sans-serif" font-size="11" fill="#993C1D" text-anchor="middle" font-weight="500">NO.01</text>

  <!-- Decorative dots -->
  <circle cx="560" cy="40" r="2" fill="#e8b44c" opacity="0.4"/>
  <circle cx="548" cy="40" r="1.5" fill="#d96b6b" opacity="0.4"/>

  <!-- Large opening quote -->
  <text x="56" y="140" font-family="Georgia, serif" font-size="72" fill="#d96b6b" opacity="0.2">"</text>

  <!-- Main quote -->
  <text font-family="sans-serif" font-size="22" fill="#2c2c2a" font-weight="500">
    <tspan x="80" y="168">探索，还是被喂养？</tspan>
  </text>

  <text font-family="sans-serif" font-size="22" fill="#2c2c2a" font-weight="500">
    <tspan x="80" y="210">算法比你更了解你，</tspan>
    <tspan x="80" y="248">还是你比算法更了解自己？</tspan>
  </text>

  <!-- Closing quote -->
  <text x="490" y="275" font-family="Georgia, serif" font-size="72" fill="#d96b6b" opacity="0.2">"</text>

  <!-- Divider -->
  <line x1="80" y1="300" x2="600" y2="300" stroke="#d4cfc4" stroke-width="0.5"/>

  <!-- Sub-text: two columns -->
  <!-- Left column: 喂养 -->
  <rect x="80" y="320" width="230" height="24" rx="4" fill="#d96b6b" opacity="0.08"/>
  <text x="92" y="337" font-family="sans-serif" font-size="12" fill="#993C1D" font-weight="500">喂养</text>
  <text font-family="sans-serif" font-size="12" fill="#5f5e5a">
    <tspan x="92" y="362">被动接收，不用思考</tspan>
    <tspan x="92" y="382">多巴胺由外界触发</tspan>
    <tspan x="92" y="402">刷完之后，只剩空虚</tspan>
    <tspan x="92" y="422">人越来越像数据</tspan>
  </text>

  <!-- Divider between columns -->
  <line x1="350" y1="320" x2="350" y2="435" stroke="#d4cfc4" stroke-width="0.5"/>

  <!-- Right column: 探索 -->
  <rect x="380" y="320" width="230" height="24" rx="4" fill="#5ba875" opacity="0.08"/>
  <text x="392" y="337" font-family="sans-serif" font-size="12" fill="#3B6D11" font-weight="500">探索</text>
  <text font-family="sans-serif" font-size="12" fill="#5f5e5a">
    <tspan x="392" y="362">主动发现，自己走自己看</tspan>
    <tspan x="392" y="382">"我找到了"的成就感</tspan>
    <tspan x="392" y="402">找到同频的人和事</tspan>
    <tspan x="392" y="422">把"人"还给每个人</tspan>
  </text>

  <!-- Bottom brand line -->
  <text x="340" y="490" font-family="sans-serif" font-size="11" fill="#888780" text-anchor="middle" letter-spacing="1">TOPOO · 让小而美被世界看见</text>

  <!-- Bottom accent -->
  <rect x="0" y="517" width="680" height="3" fill="#d96b6b" rx="1"/>
</svg>