<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 520" width="100%">
  <defs>
    <pattern id="lines" x="0" y="0" width="680" height="520" patternUnits="userSpaceOnUse">
      <line x1="0" y1="30" x2="680" y2="30" stroke="#d4cfc4" stroke-width="0.3"/>
      <line x1="0" y1="60" x2="680" y2="60" stroke="#d4cfc4" stroke-width="0.3"/>
      <line x1="0" y1="90" x2="680" y2="90" stroke="#d4cfc4" stroke-width="0.3"/>
      <line x1="0" y1="120" x2="680" y2="120" stroke="#d4cfc4" stroke-width="0.3"/>
      <line x1="0" y1="150" x2="680" y2="150" stroke="#d4cfc4" stroke-width="0.3"/>
      <line x1="0" y1="180" x2="680" y2="180" stroke="#d4cfc4" stroke-width="0.3"/>
      <line x1="0" y1="210" x2="680" y2="210" stroke="#d4cfc4" stroke-width="0.3"/>
      <line x1="0" y1="240" x2="680" y2="240" stroke="#d4cfc4" stroke-width="0.3"/>
      <line x1="0" y1="270" x2="680" y2="270" stroke="#d4cfc4" stroke-width="0.3"/>
      <line x1="0" y1="300" x2="680" y2="300" stroke="#d4cfc4" stroke-width="0.3"/>
      <line x1="0" y1="330" x2="680" y2="330" stroke="#d4cfc4" stroke-width="0.3"/>
      <line x1="0" y1="360" x2="680" y2="360" stroke="#d4cfc4" stroke-width="0.3"/>
      <line x1="0" y1="390" x2="680" y2="390" stroke="#d4cfc4" stroke-width="0.3"/>
      <line x1="0" y1="420" x2="680" y2="420" stroke="#d4cfc4" stroke-width="0.3"/>
      <line x1="0" y1="450" x2="680" y2="450" stroke="#d4cfc4" stroke-width="0.3"/>
      <line x1="0" y1="480" x2="680" y2="480" stroke="#d4cfc4" stroke-width="0.3"/>
    </pattern>
  </defs>

  <!-- Paper background -->
  <rect width="680" height="520" fill="#f5f0e8" rx="12"/>
  <rect width="680" height="520" fill="url(#lines)" rx="12"/>

  <!-- Top accent line -->
  <rect x="0" y="0" width="680" height="3" fill="#5a9fd4" rx="1"/>

  <!-- TOPOO brand mark + logo - top left -->
  <image href="拓圈logo.png" x="28" y="28" width="28" height="28"/>
  <text x="62" y="46" font-family="Georgia, serif" font-size="15" fill="#2c2c2a" font-weight="bold" letter-spacing="3">TOPOO</text>
  <text x="136" y="46" font-family="sans-serif" font-size="10" fill="#888780">理念卡片</text>

  <!-- Number capsule -->
  <rect x="576" y="28" width="68" height="24" rx="12" fill="#5a9fd4" opacity="0.15"/>
  <text x="610" y="44" font-family="sans-serif" font-size="11" fill="#185FA5" text-anchor="middle" font-weight="500">NO.02</text>

  <!-- Decorative dots -->
  <circle cx="560" cy="40" r="2" fill="#9b7bbf" opacity="0.4"/>
  <circle cx="548" cy="40" r="1.5" fill="#5a9fd4" opacity="0.4"/>

  <!-- Large opening quote -->
  <text x="56" y="130" font-family="Georgia, serif" font-size="72" fill="#5a9fd4" opacity="0.2">"</text>

  <!-- Main quote -->
  <text font-family="sans-serif" font-size="22" fill="#2c2c2a" font-weight="500">
    <tspan x="80" y="165">你现实中是谁，没人在意。</tspan>
  </text>
  <text font-family="sans-serif" font-size="22" fill="#2c2c2a" font-weight="500">
    <tspan x="80" y="207">但你的价值观和灵魂，</tspan>
    <tspan x="80" y="249">每个人都看得见。</tspan>
  </text>

  <!-- Closing quote -->
  <text x="500" y="275" font-family="Georgia, serif" font-size="72" fill="#5a9fd4" opacity="0.2">"</text>

  <!-- Divider -->
  <line x1="80" y1="300" x2="600" y2="300" stroke="#d4cfc4" stroke-width="0.5"/>

  <!-- Three-layer identity structure -->
  <!-- Layer 1 -->
  <rect x="80" y="320" width="160" height="22" rx="4" fill="#9b7bbf" opacity="0.12"/>
  <text x="92" y="336" font-family="sans-serif" font-size="12" fill="#534AB7" font-weight="500">你是谁不重要</text>
  <text font-family="sans-serif" font-size="12" fill="#5f5e5a">
    <tspan x="92" y="360">想成为谁才重要</tspan>
    <tspan x="92" y="378">拓圈昵称——你的名字</tspan>
    <tspan x="92" y="396">由你自己定义</tspan>
  </text>

  <!-- Arrow -->
  <text x="262" y="365" font-family="sans-serif" font-size="16" fill="#d4cfc4">&gt;</text>

  <!-- Layer 2 -->
  <rect x="290" y="320" width="160" height="22" rx="4" fill="#e8b44c" opacity="0.12"/>
  <text x="302" y="336" font-family="sans-serif" font-size="12" fill="#854F0B" font-weight="500">你在做什么</text>
  <text font-family="sans-serif" font-size="12" fill="#5f5e5a">
    <tspan x="302" y="360">比你是谁更值钱</tspan>
    <tspan x="302" y="378">角色标签——你的身份</tspan>
    <tspan x="302" y="396">由你的行动定义</tspan>
  </text>

  <!-- Arrow -->
  <text x="472" y="365" font-family="sans-serif" font-size="16" fill="#d4cfc4">&gt;</text>

  <!-- Layer 3 -->
  <rect x="500" y="320" width="160" height="22" rx="4" fill="#5ba875" opacity="0.12"/>
  <text x="512" y="336" font-family="sans-serif" font-size="12" fill="#3B6D11" font-weight="500">你相信什么</text>
  <text font-family="sans-serif" font-size="12" fill="#5f5e5a">
    <tspan x="512" y="360">决定你和谁同行</tspan>
    <tspan x="512" y="378">星球归属——你的家</tspan>
    <tspan x="512" y="396">由你的灵魂定义</tspan>
  </text>

  <!-- Bottom tagline -->
  <text x="340" y="450" font-family="sans-serif" font-size="12" fill="#888780" text-anchor="middle">价值观是名片。不是隐藏身份，是现实中是谁根本不重要。</text>

  <!-- Bottom brand line -->
  <text x="340" y="490" font-family="sans-serif" font-size="11" fill="#888780" text-anchor="middle" letter-spacing="1">TOPOO · 让小而美被世界看见</text>

  <!-- Bottom accent -->
  <rect x="0" y="517" width="680" height="3" fill="#5a9fd4" rx="1"/>
</svg>