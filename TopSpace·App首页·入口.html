<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>Topoo · 让小而美被世界看见</title>
<style>*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}:root{--dark:#0B0F1E;--dark2:#1A2035;--amber:#E8B44C;--rust:#D96B6B;--water:#4A9EB8;--wood:#A0B87A;--earth:#9B7BBF;--warm:#F5F0E8;}html,body{width:100%;height:100%;overflow:hidden}body{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Noto Serif SC",Georgia,serif;background:var(--dark);color:#fff;}/* ===== 入场屏 ===== */
.splash{position:fixed;inset:0;z-index:100;display:flex;flex-direction:column;align-items:center;justify-content:center;background:var(--dark);transition:opacity .8s ease,transform .8s ease;}.splash.fade-out{opacity:0;transform:scale(1.05);pointer-events:none;}/* 星空 */
.splash-stars{position:absolute;inset:0;pointer-events:none;overflow:hidden;}.splash-star{position:absolute;background:#fff;border-radius:50%;animation:twinkle var(--dur) ease-in-out infinite alternate;}@keyframes twinkle{0%{opacity:.1}100%{opacity:.8}}/* 五行光晕 */
.splash-glow{position:absolute;border-radius:50%;filter:blur(60px);opacity:0;animation:glowPulse var(--dur) var(--delay) ease-in-out infinite;}@keyframes glowPulse{0%,100%{opacity:.06;transform:scale(1)}50%{opacity:.15;transform:scale(1.2)}}/* Logo */
.splash-logo{width:56px;height:56px;border-radius:16px;background:linear-gradient(135deg,var(--amber),var(--rust));display:flex;align-items:center;justify-content:center;font-size:26px;font-weight:700;box-shadow:0 0 40px rgba(232,180,76,.25);opacity:0;animation:fadeInUp .8s .3s ease forwards;position:relative;z-index:2;}/* 文字 */
.splash-text{margin-top:32px;text-align:center;position:relative;z-index:2;}.splash-eyebrow{font-size:11px;letter-spacing:4px;color:rgba(255,255,255,.35);margin-bottom:16px;opacity:0;animation:fadeInUp .6s .6s ease forwards;}.splash-main{font-size:20px;line-height:2;color:rgba(255,255,255,.85);letter-spacing:2px;opacity:0;animation:fadeInUp .8s 1s ease forwards;}.splash-main em{font-style:normal;color:var(--amber);text-shadow:0 0 20px rgba(232,180,76,.3);}/* 底部slogan */
.splash-slogan{position:absolute;bottom:100px;font-size:12px;letter-spacing:3px;color:rgba(255,255,255,.2);opacity:0;animation:fadeInUp .6s 1.8s ease forwards;}/* 跳过提示 */
.splash-skip{position:absolute;bottom:50px;font-size:12px;color:rgba(255,255,255,.25);cursor:pointer;opacity:0;animation:fadeInUp .5s 2.2s ease forwards;transition:color .2s;z-index:5;}.splash-skip:active{color:rgba(255,255,255,.6)}/* 进度线 */
.splash-progress{position:absolute;bottom:30px;left:50%;transform:translateX(-50%);width:80px;height:2px;background:rgba(255,255,255,.06);border-radius:1px;overflow:hidden;opacity:0;animation:fadeIn .5s 2s ease forwards;}.splash-progress-bar{height:100%;width:0;background:linear-gradient(90deg,var(--water),var(--amber),var(--rust));border-radius:1px;animation:progressFill 2.5s 2s linear forwards;}@keyframes progressFill{0%{width:0}100%{width:100%}}@keyframes fadeInUp{0%{opacity:0;transform:translateY(16px)}100%{opacity:1;transform:translateY(0)}}@keyframes fadeIn{0%{opacity:0}100%{opacity:1}}/* ===== 主页面（被遮住，入场后显示） ===== */
.app-shell{width:100%;height:100%;display:flex;flex-direction:column;}.app-frame{flex:1;border:none;width:100%;}/* 底部Tab */
.bottom-tab{height:68px;background:rgba(11,15,30,.96);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);border-top:1px solid rgba(255,255,255,.04);display:flex;align-items:flex-start;padding-top:8px;flex-shrink:0;}.tab-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;text-decoration:none;-webkit-user-select:none;user-select:none;transition:all .2s;position:relative;}.tab-item:active{transform:scale(.9)}.tab-icon-wrap{width:28px;height:28px;display:flex;align-items:center;justify-content:center;transition:all .25s;}.tab-icon-wrap svg{width:22px;height:22px;transition:all .25s;}.tab-label{font-size:10px;font-weight:500;transition:color .25s;letter-spacing:.5px}/* 五行配色 — 默认态 */
.tab-item[data-color="gold"] .tab-icon-wrap svg{fill:rgba(232,180,76,.25);stroke:rgba(232,180,76,.25)}.tab-item[data-color="water"] .tab-icon-wrap svg{fill:rgba(74,158,184,.25);stroke:rgba(74,158,184,.25)}.tab-item[data-color="fire"] .tab-icon-wrap svg{fill:rgba(217,107,107,.25);stroke:rgba(217,107,107,.25)}.tab-item[data-color="earth"] .tab-icon-wrap svg{fill:rgba(155,123,191,.25);stroke:rgba(155,123,191,.25)}.tab-item[data-color="wood"] .tab-icon-wrap svg{fill:rgba(160,184,122,.25);stroke:rgba(160,184,122,.25)}.tab-item .tab-label{color:rgba(255,255,255,.3)}/* 五行配色 — active态 */
.tab-item.active[data-color="gold"] .tab-icon-wrap svg{fill:var(--amber);stroke:var(--amber);filter:drop-shadow(0 0 6px rgba(232,180,76,.5))}.tab-item.active[data-color="water"] .tab-icon-wrap svg{fill:var(--water);stroke:var(--water);filter:drop-shadow(0 0 6px rgba(74,158,184,.5))}.tab-item.active[data-color="fire"] .tab-icon-wrap svg{fill:var(--rust);stroke:var(--rust);filter:drop-shadow(0 0 6px rgba(217,107,107,.5))}.tab-item.active[data-color="earth"] .tab-icon-wrap svg{fill:var(--earth);stroke:var(--earth);filter:drop-shadow(0 0 6px rgba(155,123,191,.5))}.tab-item.active[data-color="wood"] .tab-icon-wrap svg{fill:var(--wood);stroke:var(--wood);filter:drop-shadow(0 0 6px rgba(160,184,122,.5))}.tab-item.active .tab-label{color:rgba(255,255,255,.9);font-weight:600}</style>
</head>
<body> <div class="splash" id="splash"> <div class="splash-stars" id="splashStars"></div> <div class="splash-glow" style="width:200px;height:200px;background:var(--amber);top:15%;left:10%;--dur:5s;--delay:0s"></div> <div class="splash-glow" style="width:180px;height:180px;background:var(--water);top:60%;right:5%;--dur:6s;--delay:1s"></div> <div class="splash-glow" style="width:160px;height:160px;background:var(--rust);bottom:20%;left:20%;--dur:4.5s;--delay:0.5s"></div> <div class="splash-glow" style="width:140px;height:140px;background:var(--earth);top:30%;right:25%;--dur:5.5s;--delay:1.5s"></div> <div class="splash-glow" style="width:120px;height:120px;background:var(--wood);bottom:35%;right:30%;--dur:7s;--delay:2s"></div> <div class="splash-logo">T</div> <div class="splash-text"> <div class="splash-eyebrow">T O P O O</div> <div class="splash-main"> 如果你是一个<em>有趣的灵魂</em>……<br> 欢迎来到<em>Topoo</em>~ </div> </div> <div class="splash-slogan">让小而美被世界看见</div> <div class="splash-skip" id="skipBtn">跳过</div> <div class="splash-progress"> <div class="splash-progress-bar"></div> </div>
</div> <div class="app-shell"> <iframe class="app-frame" id="appFrame" src="about:blank" allow="accelerometer; gyroscope"></iframe> <div class="bottom-tab" id="bottomTab"> <a href="javascript:void(0)" class="tab-item active" data-page="导航一星图首页.html" data-color="gold" onclick="switchTab(event,this)"> <div class="tab-icon-wrap"> <svg viewBox="0 0 24 24" fill="none"> <circle cx="12" cy="12" r="2.5" fill="currentColor" opacity="0.9"/> <ellipse cx="12" cy="12" rx="5" ry="2" stroke="currentColor" stroke-width="1" opacity="0.5" transform="rotate(-30 12 12)"/> <ellipse cx="12" cy="12" rx="8" ry="3" stroke="currentColor" stroke-width="1" opacity="0.3" transform="rotate(20 12 12)"/> <circle cx="6" cy="8" r="0.8" fill="currentColor" opacity="0.6"/> <circle cx="18" cy="7" r="0.6" fill="currentColor" opacity="0.5"/> <circle cx="17" cy="17" r="0.7" fill="currentColor" opacity="0.4"/> <circle cx="7" cy="16" r="0.5" fill="currentColor" opacity="0.5"/> </svg> </div> <div class="tab-label">星图</div> </a> <a href="javascript:void(0)" class="tab-item" data-page="导航二故事首页.html" data-color="water" onclick="switchTab(event,this)"> <div class="tab-icon-wrap"> <svg viewBox="0 0 24 24" fill="none"> <circle cx="12" cy="12" r="1.5" fill="currentColor"/> <path d="M12 7a5 5 0 100 10 5 5 0 000-10" stroke="currentColor" stroke-width="1.2" opacity="0.7" fill="none"/> <path d="M12 4.5a7.5 7.5 0 100 15 7.5 7.5 0 000-15" stroke="currentColor" stroke-width="1" opacity="0.4" fill="none"/> <path d="M5 12h2M17 12h2M12 5v2M12 17v2" stroke="currentColor" stroke-width="0.8" opacity="0.3" stroke-linecap="round"/> </svg> </div> <div class="tab-label">故事</div> </a> <a href="javascript:void(0)" class="tab-item" data-page="导航三碰撞首页.html" data-color="fire" onclick="switchTab(event,this)"> <div class="tab-icon-wrap"> <svg viewBox="0 0 24 24" fill="none"> <circle cx="8" cy="12" r="3" fill="currentColor" opacity="0.7"/> <circle cx="16" cy="12" r="3" fill="currentColor" opacity="0.7"/> <path d="M11 9l2-2M11 15l2 2M13 9l-2-2M13 15l-2 2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" opacity="0.9"/> <circle cx="12" cy="12" r="1.5" fill="currentColor" opacity="0.5"/> <path d="M8 8.5c1.5-1.5 5-1.5 6.5 0" stroke="currentColor" stroke-width="0.8" opacity="0.4" fill="none"/> <path d="M8 15.5c1.5 1.5 5 1.5 6.5 0" stroke="currentColor" stroke-width="0.8" opacity="0.4" fill="none"/> </svg> </div> <div class="tab-label">碰撞</div> </a> <a href="javascript:void(0)" class="tab-item" data-page="导航四广场首页.html" data-color="earth" onclick="switchTab(event,this)"> <div class="tab-icon-wrap"> <svg viewBox="0 0 24 24" fill="none"> <circle cx="12" cy="12" r="3" fill="currentColor" opacity="0.8"/> <path d="M12 12 Q8 8 5 9 Q3 10 4 13" stroke="currentColor" stroke-width="1.2" opacity="0.5" fill="none" stroke-linecap="round"/> <path d="M12 12 Q16 8 19 9 Q21 10 20 13" stroke="currentColor" stroke-width="1.2" opacity="0.5" fill="none" stroke-linecap="round"/> <path d="M12 12 Q8 16 5 15 Q3 14 4 11" stroke="currentColor" stroke-width="1.2" opacity="0.5" fill="none" stroke-linecap="round"/> <path d="M12 12 Q16 16 19 15 Q21 14 20 11" stroke="currentColor" stroke-width="1.2" opacity="0.5" fill="none" stroke-linecap="round"/> <circle cx="6" cy="7" r="0.7" fill="currentColor" opacity="0.4"/> <circle cx="18" cy="7" r="0.6" fill="currentColor" opacity="0.4"/> <circle cx="6" cy="17" r="0.6" fill="currentColor" opacity="0.4"/> <circle cx="18" cy="17" r="0.7" fill="currentColor" opacity="0.4"/> </svg> </div> <div class="tab-label">广场</div> </a> <a href="javascript:void(0)" class="tab-item" data-page="导航五我的首页.html" data-color="wood" onclick="switchTab(event,this)"> <div class="tab-icon-wrap"> <svg viewBox="0 0 24 24" fill="none"> <path d="M12 22v-8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/> <path d="M12 14c-2.5-1-4-3-4-5.5a4 4 0 018 0c0 2.5-1.5 4.5-4 5.5z" fill="currentColor" opacity="0.3" stroke="currentColor" stroke-width="1"/> <path d="M12 10c-1-0.5-1.8-1.5-1.8-2.8a1.8 1.8 0 013.6 0c0 1.3-0.8 2.3-1.8 2.8z" fill="currentColor" opacity="0.6"/> <circle cx="8" cy="12" r="0.6" fill="currentColor" opacity="0.4"/> <circle cx="16" cy="11" r="0.5" fill="currentColor" opacity="0.4"/> <circle cx="9" cy="8" r="0.4" fill="currentColor" opacity="0.3"/> <circle cx="15" cy="7" r="0.4" fill="currentColor" opacity="0.3"/> <path d="M10 22c0-1 0.8-1.5 2-1.5s2 0.5 2 1.5" stroke="currentColor" stroke-width="0.8" opacity="0.3" fill="none"/> </svg> </div> <div class="tab-label">我的</div> </a> </div>
</div> <script>// ===== 星空生成 =====
(function(){var c=document.getElementById('splashStars');for(var i=0;i<50;i++){var s=document.createElement('div');s.className='splash-star';s.style.left=Math.random()*100+'%';s.style.top=Math.random()*100+'%';var size=Math.random()*2+0.5;s.style.width=size+'px';s.style.height=size+'px';s.style.setProperty('--dur',(Math.random()*3+2)+'s');s.style.animationDelay=Math.random()*3+'s';c.appendChild(s);}})();// 获取当前页面所在目录
var basePath = location.href.substring(0,location.href.lastIndexOf('/') + 1);// ===== 入场逻辑 =====
var splash=document.getElementById('splash');var frame=document.getElementById('appFrame');var jumped=false;function enterApp(){if(jumped)return;jumped=true;splash.classList.add('fade-out');frame.src=basePath + '导航一星图首页.html';setTimeout(function(){splash.style.display='none';},900);}// 跳过按钮
document.getElementById('skipBtn').addEventListener('click',enterApp);// 自动跳转（进度条走完后）
setTimeout(function(){if(!jumped)enterApp();},4500);// ===== Tab切换 =====
function switchTab(e,el){e.preventDefault();var page=el.getAttribute('data-page');console.log('switchTab called,page:',page);console.log('jumped:',jumped,'splash display:',splash.style.display);// 切换active var tabs=document.querySelectorAll('.tab-item');tabs.forEach(function(t){t.classList.remove('active')});el.classList.add('active');// 切换iframe - 使用绝对路径 frame.src=basePath + page;console.log('frame.src set to:',frame.src);// 确保splash已隐藏 if(splash.style.display!=='none'){splash.style.display='none';}// 滚回顶部 try{frame.contentWindow.scrollTo(0,0)}catch(e){}}// 监听iframe内的点击事件，同步Tab高亮（子页面点击底部Tab时）
window.addEventListener('message',function(e){if(e.data&&e.data.tab){var tabs=document.querySelectorAll('.tab-item');var map={'星图':'导航一星图首页.html','故事':'导航二故事首页.html','碰撞':'导航三碰撞首页.html','广场':'导航四广场首页.html','我的':'导航五我的首页.html'};var target=map[e.data.tab];if(target){tabs.forEach(function(t){t.classList.toggle('active',t.getAttribute('data-page')===target);});if(frame.src.indexOf(target)<0) frame.src=target;}}});</script>
</body>
