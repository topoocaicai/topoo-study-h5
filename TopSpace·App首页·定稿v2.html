<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>TopSpace · 星图</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
body { font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Helvetica Neue",sans-serif; background:#0B0F1E; color:#ccc; overflow-x:hidden; padding-bottom:65px; }

/* 状态栏 */
.topbar { display:flex; justify-content:space-between; align-items:center; padding:12px 18px; background:rgba(11,15,30,.95); position:sticky; top:0; z-index:100; backdrop-filter:blur(14px); border-bottom:1px solid rgba(255,255,255,.03); }
.loc { display:flex; align-items:center; gap:7px; position:relative; }
.pin { width:20px;height:20px; background:linear-gradient(135deg,#E8B44C,#F5D276); border-radius:50% 50% 50% 0; transform:rotate(-45deg); display:flex; align-items:center; justify-content:center; }
.pin::after { content:''; width:5px;height:5px; background:#0B0F1E; border-radius:50%; transform:rotate(45deg); }
.loc-txt { font-size:15px; font-weight:700; color:#F5F0E8; cursor:pointer; user-select:none; }
.loc-sub { font-size:11px; color:#8A8578; cursor:pointer; user-select:none; }
.loc-sub::after { content:'▾'; margin-left:3px; font-size:9px; }
.loc-txt::after { content:'▾'; margin-left:4px; font-size:10px; }

/* 下拉菜单通用 */
.dropdown-menu {
  position:absolute; top:calc(100% + 8px); left:0;
  background:rgba(15,20,36,.98); border:1px solid rgba(255,255,255,.08);
  border-radius:14px; padding:6px 0; min-width:160px;
  backdrop-filter:blur(18px); z-index:300;
  opacity:0; pointer-events:none; transform:translateY(-6px);
  transition:opacity .2s, transform .2s;
}
.dropdown-menu.show { opacity:1; pointer-events:auto; transform:translateY(0); }
.dropdown-item {
  padding:11px 18px; font-size:13px; color:#ccc; cursor:pointer;
  transition:background .15s, color .15s; display:flex; align-items:center; gap:8px;
}
.dropdown-item:first-child { border-radius:14px 14px 0 0; }
.dropdown-item:last-child { border-radius:0 0 14px 14px; }
.dropdown-item:only-child { border-radius:14px; }
.dropdown-item:active { background:rgba(255,255,255,.05); }
.dropdown-item.disabled { color:#444; cursor:default; }
.dropdown-item.disabled:active { background:transparent; }

#blockDropdown { left:auto; right:0; }

.hd-acts { display:flex; gap:10px; position:relative; }
.hbtn { width:32px;height:32px; border-radius:50%; background:rgba(255,255,255,.05); border:none; color:#8A8578; font-size:14px; cursor:pointer; display:flex; align-items:center; justify-content:center; }
.hbtn.on { background:rgba(232,180,76,.1); color:#E8B44C; }

/* 注意力 */
.attbar { display:flex; align-items:center; gap:9px; padding:9px 18px; background:rgba(255,255,255,.008); border-bottom:1px solid rgba(255,255,255,.02); }
.att-lbl { font-size:11px; color:#8A8578; flex-shrink:0; }
.adots { display:flex; gap:3.5px; flex:1; }
.ado { width:6.5px;height:6.5px; border-radius:50%; background:rgba(232,180,76,.1); }
.ado.on { background:#E8B44C; box-shadow:0 0 5px rgba(232,180,76,.3); }
.aval { font-size:11px; color:#E8B44C; font-weight:700; flex-shrink:0; }

/* ===== 球体地图区域 ===== */
.sphere-wrap {
  position:relative; width:100%;
  height:60vh;
  min-height:320px;
  background:linear-gradient(180deg,#080C1A 0%,#0B0F1E 70%,#0D1120 100%);
  overflow:hidden;
}
/* 进入平面图按钮 */
.plan-btn-wrap {
  display:flex; justify-content:center;
  padding:36px 24px 80px;
  position:relative; z-index:500;
}
.plan-btn {
  width:100%; max-width:380px;
  padding:14px 0; border-radius:14px;
  border:1.5px solid rgba(232,180,76,.35);
  background:rgba(232,180,76,.06);
  color:#E8B44C; font-size:15px; font-weight:700;
  letter-spacing:2px; cursor:pointer;
  transition:background .2s, transform .15s;
}
.plan-btn:active {
  background:rgba(232,180,76,.15);
  transform:scale(.97);
}
.sphere-glow {
  position:absolute; top:50%; left:50%;
  transform:translate(-50%,-50%);
  width:300px; height:300px; border-radius:50%;
  background:radial-gradient(circle, rgba(74,158,184,.07) 0%, transparent 70%);
  pointer-events:none;
}
.sphere-container {
  position:absolute; top:50%; left:50%;
  transform:translate(calc(-50% + var(--pan-x,0px)), calc(-50% + var(--pan-y,0px))) scale(var(--zoom,1));
  width:420px; height:420px;
  transform-origin:center center;
}
#sphere-svg { width:100%; height:100%; overflow:visible; cursor:grab; }
#sphere-svg:active { cursor:grabbing; }
.sphere-hint {
  position:absolute; bottom:12px; left:50%;
  transform:translateX(-50%);
  font-size:10px; color:rgba(245,240,232,.2);
  letter-spacing:1px; pointer-events:none; white-space:nowrap;
}

/* 碰撞FAB */
.cfab { position:absolute;bottom:16px;right:16px;width:50px;height:50px;border-radius:50%;background:linear-gradient(135deg,#E8B44C,#F5D276);border:none;color:#0B0F1E;font-size:18px;font-weight:800;cursor:pointer;box-shadow:0 5px 22px rgba(232,180,76,.4);z-index:30;display:flex;align-items:center;justify-content:center; }
.cfab:active { transform:scale(.9); }

/* 信息卡弹层 */
.info-overlay {
  position:fixed; inset:0; background:rgba(0,0,0,.65);
  backdrop-filter:blur(10px); z-index:200;
  display:flex; align-items:center; justify-content:center;
  padding:20px;
  opacity:0; pointer-events:none; transition:opacity .25s;
}
.info-overlay.show { opacity:1; pointer-events:auto; }
.info-card {
  position:relative; width:100%; max-width:380px;
  border-radius:20px; overflow:hidden;
  background:#0F1424;
  border:1px solid rgba(255,255,255,.07);
  padding:24px 20px 28px;
  transform:scale(.92) translateY(12px); transition:transform .3s cubic-bezier(.25,.8,.25,1);
  box-shadow:0 20px 60px rgba(0,0,0,.5);
}
.info-overlay.show .info-card { transform:scale(1) translateY(0); }
.info-card-bg {
  position:absolute; inset:0; opacity:.18; pointer-events:none;
}
.card-top { display:flex; align-items:center; gap:14px; margin-bottom:18px; position:relative; }
.card-avatar {
  width:52px; height:52px; border-radius:14px;
  display:flex; align-items:center; justify-content:center;
  font-size:24px; border:1.5px solid transparent;
}
.card-name { font-size:18px; font-weight:700; color:#F5F0E8; }
.card-type { font-size:12px; margin-top:3px; }
.card-secluded-badge {
  font-size:10px; padding:2px 8px; border-radius:6px;
  background:rgba(255,255,255,.06); color:#666;
  margin-left:8px; display:none;
}
.card-stats { display:flex; gap:20px; margin-bottom:18px; position:relative; }
.card-stat { text-align:center; }
.card-stat-val { font-size:20px; font-weight:700; color:#F5F0E8; }
.card-stat-lbl { font-size:10px; color:#8A8578; margin-top:2px; }
.card-elements {
  display:flex; gap:8px; margin-bottom:20px; position:relative;
}
.element-item { flex:1; background:rgba(255,255,255,.03); border-radius:10px; padding:10px 6px; text-align:center; border:1px solid rgba(255,255,255,.04); }
.element-icon { font-size:14px; }
.element-value { font-size:15px; font-weight:700; margin-top:2px; }
.element-label { font-size:9px; color:rgba(245,240,232,.4); margin-top:1px; }
.card-btn {
  width:100%; padding:14px; border-radius:12px;
  border:none; font-size:14px; font-weight:700;
  letter-spacing:3px; cursor:pointer; position:relative;
  background:linear-gradient(135deg,#E8B44C,#F5D276); color:#0B0F1E;
  box-shadow:0 4px 18px rgba(232,180,76,.25);
}
.card-btn:active { transform:scale(.97); }
.card-close {
  position:absolute; top:16px; right:16px;
  width:28px; height:28px; border-radius:50%;
  background:rgba(255,255,255,.07); border:none;
  color:#8A8578; font-size:14px; cursor:pointer;
  display:flex; align-items:center; justify-content:center;
}

/* 底部Tab */
.tbar { position:fixed;bottom:0;left:0;right:0;height:60px;background:rgba(11,15,30,.97);backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);display:flex;justify-content:space-around;align-items:center;border-top:1px solid rgba(255,255,255,.025);z-index:1000;padding-bottom:env(safe-area-inset-bottom); }
.ti { display:flex;flex-direction:column;align-items:center;gap:2px;cursor:pointer;padding:4px 11px;border-radius:7px; }
.tic { font-size:18px;line-height:1;filter:grayscale(.6) brightness(.55);transition:filter .2s; }
.til { font-size:9px;color:#555;font-weight:600;transition:color .2s; }
.ti.on .tic { filter:none; }
.ti.on .til { color:#E8B44C; }

/* ===== 搜索弹层 ===== */
.search-overlay {
  position:fixed; inset:0; background:rgba(0,0,0,.7);
  backdrop-filter:blur(12px); z-index:250;
  display:flex; flex-direction:column; align-items:center;
  padding-top:env(safe-area-inset-top,20px);
  opacity:0; pointer-events:none; transition:opacity .25s;
}
.search-overlay.show { opacity:1; pointer-events:auto; }
.search-box {
  width:calc(100% - 36px); max-width:420px;
  margin-top:12px;
  display:flex; align-items:center; gap:10px;
  background:rgba(255,255,255,.06); border:1px solid rgba(255,255,255,.1);
  border-radius:14px; padding:12px 16px;
}
.search-box input {
  flex:1; background:none; border:none; outline:none;
  color:#F5F0E8; font-size:15px; font-family:inherit;
}
.search-box input::placeholder { color:rgba(245,240,232,.25); }
.search-close {
  width:28px; height:28px; border-radius:50%;
  background:rgba(255,255,255,.08); border:none;
  color:#8A8578; font-size:13px; cursor:pointer;
  display:flex; align-items:center; justify-content:center; flex-shrink:0;
}
.search-results {
  width:calc(100% - 36px); max-width:420px;
  margin-top:12px;
  display:flex; flex-direction:column; gap:0;
  max-height:50vh; overflow-y:auto;
}
.search-result-item {
  display:flex; align-items:center; gap:12px;
  padding:13px 16px; border-radius:12px;
  cursor:pointer; transition:background .15s;
}
.search-result-item:active { background:rgba(255,255,255,.05); }
.sr-emoji { font-size:22px; width:36px; height:36px; border-radius:10px; background:rgba(255,255,255,.04); display:flex; align-items:center; justify-content:center; flex-shrink:0; }
.sr-name { font-size:14px; color:#F5F0E8; font-weight:600; }
.sr-type { font-size:11px; color:#8A8578; margin-top:2px; }
.search-empty { text-align:center; color:#555; font-size:13px; padding:30px 0; }

/* ===== 音乐对话框 ===== */
.music-overlay {
  position:fixed; inset:0; background:rgba(0,0,0,.6);
  z-index:260; display:flex; align-items:center; justify-content:center;
  opacity:0; pointer-events:none; transition:opacity .25s;
}
.music-overlay.show { opacity:1; pointer-events:auto; }
.music-dialog {
  width:calc(100% - 48px); max-width:320px;
  background:rgba(15,20,36,.98); border:1px solid rgba(255,255,255,.08);
  border-radius:20px; padding:28px 24px 24px;
  backdrop-filter:blur(18px);
  transform:scale(.92); transition:transform .3s cubic-bezier(.25,.8,.25,1);
}
.music-overlay.show .music-dialog { transform:scale(1); }
.music-title { font-size:16px; font-weight:700; color:#F5F0E8; text-align:center; margin-bottom:6px; }
.music-sub { font-size:11px; color:#8A8578; text-align:center; margin-bottom:22px; }
.music-toggle {
  display:flex; align-items:center; justify-content:space-between;
  padding:14px 0; border-top:1px solid rgba(255,255,255,.04);
}
.music-toggle-lbl { font-size:14px; color:#ccc; }
.music-switch {
  width:48px; height:28px; border-radius:14px;
  background:rgba(255,255,255,.1); border:none; cursor:pointer;
  position:relative; transition:background .25s;
}
.music-switch.on { background:rgba(232,180,76,.4); }
.music-switch::after {
  content:''; position:absolute; top:3px; left:3px;
  width:22px; height:22px; border-radius:50%;
  background:#555; transition:left .25s, background .25s;
}
.music-switch.on::after { left:23px; background:#E8B44C; }
.music-close-btn {
  width:100%; padding:12px; border-radius:12px; border:none;
  background:rgba(232,180,76,.08); color:#E8B44C;
  font-size:14px; font-weight:700; cursor:pointer;
  margin-top:18px; letter-spacing:2px; transition:background .2s;
}
.music-close-btn:active { background:rgba(232,180,76,.18); }

/* ===== 能量说明弹层 ===== */
.energy-overlay {
  position:fixed; inset:0; background:rgba(0,0,0,.65);
  backdrop-filter:blur(10px); z-index:240;
  display:flex; align-items:center; justify-content:center;
  padding:20px;
  opacity:0; pointer-events:none; transition:opacity .25s;
}
.energy-overlay.show { opacity:1; pointer-events:auto; }
.energy-card {
  width:100%; max-width:340px;
  background:rgba(15,20,36,.98); border:1px solid rgba(232,180,76,.15);
  border-radius:20px; padding:28px 22px 24px;
  backdrop-filter:blur(18px);
  transform:scale(.92); transition:transform .3s cubic-bezier(.25,.8,.25,1);
  box-shadow:0 0 40px rgba(232,180,76,.08);
}
.energy-overlay.show .energy-card { transform:scale(1); }
.energy-icon { font-size:36px; text-align:center; margin-bottom:10px; }
.energy-title { font-size:17px; font-weight:700; color:#E8B44C; text-align:center; margin-bottom:6px; }
.energy-sub { font-size:11px; color:#8A8578; text-align:center; margin-bottom:20px; }
.energy-item { display:flex; align-items:center; gap:10px; padding:10px 0; border-top:1px solid rgba(255,255,255,.03); }
.energy-item-icon { font-size:18px; flex-shrink:0; }
.energy-item-text { font-size:13px; color:#ccc; }
.energy-item-val { font-size:12px; color:#E8B44C; font-weight:700; margin-left:auto; flex-shrink:0; }
.energy-close {
  width:100%; padding:12px; border-radius:12px; border:none;
  background:rgba(232,180,76,.1); color:#E8B44C;
  font-size:14px; font-weight:700; cursor:pointer;
  margin-top:20px; letter-spacing:2px; transition:background .2s;
}
.energy-close:active { background:rgba(232,180,76,.2); }

/* ===== 搜索高亮 ===== */
.search-highlight { filter:drop-shadow(0 0 8px rgba(232,180,76,.8)); }
</style>
</head>
<body>

<!-- 状态栏 -->
<div class="topbar">
  <div class="loc">
    <div class="pin"></div>
    <span class="loc-txt" id="blockToggle">蛋生壹号街区</span>
    <span class="loc-sub" id="continentToggle">金陵大陆</span>
    <!-- 街区下拉 -->
    <div class="dropdown-menu" id="blockDropdown">
      <div class="dropdown-item disabled">贰号街区<span style="color:#666;font-size:11px;margin-left:6px;">（待开启）</span></div>
    </div>
    <!-- 大陆下拉 -->
    <div class="dropdown-menu" id="continentDropdown">
      <div class="dropdown-item disabled">姑苏大陆<span style="color:#666;font-size:11px;margin-left:6px;">（待开放）</span></div>
      <div class="dropdown-item disabled">天府大陆<span style="color:#666;font-size:11px;margin-left:6px;">（待开放）</span></div>
    </div>
  </div>
  <div class="hd-acts">
    <button class="hbtn" id="searchBtn">&#x1F50D;</button>
    <button class="hbtn on" id="musicBtn">&#x2699;&#xFE0F;</button>
  </div>
</div>

<!-- 搜索弹层 -->
<div class="search-overlay" id="searchOverlay">
  <div class="search-box">
    <input type="text" id="searchInput" placeholder="搜索创造者名字…" autocomplete="off">
    <button class="search-close" id="searchClose">&#x2715;</button>
  </div>
  <div class="search-results" id="searchResults"></div>
</div>

<!-- 音乐对话框 -->
<div class="music-overlay" id="musicOverlay">
  <div class="music-dialog">
    <div class="music-title">&#x1F3B5; 音乐设置</div>
    <div class="music-sub">背景音乐将伴随你的探索旅程</div>
    <div class="music-toggle">
      <span class="music-toggle-lbl">&#x1F3B6; 背景音乐</span>
      <button class="music-switch" id="musicSwitch"></button>
    </div>
    <button class="music-close-btn" id="musicCloseBtn">确 定</button>
  </div>
</div>

<!-- 能量说明弹层 -->
<div class="energy-overlay" id="energyOverlay">
  <div class="energy-card">
    <div class="energy-icon">&#x26A1;</div>
    <div class="energy-title">宇宙能量</div>
    <div class="energy-sub">来自你的每一次探索和连接</div>
    <div class="energy-item">
      <span class="energy-item-icon">&#x1F4AB;</span>
      <span class="energy-item-text">碰撞他人门牌</span>
      <span class="energy-item-val">+1</span>
    </div>
    <div class="energy-item">
      <span class="energy-item-icon">&#x2728;</span>
      <span class="energy-item-text">点亮他人内容</span>
      <span class="energy-item-val">+3</span>
    </div>
    <div class="energy-item">
      <span class="energy-item-icon">&#x1F3E0;</span>
      <span class="energy-item-text">街区加成</span>
      <span class="energy-item-val">+0.5/人</span>
    </div>
    <div class="energy-item">
      <span class="energy-item-icon">&#x1F31F;</span>
      <span class="energy-item-text">被他人点亮</span>
      <span class="energy-item-val">+2</span>
    </div>
    <button class="energy-close" id="energyCloseBtn">知 道 了</button>
  </div>
</div>

<!-- 注意力 -->
<div class="attbar">
  <span class="att-lbl">&#x26A1; 注意力</span>
  <div class="adots">
    <div class="ado on"></div><div class="ado on"></div><div class="ado on"></div>
    <div class="ado on"></div><div class="ado on"></div><div class="ado on"></div>
    <div class="ado on"></div><div class="ado"></div><div class="ado"></div><div class="ado"></div>
  </div>
  <span class="aval">7 / 10</span>
</div>

<!-- 球体地图 -->
<div class="sphere-wrap" id="sphereWrap">
  <div class="sphere-glow"></div>
  <div class="sphere-container" id="sphereContainer">
    <svg id="sphere-svg" viewBox="-210 -210 420 420"></svg>
  </div>
  <div class="sphere-hint">拖拽旋转 · 点击节点查看</div>
  <button class="cfab" id="cfab">&#x26A1;</button>
</div>

<!-- 进入街区地图按钮 -->
<div class="plan-btn-wrap">
  <a class="plan-btn" href="TopSpace星图2.html" style="text-decoration:none;display:flex;align-items:center;justify-content:center;">进 入 街 区 地 图</a>
</div>

<!-- 底部Tab栏：星图-故事-碰撞-广场-我的 -->
<div class="tbar">
  <div class="ti on">
    <div class="tic">&#x1F3D7;&#xFE0F;</div>
    <div class="til">星图</div>
  </div>
  <div class="ti">
    <div class="tic">&#x1F4D6;</div>
    <div class="til">故事</div>
  </div>
  <div class="ti">
    <div class="tic">&#x26A1;</div>
    <div class="til">碰撞</div>
  </div>
  <div class="ti">
    <div class="tic">&#x1F4E2;</div>
    <div class="til">广场</div>
  </div>
  <div class="ti">
    <div class="tic">&#x1F464;</div>
    <div class="til">我的</div>
  </div>
</div>

<!-- 信息卡弹层 -->
<div class="info-overlay" id="infoOverlay" onclick="closeCard(event)">
  <div class="info-card">
    <div class="info-card-bg" id="cardBg"></div>
    <button class="card-close" onclick="closeCard()">&#x2715;</button>
    <div class="card-top">
      <div class="card-avatar" id="cardAvatar"></div>
      <div>
        <div class="card-name" id="cardName"></div>
        <div class="card-type" id="cardType"></div>
        <span class="card-secluded-badge" id="cardSecluded">闭关中</span>
      </div>
    </div>
    <div class="card-stats">
      <div class="card-stat">
        <div class="card-stat-val" id="cardCollisions">—</div>
        <div class="card-stat-lbl">碰撞次数</div>
      </div>
      <div class="card-stat">
        <div class="card-stat-val" id="cardIgnitions">—</div>
        <div class="card-stat-lbl">点亮次数</div>
      </div>
    </div>
    <div class="card-elements" id="cardElements"></div>
    <button class="card-btn" id="cardBtn" onclick="closeCard()">进 入 空 间</button>
  </div>
</div>

<script>
// ===== 五行配色 =====
const EC = {
  fire:  { fill:'#D96B6B', bg:'rgba(217,107,107,0.15)', label:'🔥 火·门店型' },
  water: { fill:'#4A9EB8', bg:'rgba(74,158,184,0.15)',  label:'💧 水·内容型' },
  wood:  { fill:'#A0B87A', bg:'rgba(160,184,122,0.15)', label:'🌱 木·产品型' },
  metal: { fill:'#E8B44C', bg:'rgba(232,180,76,0.15)',  label:'⚙️ 金·服务型' },
  earth: { fill:'#9B7BBF', bg:'rgba(155,123,191,0.15)', label:'🌍 土·活动型' },
};
const SC = { fill:'#3A3A44', bg:'rgba(58,58,68,0.15)', label:'闭关中' };

// ===== Mock数据 =====
function genNodes() {
  const NAMES = ['星尘','流光','青木','金石','厚土','晨露','焱焰','碧藤','银铃','琥珀','极光','赤松','云归','霜降','岚烟','墨染','月蚀','星轨','潮汐','萤火','破晓','暮色','归鸿','逝川','空镜','浮岛','晚祷','迷迭','霜天','半夏','长风','微澜','寒烟','素履','清欢','南风','北望','东篱','西洲','中岳','白驹','苍狗','丹枫','碧落','紫陌','红尘','青瓦','墨客','诗酒','茶凉','听雨','看云','临风','对月','烹茶','煮酒','抚琴','对弈','听涛','观海','织锦','刺绣','烧瓷','炼铁','琢玉','雕木','垒石','筑土','引水','开山','拾光','捕风','捉影','留香','寄梦','托月','挽星','摘云','渡舟','归帆','踏雪','寻梅','访菊','问兰','采薇','钓雪','锄月','种云','栽星','养光','无声','未央','不系','无疆','自在','如初','似锦','归零','出发','抵达'];
  const EMOJIS = ['🌙','✨','🌿','💎','🏔️','💧','🔥','🌱','🔔','🟤','🌈','🎋','⭐','🌊','🍃','🗿','🌾','🔮','🎐','💫','🦊','🐉','🦉','🐚','🌺','🌸','🍂','🌻','🌷','🌹','⚗️','🔭','🧬','📡','🔬','🔧','⚙️','🛠️','🧭','💊','📖','✍️','🎵','🎶','🎸','🎹','🎺','🎻','🥁','🎤'];
  const ELS = ['fire','water','wood','metal','earth'];
  const secs = new Set();
  while(secs.size < 15) secs.add(Math.floor(Math.random()*100));
  return Array.from({length:100},(_,i)=>({
    id:i+1, name:NAMES[i]||('节点'+(i+1)), emoji:EMOJIS[i%EMOJIS.length],
    element:ELS[i%5], secluded:secs.has(i),
    fire:30+Math.floor(Math.random()*70), water:30+Math.floor(Math.random()*70),
    wood:30+Math.floor(Math.random()*70), metal:30+Math.floor(Math.random()*70),
    earth:30+Math.floor(Math.random()*70),
    collisions:Math.floor(Math.random()*500), ignitions:Math.floor(Math.random()*80)
  }));
}
const NODES = genNodes();

// ===== 球体参数 =====
const R = 175;
let nodes3D=[], edges=[], rotX=-18, rotY=-12, dragging=false, lastMX=0, lastMY=0;
let zoom=1, panX=0, panY=0, pinchDist0=0, zoom0=1, panX0=0, panY0=0, pmx=0, pmy=0;
let highlightedNodes = [];

function initSphere() {
  nodes3D=[]; edges=[];
  const ga = Math.PI*(3-Math.sqrt(5));
  for(let i=0;i<NODES.length;i++){
    const y=1-(i/(NODES.length-1))*2, r=Math.sqrt(1-y*y), t=ga*i;
    let x=Math.cos(t)*r, z=Math.sin(t)*r;
    const j=0.06;
    let x2=x+(Math.sin(i*7.3)*.5+Math.cos(i*3.1)*.5)*j;
    let yn=y+(Math.sin(i*5.7)*.5+Math.cos(i*3.1)*.5)*j;
    let z2=z+(Math.sin(i*4.1)*.5+Math.cos(i*6.7)*.5)*j;
    const l=Math.sqrt(x2*x2+yn*yn+z2*z2); x2/=l; yn/=l; z2/=l;
    nodes3D.push({x:x2*R,y:yn*R,z:z2*R, size:3+Math.random()*7, nd:NODES[i], el:NODES[i].element, sec:NODES[i].secluded});
  }
  for(let i=0;i<nodes3D.length;i++){
    const ds=nodes3D.map((n,j)=>({j,d:j===i?Infinity:Math.sqrt((n.x-nodes3D[i].x)**2+(n.y-nodes3D[i].y)**2+(n.z-nodes3D[i].z)**2)})).sort((a,b)=>a.d-b.d);
    for(let k=0;k<3;k++){const j=ds[k].j,key=Math.min(i,j)+'-'+Math.max(i,j);if(!edges.find(e=>e.key===key))edges.push({f:i,t:j,key});}
  }
  render(); bindEvents();
}

function rot(p,rx,ry){
  let {x,y,z}=p;
  const cry=Math.cos(ry*Math.PI/180),sry=Math.sin(ry*Math.PI/180),x2=x*cry-z*sry,z2=x*sry+z*cry;
  const crx=Math.cos(rx*Math.PI/180),srx=Math.sin(rx*Math.PI/180),y2=y*crx-z2*srx,z3=y*srx+z2*crx;
  return {x:x2,y:y2,z:z3};
}
function proj(p){const s=420/(420+p.z);return{sx:p.x*s,sy:p.y*s,z:p.z,sc:s};}

function render(){
  const svg=document.getElementById('sphere-svg');
  svg.innerHTML='';
  const pr=nodes3D.map((n,i)=>{const rp=rot(n,rotX,rotY),pp=proj(rp);return{...n,...pp,idx:i,front:rp.z>-R*0.15};});
  edges.forEach(e=>{
    const a=pr[e.f],b=pr[e.t];
    if(Math.min(a.z,b.z)>-R*0.1){
      const op=0.05+((a.z+b.z)/2/R+0.5)*0.16;
      const ln=document.createElementNS('http://www.w3.org/2000/svg','line');
      ln.setAttribute('x1',a.sx);ln.setAttribute('y1',a.sy);ln.setAttribute('x2',b.sx);ln.setAttribute('y2',b.sy);
      ln.setAttribute('stroke','rgba(245,240,232,'+op+')');ln.setAttribute('stroke-width','0.5');
      svg.appendChild(ln);
    }
  });
  [...pr].sort((a,b)=>a.z-b.z).forEach(p=>{
    const df=(p.z+R)/(2*R), no=0.15+df*0.85, r=Math.max(1,p.size*p.sc);
    const c=p.sec?SC:EC[p.el], fo=p.sec?no*0.45:no;
    const ci=document.createElementNS('http://www.w3.org/2000/svg','circle');
    ci.setAttribute('cx',p.sx);ci.setAttribute('cy',p.sy);ci.setAttribute('r',r);
    ci.setAttribute('fill',c.fill);ci.setAttribute('opacity',fo.toString());
    if (highlightedNodes.includes(p.idx)) { ci.classList.add('search-highlight'); ci.setAttribute('opacity','1'); }
    if(p.front&&no>0.38){ci.style.cursor='pointer';ci.addEventListener('click',ev=>{ev.stopPropagation();showCard(p.nd);});}
    else ci.style.pointerEvents='none';
    svg.appendChild(ci);
    if(fo>0.32&&p.front){
      const tx=document.createElementNS('http://www.w3.org/2000/svg','text');
      tx.setAttribute('x',p.sx);tx.setAttribute('y',p.sy+r+13);
      tx.setAttribute('text-anchor','middle');tx.setAttribute('fill',p.sec?'#555':'#F5F0E8');
      tx.setAttribute('font-size','9.5');tx.setAttribute('opacity',(fo*0.55).toString());
      tx.style.pointerEvents='none';tx.textContent=p.nd.name;svg.appendChild(tx);
    }
  });
}

function bindEvents(){
  const svg=document.getElementById('sphere-svg');
  svg.addEventListener('mousedown',e=>{dragging=true;lastMX=e.clientX;lastMY=e.clientY;});
  svg.addEventListener('touchstart',e=>{
    if(e.touches.length===2){dragging=false;pinchDist0=pd(e);zoom0=zoom;panX0=panX;panY0=panY;pmx=(e.touches[0].clientX+e.touches[1].clientX)/2;pmy=(e.touches[0].clientY+e.touches[1].clientY)/2;}
    else{dragging=true;lastMX=e.touches[0].clientX;lastMY=e.touches[0].clientY;}
  },{passive:false});
  window.addEventListener('mousemove',e=>{
    if(!dragging)return;rotY+=(e.clientX-lastMX)*.35;rotX+=(e.clientY-lastMY)*.35;rotX=Math.max(-85,Math.min(85,rotX));render();lastMX=e.clientX;lastMY=e.clientY;
  });
  window.addEventListener('touchmove',e=>{
    e.preventDefault();
    if(e.touches.length===2){const d=pd(e);if(pinchDist0>0){zoom=Math.max(.5,Math.min(3,zoom0*(d/pinchDist0)));panX=panX0+((e.touches[0].clientX+e.touches[1].clientX)/2-pmx);panY=panY0+((e.touches[0].clientY+e.touches[1].clientY)/2-pmy);applyZoom();}return;}
    if(!dragging)return;rotY+=(e.touches[0].clientX-lastMX)*.35;rotX+=(e.touches[0].clientY-lastMY)*.35;rotX=Math.max(-85,Math.min(85,rotX));render();lastMX=e.touches[0].clientX;lastMY=e.touches[0].clientY;
  },{passive:false});
  window.addEventListener('mouseup',()=>{dragging=false;pinchDist0=0;});
  window.addEventListener('touchend',e=>{
    if(e.touches.length===1){pinchDist0=0;dragging=true;lastMX=e.touches[0].clientX;lastMY=e.touches[0].clientY;}
    else{dragging=false;pinchDist0=0;}
  });
  svg.addEventListener('wheel',e=>{e.preventDefault();zoom=Math.max(.5,Math.min(3,zoom*(e.deltaY>0?.92:1.08)));applyZoom();},{passive:false});
}
function pd(e){const dx=e.touches[0].clientX-e.touches[1].clientX,dy=e.touches[0].clientY-e.touches[1].clientY;return Math.sqrt(dx*dx+dy*dy);}
function applyZoom(){const c=document.getElementById('sphereContainer');c.style.setProperty('--zoom',zoom);c.style.setProperty('--pan-x',panX+'px');c.style.setProperty('--pan-y',panY+'px');render();}

// ===== 信息卡 =====
function showCard(nd){
  const sec=nd.secluded, c=sec?SC:EC[nd.element];
  document.getElementById('cardAvatar').textContent=sec?'🪨':nd.emoji;
  document.getElementById('cardAvatar').style.background=c.bg;
  document.getElementById('cardAvatar').style.borderColor=c.fill+'40';
  document.getElementById('cardBg').style.background='linear-gradient(135deg,'+c.bg+' 0%,rgba(11,15,30,0.95) 100%)';
  document.getElementById('cardName').textContent=nd.name;
  document.getElementById('cardType').textContent=sec?'闭关中':c.label;
  document.getElementById('cardType').style.color=sec?'#666':c.fill;
  document.getElementById('cardSecluded').style.display=sec?'inline-block':'none';
  document.getElementById('cardCollisions').textContent=nd.collisions;
  document.getElementById('cardIgnitions').textContent=nd.ignitions;
  const EI={fire:'🔥',water:'💧',wood:'🌱',metal:'⚙️',earth:'🌍'};
  const EL={fire:'火',water:'水',wood:'木',metal:'金',earth:'土'};
  document.getElementById('cardElements').innerHTML=['fire','water','wood','metal','earth'].map(el=>
    `<div class="element-item"><div class="element-icon">${EI[el]}</div><div class="element-value" style="color:${sec?'#555':EC[el].fill}">${nd[el]}</div><div class="element-label">${EL[el]}</div></div>`
  ).join('');
  const btn=document.getElementById('cardBtn');
  if(sec){btn.textContent='闭 关 中';btn.style.opacity='.3';btn.style.pointerEvents='none';}
  else{btn.textContent='进 入 空 间';btn.style.opacity='1';btn.style.pointerEvents='auto';}
  document.getElementById('infoOverlay').classList.add('show');
}
function closeCard(e){
  if(e&&e.target!==document.getElementById('infoOverlay'))return;
  document.getElementById('infoOverlay').classList.remove('show');
}

// ===== 搜索功能 =====
document.getElementById('searchBtn').addEventListener('click',()=>{
  document.getElementById('searchOverlay').classList.add('show');
  document.getElementById('searchInput').focus();
  document.getElementById('searchInput').value='';
  document.getElementById('searchResults').innerHTML='';
});
document.getElementById('searchClose').addEventListener('click',()=>{
  document.getElementById('searchOverlay').classList.remove('show');
  clearHighlight();
});
document.getElementById('searchInput').addEventListener('input',function(){
  const q=this.value.trim().toLowerCase();
  const results=document.getElementById('searchResults');
  highlightedNodes=[];
  if(!q){ results.innerHTML=''; clearHighlight(); return; }
  const matches=NODES.filter(n=>n.name.toLowerCase().includes(q));
  if(matches.length===0){
    results.innerHTML='<div class="search-empty">未找到匹配的创造者</div>';
    clearHighlight(); return;
  }
  results.innerHTML=matches.map(n=>{
    const c=EC[n.element];
    return `<div class="search-result-item" onclick="highlightNode(${n.id})">
      <div class="sr-emoji">${n.emoji}</div>
      <div>
        <div class="sr-name">${n.name}</div>
        <div class="sr-type" style="color:${c.fill}">${c.label}</div>
      </div>
    </div>`;
  }).join('');
  highlightedNodes=matches.map(n=>n.id);
  render();
});
function highlightNode(id){
  document.getElementById('searchOverlay').classList.remove('show');
  highlightedNodes=[id];
  render();
  // 3秒后取消高亮
  setTimeout(()=>{ highlightedNodes=[]; render(); },6000);
}
function clearHighlight(){ highlightedNodes=[]; render(); }

// ===== 下拉菜单 =====
function setupDropdown(toggleId, menuId){
  const toggle=document.getElementById(toggleId);
  const menu=document.getElementById(menuId);
  toggle.addEventListener('click',function(e){
    e.stopPropagation();
    const isOpen=menu.classList.contains('show');
    // 关闭所有下拉
    document.querySelectorAll('.dropdown-menu').forEach(m=>m.classList.remove('show'));
    if(!isOpen) menu.classList.add('show');
  });
}
setupDropdown('blockToggle','blockDropdown');
setupDropdown('continentToggle','continentDropdown');
document.addEventListener('click',()=>{
  document.querySelectorAll('.dropdown-menu').forEach(m=>m.classList.remove('show'));
});

document.getElementById('musicBtn').addEventListener('click',()=>{
  document.getElementById('musicOverlay').classList.add('show');
});
document.getElementById('musicSwitch').addEventListener('click',function(){
  this.classList.toggle('on');
});
document.getElementById('musicCloseBtn').addEventListener('click',()=>{

document.getElementById('energyCloseBtn').addEventListener('click',()=>{
  document.getElementById('energyOverlay').classList.remove('show');

window.addEventListener('resize',render);
window.addEventListener('DOMContentLoaded',initSphere);

</script>
