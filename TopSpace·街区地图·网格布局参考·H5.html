<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>街区地图 · 网格布局参考</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#F5F0E8;font-family:-apple-system,"PingFang SC",sans-serif;overflow:hidden;height:100vh;width:100vw;touch-action:none;-webkit-user-select:none;user-select:none;-webkit-tap-highlight-color:transparent}
canvas{position:absolute;top:0;left:0;width:100%;height:100%}
.info-panel{position:fixed;bottom:0;left:0;right:0;z-index:100;background:rgba(245,240,232,0.95);border-top:1px solid rgba(42,42,62,0.1);border-radius:20px 20px 0 0;padding:20px;transform:translateY(100%);transition:transform 0.3s ease}
.info-panel.show{transform:translateY(0)}
.info-header{display:flex;align-items:center;gap:12px;margin-bottom:12px}
.info-avatar{width:48px;height:48px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:24px}
.info-name{font-size:17px;font-weight:700;color:#2a2a3e}
.info-type{font-size:12px;margin-top:2px;color:rgba(42,42,62,0.5)}
</style>
</head>
<body>

<canvas id="mapCanvas"></canvas>

<div class="info-panel" id="infoPanel">
<div class="info-header">
<div class="info-avatar" id="infoAvatar"></div>
<div>
<div class="info-name" id="infoName">—</div>
<div class="info-type" id="infoType">—</div>
</div>
</div>
<div style="font-size:12px;color:rgba(42,42,62,0.4)">点击任意位置关闭</div>
</div>

<script>
// ===== 配色 =====
var COL = {
fire:  {c:'#D96B6B',label:'🔥 火·门店'},
water: {c:'#4A9EB8',label:'💧 水·内容'},
wood:  {c:'#A0B87A',label:'🌱 木·产品'},
metal: {c:'#E8B44C',label:'⚙️ 金·服务'},
earth: {c:'#9B7BBF',label:'🌍 土·活动'}
};
var KEYS = ['fire','water','wood','metal','earth'];

// ===== 网格街区布局 =====
// 设计：类似城市网格，街道横平竖直
// 节点放在街道交叉口和沿街位置

var gridCols = 8;  // 横向网格数
var gridRows = 6;  // 纵向网格数
var街区宽度 = 120;  // 每个网格的宽度
var 街区高度 = 100;  // 每个网格的高度

var nodes = [];
var edges = [];

// 生成网格节点
// 每个交叉口一个节点，部分沿街位置也放节点
for (var row = 0; row <= gridRows; row++) {
    for (var col = 0; col <= gridCols; col++) {
        // 交叉口节点
        nodes.push({
            id: nodes.length,
            x: col * 街区宽度 + 100,  // +100 是边距
            y: row * 街区高度 + 80,
            type: 'intersection'  // 交叉口
        });
    }
}

// 沿街补充节点（在两个交叉口之间）
for (var row = 0; row <= gridRows; row++) {
    for (var col = 0; col < gridCols; col++) {
        // 水平街道中间
        if (Math.random() < 0.6) {  // 60%概率放节点
            nodes.push({
                id: nodes.length,
                x: col * 街区宽度 + 街区宽度/2 + 100,
                y: row * 街区高度 + 80,
                type: 'street'
            });
        }
    }
}
for (var col = 0; col <= gridCols; col++) {
    for (var row = 0; row < gridRows; row++) {
        // 垂直街道中间
        if (Math.random() < 0.6) {
            nodes.push({
                id: nodes.length,
                x: col * 街区宽度 + 100,
                y: row * 街区高度 + 街区高度/2 + 80,
                type: 'street'
            });
        }
    }
}

// 生成边（连接相邻节点）
// 水平连接
for (var row = 0; row <= gridRows; row++) {
    for (var col = 0; col < gridCols; col++) {
        var leftId = row * (gridCols + 1) + col;
        var rightId = leftId + 1;
        // 检查两个节点是否都存在
        if (nodes[leftId] && nodes[rightId]) {
            edges.push([leftId, rightId]);
        }
    }
}
// 垂直连接
for (var col = 0; col <= gridCols; col++) {
    for (var row = 0; row < gridRows; row++) {
        var topId = row * (gridCols + 1) + col;
        var bottomId = topId + (gridCols + 1);
        if (nodes[topId] && nodes[bottomId]) {
            edges.push([topId, bottomId]);
        }
    }
}

// ===== 补全节点属性 =====
var NAMES = [
'星尘','流光','青木','金石','厚土','晨露','焱焰','碧藤','银铃','琥珀',
'极光','赤松','云归','霜降','岚烟','墨染','月蚀','星轨','潮汐','萤火',
'破晓','暮色','归鸿','逝川','空镜','浮岛','晚祷','迷迭','霜天','半夏',
'长风','微澜','寒烟','素履','清欢','南风','北望','东篱','西洲','中岳',
'白驹','苍狗','丹枫','碧落','紫陌','红尘','青瓦','墨客','诗酒','茶凉',
'听雨','看云','临风','对月','烹茶','煮酒','抚琴','对弈','听涛','观海'
];
var EMOJIS = ['🌙','✨','🌿','💎','🏔️','💧','🔥','🌱','⚙️','🌍',
'🌈','🎋','⛰️','🌊','🍂','🗿','🌾','🔮','🎐','💫',
'🦊','🐉','🦉','🐚','🌺','🌸','🍂️','🌻','🌷','🌹',
'⚗️','🧪','🧬','📡','🔬','🔧','⚙️','🛠️','🧰','💊',
'📖','🖋️','🎵','🎶','🎸','🎹','🎺','🎻','🥁','🎤'];

for (var i = 0; i < nodes.length; i++) {
    var elem = KEYS[i % 5];
    nodes[i].name = NAMES[i % NAMES.length];
    nodes[i].emoji = EMOJIS[i % EMOJIS.length];
    nodes[i].elem = elem;
    nodes[i].visited = Math.random() < 0.7;
    nodes[i].secluded = Math.random() < 0.1;
}

// ===== Canvas =====
var canvas = document.getElementById('mapCanvas');
var ctx = canvas.getContext('2d');
var W, H, dpr;
var viewX = 500, viewY = 350;
var zoom = 1;

function resize() {
    dpr = window.devicePixelRatio || 1;
    W = window.innerWidth;
    H = window.innerHeight;
    canvas.width = W * dpr;
    canvas.height = H * dpr;
    canvas.style.width = W + 'px';
    canvas.style.height = H + 'px';
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}
window.addEventListener('resize', resize);
// 确保DOM和尺寸准备好后再初始化
function initCanvas() {
    resize();
    // 强制重新设置canvas尺寸（修复手机空白）
    canvas.width = canvas.width;
    resize();
}
if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', initCanvas);
} else {
    initCanvas();
}

// ===== 坐标转换 =====
function toScreen(wx, wy) {
    return {
        x: W/2 + (wx - viewX) * zoom,
        y: H/2 + (wy - viewY) * zoom
    };
}

// ===== 触摸控制 =====
var touching = false, tx0 = 0, ty0 = 0, vx0 = 0, vy0 = 0;
var pinching = false, pinchDist0 = 0, pinchZoom0 = 1;

canvas.addEventListener('touchstart', function(e) {
    e.preventDefault();
    if (e.touches.length === 1) {
        touching = true;
        pinching = false;
        tx0 = e.touches[0].clientX;
        ty0 = e.touches[0].clientY;
        vx0 = viewX;
        vy0 = viewY;
    } else if (e.touches.length === 2) {
        pinching = true;
        touching = false;
        var dx = e.touches[1].clientX - e.touches[0].clientX;
        var dy = e.touches[1].clientY - e.touches[0].clientY;
        pinchDist0 = Math.sqrt(dx*dx + dy*dy);
        pinchZoom0 = zoom;
    }
}, {passive: false});

canvas.addEventListener('touchmove', function(e) {
    e.preventDefault();
    if (pinching && e.touches.length === 2) {
        var dx = e.touches[1].clientX - e.touches[0].clientX;
        var dy = e.touches[1].clientY - e.touches[0].clientY;
        var dist = Math.sqrt(dx*dx + dy*dy);
        zoom = Math.max(0.3, Math.min(3, pinchZoom0 * dist / pinchDist0));
    } else if (touching && e.touches.length === 1) {
        var dx = e.touches[0].clientX - tx0;
        var dy = e.touches[0].clientY - ty0;
        viewX = vx0 - dx / zoom;
        viewY = vy0 - dy / zoom;
    }
}, {passive: false});

canvas.addEventListener('touchend', function() {
    touching = false;
    pinching = false;
});

// 鼠标控制
var mDown = false, mx0 = 0, my0 = 0, mvx0 = 0, mvy0 = 0;
canvas.addEventListener('mousedown', function(e) {
    mDown = true;
    mx0 = e.clientX;
    my0 = e.clientY;
    mvx0 = viewX;
    mvy0 = viewY;
});
canvas.addEventListener('mousemove', function(e) {
    if (!mDown) return;
    viewX = mvx0 - (e.clientX - mx0) / zoom;
    viewY = mvy0 - (e.clientY - my0) / zoom;
});
canvas.addEventListener('mouseup', function() { mDown = false; });
canvas.addEventListener('mouseleave', function() { mDown = false; });
canvas.addEventListener('wheel', function(e) {
    e.preventDefault();
    zoom = Math.max(0.3, Math.min(3, zoom * (e.deltaY > 0 ? 0.92 : 1.08)));
}, {passive: false});

// ===== 点击检测 =====
canvas.addEventListener('click', function(e) {
    var closest = null, best = 30;
    for (var i = 0; i < nodes.length; i++) {
        var p = toScreen(nodes[i].x, nodes[i].y);
        var dx = e.clientX - p.x;
        var dy = e.clientY - p.y;
        var d = Math.sqrt(dx*dx + dy*dy);
        if (d < best) { closest = i; best = d; }
    }
    if (closest !== null) {
        showInfo(closest);
    } else {
        document.getElementById('infoPanel').classList.remove('show');
    }
});

function showInfo(idx) {
    var n = nodes[idx];
    document.getElementById('infoAvatar').style.background = COL[n.elem].c + '25';
    document.getElementById('infoAvatar').textContent = n.emoji;
    document.getElementById('infoName').textContent = n.name;
    document.getElementById('infoType').textContent = COL[n.elem].label;
    document.getElementById('infoType').style.color = COL[n.elem].c;
    document.getElementById('infoPanel').classList.add('show');
}

// ===== 渲染 =====
function render() {
    ctx.clearRect(0, 0, W, H);

    // 浅色底
    ctx.fillStyle = '#F5F0E8';
    ctx.fillRect(0, 0, W, H);

    var r0 = Math.max(5, 10 * zoom);

    // 画道路（细直线）
    ctx.lineCap = 'round';
    for (var ei = 0; ei < edges.length; ei++) {
        var a = edges[ei][0], b = edges[ei][1];
        var pa = toScreen(nodes[a].x, nodes[a].y);
        var pb = toScreen(nodes[b].x, nodes[b].y);

        // 跳过屏幕外的边
        if (pa.x < -100 && pb.x < -100) continue;
        if (pa.x > W+100 && pb.x > W+100) continue;
        if (pa.y < -100 && pb.y < -100) continue;
        if (pa.y > H+100 && pb.y > H+100) continue;

        ctx.lineWidth = Math.max(1, 2 * zoom);
        ctx.strokeStyle = 'rgba(42,42,62,0.08)';
        ctx.beginPath();
        ctx.moveTo(pa.x, pa.y);
        ctx.lineTo(pb.x, pb.y);
        ctx.stroke();
    }

    // 画节点
    for (var i = 0; i < nodes.length; i++) {
        var n = nodes[i];
        var p = toScreen(n.x, n.y);

        if (p.x < -50 || p.x > W+50 || p.y < -50 || p.y > H+50) continue;

        var r = r0;

        if (n.visited) {
            var c = COL[n.elem];
            
            // 门牌
            ctx.fillStyle = c.c + '18';
            ctx.beginPath();
            ctx.arc(p.x, p.y, r, 0, Math.PI*2);
            ctx.fill();
            
            ctx.strokeStyle = c.c + '55';
            ctx.lineWidth = 1.5;
            ctx.beginPath();
            ctx.arc(p.x, p.y, r, 0, Math.PI*2);
            ctx.stroke();
            
            // emoji
            ctx.font = (r*1.4) + 'px sans-serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(n.emoji, p.x, p.y);
        } else {
            ctx.strokeStyle = 'rgba(42,42,62,0.13)';
            ctx.lineWidth = 1;
            ctx.setLineDash([3,3]);
            ctx.beginPath();
            ctx.arc(p.x, p.y, r, 0, Math.PI*2);
            ctx.stroke();
            ctx.setLineDash([]);
            
            ctx.globalAlpha = 0.18;
            ctx.font = (r*1.05) + 'px sans-serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillStyle = 'rgba(42,42,62,0.45)';
            ctx.fillText(n.emoji, p.x, p.y);
            ctx.globalAlpha = 1;
        }
    }

    requestAnimationFrame(render);
}

render();
</script>
</body>
</html>
