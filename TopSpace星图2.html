var clickStartTime = 0,clickStartX = 0,clickStartY = 0;canvas.addEventListener('mousedown',function(e){mDown=true;mx0=e.clientX;my0=e.clientY;mvx0=viewX;mvy0=viewY;clickStartTime = Date.now();clickStartX = e.clientX;clickStartY = e.clientY;});canvas.addEventListener('click',function(e){// 如果移动距离大于5px或按下时间超过300ms，视为拖拽不处理 var dx = e.clientX - clickStartX,dy = e.clientY - clickStartY;var dist = Math.sqrt(dx*dx + dy*dy);var elapsed = Date.now() - clickStartTime;if (dist > 5 || elapsed > 300) return;document.getElementById('hint').style.opacity='0';var closest=-1,best=45;for(var i=0;i<liveBlocks.length;i++){var b=liveBlocks[i],p=toScreen(b.doorX,b.doorY);var ddx=e.clientX-p.x,ddy=e.clientY-p.y,dd=Math.sqrt(ddx*ddx+ddy*ddy);if(dd<best){closest=i;best=dd;}}if(closest>=0) showInfo(closest);else document.getElementById('infoPanel').classList.remove('show');});function showInfo(i){var b=liveBlocks[i],ec=ELEM[b.elem];document.getElementById('infoAvatar').style.background=rgba(ec.c,0.20);document.getElementById('infoAvatar').textContent=ec.emoji;document.getElementById('infoName').textContent=b.name;document.getElementById('infoId').textContent='#'+b.idStr;document.getElementById('infoId').style.color=ec.c;document.getElementById('infoType').textContent=ec.label;document.getElementById('infoType').style.color=ec.c;document.getElementById('infoDesc').textContent=ec.desc;document.getElementById('infoPanel').classList.add('show');}document.addEventListener('click',function(e){var p=document.getElementById('infoPanel');if(!p.contains(e.target)&&e.target!==canvas&&e.target.id!=='infoAvatar'){p.classList.remove('show');}});// ===== 渲染 =====
function loop(){requestAnimationFrame(loop);render();}function render(){if(!ctx||!W||!H) return;ctx.clearRect(0,0,W,H);ctx.fillStyle='#F5F0E8';ctx.fillRect(0,0,W,H);// 背景网格线 ctx.save();ctx.strokeStyle='rgba(0,0,0,0.04)';ctx.lineWidth=0.5;var gStep=40*zoom;var ox=((W/2 - viewX*zoom) % gStep + gStep) % gStep;var oy=((H/2 - viewY*zoom) % gStep + gStep) % gStep;for(var gx=ox;gx<W+gStep;gx+=gStep){ctx.beginPath();ctx.moveTo(gx,0);ctx.lineTo(gx,H);ctx.stroke();}for(var gy=oy;gy<H+gStep;gy+=gStep){ctx.beginPath();ctx.moveTo(0,gy);ctx.lineTo(W,gy);ctx.stroke();}ctx.restore();var r0 = Math.max(7,13*zoom);// —— 1. 画街道灰色底面（同样只画段） —— ctx.fillStyle='rgba(176,168,156,0.55)';for (var i = 0;i < hStreetSegments.length;i++){var seg = hStreetSegments[i];var s1 = toScreen(seg.x1,seg.y - STREET/2);var s2 = toScreen(seg.x2,seg.y + STREET/2);var x1 = Math.min(s1.x,s2.x),y1 = Math.min(s1.y,s2.y);var x2 = Math.max(s1.x,s2.x),y2 = Math.max(s1.y,s2.y);if(x2 < -20 || x1 > W+20 || y2 < -20 || y1 > H+20) continue;ctx.fillRect(x1,y1,x2-x1,y2-y1);}for (var i = 0;i < vStreetSegments.length;i++){var seg = vStreetSegments[i];var s1 = toScreen(seg.x - STREET/2,seg.y1);var s2 = toScreen(seg.x + STREET/2,seg.y2);var x1 = Math.min(s1.x,s2.x),y1 = Math.min(s1.y,s2.y);var x2 = Math.max(s1.x,s2.x),y2 = Math.max(s1.y,s2.y);if(x2 < -20 || x1 > W+20 || y2 < -20 || y1 > H+20) continue;ctx.fillRect(x1,y1,x2-x1,y2-y1);}// —— 2. 画地块色块（鲜艳版） —— for (var i=0;i<liveBlocks.length;i++){var b=liveBlocks[i],ec=ELEM[b.elem],d=b.depth;var ox=b.skewX*0.6,oy=b.skewY*0.6;var c0=toScreen(b.x+ox,b.y+oy);var c1=toScreen(b.x+b.w+ox,b.y+oy);var c2=toScreen(b.x+b.w+ox,b.y+b.h+oy);var c3=toScreen(b.x+ox,b.y+b.h+oy);var allX=[c0.x,c1.x,c2.x,c3.x],allY=[c0.y,c1.y,c2.y,c3.y];if(Math.max.apply(null,allX)<-100) continue;if(Math.min.apply(null,allX)>W+100) continue;if(Math.max.apply(null,allY)<-100) continue;if(Math.min.apply(null,allY)>H+100) continue;ctx.beginPath();ctx.moveTo(c0.x,c0.y);ctx.lineTo(c1.x,c1.y);ctx.lineTo(c2.x,c2.y);ctx.lineTo(c3.x,c3.y);ctx.closePath();if(b.visited){// 鲜艳填充：高饱和度实色 ctx.fillStyle=rgba(ec.c,0.55 + d*0.40);ctx.fill();// 叠加一层渐变光泽 var grd = ctx.createLinearGradient(c0.x,c0.y,c2.x,c2.y);grd.addColorStop(0,rgba(ec.c,0.20));grd.addColorStop(0.5,'rgba(255,255,255,0.12)');grd.addColorStop(1,rgba(ec.c,0.15));ctx.fillStyle = grd;ctx.fill();}else{ctx.fillStyle=rgba(ec.c,0.22 + d*0.18);ctx.fill();}// 地块边框：更粗更饱和 ctx.strokeStyle=rgba(ec.c,0.55 + d*0.40);ctx.lineWidth=Math.max(1.5,2.5*zoom);ctx.setLineDash([4+Math.abs(b.skewX)*1.2,3]);ctx.stroke();ctx.setLineDash([]);// 内部小巷 if(b.hasAlley&&b.visited){ctx.save();if(b.alleyDir==='H'){var my=b.y+b.h/2;var a1=toScreen(b.x+18,my),a2=toScreen(b.x+b.w-18,my);ctx.strokeStyle='#F5F0E8';ctx.lineWidth=ALLEY*zoom;ctx.beginPath();ctx.moveTo(a1.x,a1.y);ctx.lineTo(a2.x,a2.y);ctx.stroke();ctx.strokeStyle='rgba(255,255,255,0.60)';ctx.lineWidth=Math.max(0.5,0.7*zoom);ctx.setLineDash([4,4]);ctx.beginPath();ctx.moveTo(a1.x,a1.y);ctx.lineTo(a2.x,a2.y);ctx.stroke();}else{var mx=b.x+b.w/2;var a1=toScreen(mx,b.y+18),a2=toScreen(mx,b.y+b.h-18);ctx.strokeStyle='#F5F0E8';ctx.lineWidth=ALLEY*zoom;ctx.beginPath();ctx.moveTo(a1.x,a1.y);ctx.lineTo(a2.x,a2.y);ctx.stroke();ctx.strokeStyle='rgba(255,255,255,0.60)';ctx.lineWidth=Math.max(0.5,0.7*zoom);ctx.setLineDash([4,4]);ctx.beginPath();ctx.moveTo(a1.x,a1.y);ctx.lineTo(a2.x,a2.y);ctx.stroke();}ctx.setLineDash([]);ctx.restore();}}// —— 3. 画街道虚线中线（只画段） —— ctx.lineCap='round';// 横向 for (var i = 0;i < hStreetSegments.length;i++){var seg = hStreetSegments[i];var p1 = toScreen(seg.x1,seg.y);var p2 = toScreen(seg.x2,seg.y);if(p1.y<-10||p2.y>H+10) continue;if(Math.max(p1.x,p2.x)<-10||Math.min(p1.x,p2.x)>W+10) continue;ctx.strokeStyle='rgba(255,255,255,0.55)';ctx.lineWidth=Math.max(0.8,1.2*zoom);ctx.setLineDash([6*zoom,5*zoom]);ctx.beginPath();ctx.moveTo(p1.x,p1.y);ctx.lineTo(p2.x,p2.y);ctx.stroke();ctx.setLineDash([]);}// 纵向 for (var i = 0;i < vStreetSegments.length;i++){var seg = vStreetSegments[i];var p1 = toScreen(seg.x,seg.y1);var p2 = toScreen(seg.x,seg.y2);if(p1.x<-10||p2.x>W+10) continue;if(Math.max(p1.y,p2.y)<-10||Math.min(p1.y,p2.y)>H+10) continue;ctx.strokeStyle='rgba(255,255,255,0.55)';ctx.lineWidth=Math.max(0.8,1.2*zoom);ctx.setLineDash([6*zoom,5*zoom]);ctx.beginPath();ctx.moveTo(p1.x,p1.y);ctx.lineTo(p2.x,p2.y);ctx.stroke();ctx.setLineDash([]);}// —— 4. 画门牌（鲜艳版） —— for (var i=0;i<liveBlocks.length;i++){var b=liveBlocks[i],ec=ELEM[b.elem],d=b.depth;var p=toScreen(b.doorX,b.doorY);if(p.x<-50||p.x>W+50||p.y<-50||p.y>H+50) continue;var r=r0;if(b.visited){// 外层发光（更大更亮） ctx.fillStyle=rgba(ec.c,0.22 + d*0.25);ctx.beginPath();ctx.arc(p.x,p.y,r+12*zoom,0,Math.PI*2);ctx.fill();// 实心圆（全饱和） ctx.fillStyle=rgba(ec.c,0.92 + d*0.08);ctx.beginPath();ctx.arc(p.x,p.y,r,0,Math.PI*2);ctx.fill();// 白色描边 ctx.strokeStyle='rgba(255,255,255,0.85)';ctx.lineWidth=Math.max(2,3*zoom);ctx.beginPath();ctx.arc(p.x,p.y,r,0,Math.PI*2);ctx.stroke();// emoji ctx.font=Math.round(r*1.15)+'px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillStyle='#FFFFFF';ctx.fillText(ec.emoji,p.x,p.y-0.5);// 名字 + 号段 if(zoom>0.4){ctx.font='bold '+Math.max(8,Math.round(10*zoom))+'px -apple-system,"PingFang SC",sans-serif';ctx.fillStyle=ec.c;ctx.textAlign='center';ctx.textBaseline='top';ctx.fillText(b.name,p.x,p.y+r+3*zoom);ctx.font=Math.max(7,Math.round(6.5*zoom))+'px "SF Mono","Menlo",monospace';ctx.fillStyle='rgba(26,26,26,0.35)';ctx.fillText('#'+b.idStr,p.x,p.y+r+3*zoom+12*zoom);}}else{// 未探索：虚线圈 ctx.strokeStyle=rgba(ec.c,0.25 + d*0.15);ctx.lineWidth=Math.max(1,1.5*zoom);ctx.setLineDash([3,4]);ctx.beginPath();ctx.arc(p.x,p.y,r,0,Math.PI*2);ctx.stroke();ctx.setLineDash([]);ctx.font=Math.round(r*0.9)+'px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillStyle=rgba(ec.c,0.30 + d*0.15);ctx.fillText('?',p.x,p.y);}}}</script>
