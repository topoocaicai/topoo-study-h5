<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>拓圈·蛋生壹号街区·3D</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0A1020;overflow:hidden;font-family:-apple-system,"PingFang SC",sans-serif}
#c{display:block;width:100%;height:100%}
.hdr{position:fixed;top:0;left:0;right:0;z-index:100;display:flex;flex-direction:column;align-items:center;padding:10px 20px;background:linear-gradient(180deg,rgba(10,16,32,.95) 0%,transparent 100%);pointer-events:none}
.ht{font-size:14px;font-weight:600;letter-spacing:3px;color:#F5F0E8}
.hs{font-size:10px;color:#4A9EB8;margin-top:2px;letter-spacing:1px}
.ctrl{position:fixed;right:12px;bottom:85px;z-index:90;display:flex;flex-direction:column;gap:7px}
.cb{width:38px;height:38px;background:rgba(74,158,184,.15);border:1px solid rgba(74,158,184,.35);border-radius:50%;color:#4A9EB8;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;pointer-events:auto}
.ctrl-l{position:fixed;left:12px;bottom:85px;z-index:90;}
.ctrl-l .cb{width:auto;height:auto;padding:14px 22px;flex-direction:column;gap:5px;font-size:14px;letter-spacing:2px;border-radius:22px;border:2.5px solid #4A9EB8;box-shadow:0 0 20px rgba(74,158,184,.5),inset 0 0 12px rgba(74,158,184,.15);background:linear-gradient(135deg,#1A3A4A 0%,#0D2030 100%);color:#7DD4E8;font-weight:600;text-shadow:0 0 8px rgba(74,158,184,.6);}
.btn-back{position:fixed;top:12px;left:12px;z-index:200;display:none;padding:6px 16px;background:rgba(10,16,32,.85);border:1px solid rgba(74,158,184,.5);border-radius:20px;color:#4A9EB8;font-size:13px;cursor:pointer;letter-spacing:1px;}
.hint{position:fixed;bottom:10px;left:50%;transform:translateX(-50%);font-size:10px;color:rgba(245,240,232,.25);letter-spacing:1px;pointer-events:none}
#err{position:fixed;inset:0;background:#0B0F1E;color:#E89090;display:none;align-items:center;justify-content:center;padding:40px;font-size:14px;text-align:center;z-index:999;white-space:pre-wrap}
.enter-overlay{position:fixed;inset:0;background:rgba(10,16,32,.7);display:none;align-items:center;justify-content:center;z-index:300;backdrop-filter:blur(4px)}
.enter-dialog{background:linear-gradient(135deg,#1A2A3A,#0D1A2A);border:2px solid #4A9EB8;border-radius:16px;padding:30px 40px;text-align:center;box-shadow:0 0 40px rgba(74,158,184,.3)}
.enter-dialog h3{color:#D4A040;font-size:18px;font-weight:600;margin-bottom:8px;letter-spacing:2px}
.enter-dialog p{color:#8A9AAA;font-size:13px;margin-bottom:20px}
.enter-dialog .enter-btn{display:inline-block;padding:10px 30px;background:linear-gradient(135deg,#4A9EB8,#3A7E98);border:none;border-radius:20px;color:#F5F0E8;font-size:14px;font-weight:600;cursor:pointer;letter-spacing:2px;transition:transform .15s,box-shadow .15s}
.enter-dialog .enter-btn:hover{transform:scale(1.05);box-shadow:0 0 20px rgba(74,158,184,.5)}
.enter-dialog .enter-cancel{display:inline-block;padding:8px 20px;background:transparent;border:1px solid #556;border-radius:20px;color:#8A9AAA;font-size:12px;cursor:pointer;margin-left:12px}
.enter-dialog .enter-cancel:hover{border-color:#889;color:#BBC}
</style>
</head>
<body>
<div id="err"></div>
<canvas id="c"></canvas>
<div class="hdr"><div class="ht">蛋生壹号街区</div><div class="hs">TOPSPACE · 3D BLOCK #001</div></div>
<div class="ctrl"><div class="cb" id="btnTop">&#x2B06;</div><div class="cb" id="btn45">&#x27F3;</div><div class="cb" id="btnRst">&#x27F2;</div></div>
<div class="ctrl-l"><div class="cb" id="btnCafe" style="font-size:12px;flex-direction:column;line-height:1.2;">&#x2615;<span style="font-size:10px;">咖啡店</span></div></div>
<button class="btn-back" id="btnBack">&#x2190; 返回街区</button>
<div class="hint">左键旋转 · 右键平移 · 滚轮缩放 · 双击复位</div>
<div class="enter-overlay" id="exitOverlay">
  <div class="enter-dialog">
    <h3>拜 拜 ~</h3>
    <p style="color:#8A9AAA;font-size:13px;margin-bottom:16px">慢半拍随时等你回来</p>
    <button class="enter-btn" id="exitBtn">离开咖啡店</button>
    <button class="enter-cancel" id="exitCancel">再坐会儿</button>
  </div>
</div>
<div class="enter-overlay" id="enterOverlay">
  <div class="enter-dialog">
    <h3>慢 半 拍</h3>
    <p>SLOW BEAT CAFÉ</p>
    <p style="color:#6A7A8A;font-size:12px;margin-bottom:16px">一扇门，推开就是另一个世界</p>
    <button class="enter-btn" id="enterBtn">进 入</button>
    <button class="enter-cancel" id="enterCancel">再看看</button>
  </div>
</div>

<!-- NPC对话框 -->
<div class="npc-dialog-overlay" id="npcDialog" style="position:fixed;inset:0;display:none;align-items:flex-end;justify-content:center;z-index:400;pointer-events:none;">
  <div class="npc-dialog-box" style="pointer-events:auto;width:92%;max-width:420px;max-height:60vh;overflow-y:auto;-webkit-overflow-scrolling:touch;background:linear-gradient(135deg,#1A2A3A 0%,#0D1A2A 100%);border:2px solid #4A9EB8;border-radius:16px 16px 4px 4px;padding:20px 24px;margin-bottom:24px;box-shadow:0 0 30px rgba(74,158,184,.4);">
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:12px;">
      <div style="width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg,#00704A,#005C3A);display:flex;align-items:center;justify-content:center;font-size:18px;color:#FFD700;">&#x2615;</div>
      <div>
        <div style="color:#F5F0E8;font-size:15px;font-weight:600;">小拍 · 咖啡师</div>
        <div style="color:#4A9EB8;font-size:11px;">SLOW BEAT BARISTA</div>
      </div>

</div>

<!-- 海报/笔记本弹框 -->
<div class="enter-overlay" id="itemPopup">
  <div class="enter-dialog" style="max-width:460px;padding:24px 28px;">
    <h3 id="itemPopupTitle" style="color:#D4A040;font-size:18px;font-weight:600;margin-bottom:12px;letter-spacing:2px;">标题</h3>
    <div id="itemPopupBody" style="color:#C8D8E8;font-size:14px;line-height:1.8;margin-bottom:20px;white-space:pre-wrap;"></div>

<script>
window.onerror=function(m,u,l){var e=document.getElementById('err');e.style.display='flex';e.textContent='JS Error: '+m+'\nLine: '+l;};
function initApp(){
try {

// ===== WebGL Check =====
var testCv=document.createElement('canvas');
var gl=testCv.getContext('webgl2')||testCv.getContext('webgl');
if(!gl){var el=document.getElementById('err');el.style.display='flex';el.textContent='WebGL not supported.\nPlease use a modern browser.';return;}
var maxLights=gl.getParameter(gl.MAX_LIGHTS);
console.log('WebGL OK, maxLights:',maxLights);

// ===== Three.js Setup =====
var cam3d=new THREE.PerspectiveCamera(50,innerWidth/innerHeight,0.1,800);
cam3d.position.set(120,150,120);
var scn=new THREE.Scene();
scn.background=new THREE.Color(0x0A1020);
scn.fog=new THREE.FogExp2(0x0A1020,0.0006);

// ===== Mode Switch =====
var appMode='block'; // 'block' | 'cafe'
var cafeGroup=null;
var blockGroup=new THREE.Group(); scn.add(blockGroup);
// Keep references to global objects for mode switching
var gAmbient=null, gMoon=null, gHemi=null, gStars=null;
var ren=new THREE.WebGLRenderer({canvas:document.getElementById('c'),antialias:true});
ren.setSize(innerWidth,innerHeight);
ren.setPixelRatio(Math.min(devicePixelRatio||1,2));
ren.shadowMap.enabled=true;
ren.shadowMap.type=THREE.PCFSoftShadowMap;
if(ren.outputEncoding!==undefined) ren.outputEncoding=THREE.sRGBEncoding;
if(ren.toneMapping!==undefined){ren.toneMapping=THREE.ACESFilmicToneMapping;ren.toneMappingExposure=1.2;}

// ===== Orbit Controls (inline) =====
var tgt=new THREE.Vector3(0,0,0);
var sph=new THREE.Spherical();
sph.setFromVector3(cam3d.position.clone().sub(tgt));
var md={t:0,p:0,px:0,py:0,z:0};
var ms=-1,mx=0,my=0;
var dampF=0.07;

    // Interior mode camera bounds (W=12, H=7, D=10, center at (0,0,2))
    // z range: -2.5 to 6.5, x range: -5 to 5, y min: 0.5
    var interiorBounds={xMin:-5,xMax:5,yMin:0.5,yMax:6.5,zMin:-2.5,zMax:6.5};
    var interiorTgt=new THREE.Vector3(0,2.8,2);

function updCam(){
    cam3d.position.set(
        sph.radius*Math.sin(sph.phi)*Math.sin(sph.theta),
        sph.radius*Math.cos(sph.phi),
        sph.radius*Math.sin(sph.phi)*Math.cos(sph.theta)
    ).add(tgt);
    // Interior mode: clamp camera inside room
    if(appMode==='interior'){
        cam3d.position.x=Math.max(interiorBounds.xMin,Math.min(interiorBounds.xMax,cam3d.position.x));
        cam3d.position.y=Math.max(interiorBounds.yMin,Math.min(interiorBounds.yMax,cam3d.position.y));
        cam3d.position.z=Math.max(interiorBounds.zMin,Math.min(interiorBounds.zMax,cam3d.position.z));
    }
    cam3d.lookAt(tgt);
}
function tick(){
    var ok=false;
    if(md.t||md.p){
        sph.theta-=md.t;
        if(appMode==='interior'){
            // Interior: 360°旋转
            sph.phi=Math.max(0.1,Math.min(Math.PI-0.1,sph.phi+md.p));
            md.t*=1-dampF*1.5;md.p*=1-dampF*1.5;
        } else {
            sph.phi=Math.max(0.05,Math.min(Math.PI/2.01,sph.phi+md.p));
            md.t*=1-dampF;md.p*=1-dampF;
        }
        ok=true;
    }
    if(md.px||md.py){
        var dd=sph.radius*0.00012;var r=new THREE.Vector3();r.setFromMatrixColumn(cam3d.matrix,0);var u=new THREE.Vector3();u.setFromMatrixColumn(cam3d.matrix,1);tgt.add(r.multiplyScalar(-md.px*dd));tgt.add(u.multiplyScalar(md.py*dd));
        // Interior: clamp target（更高灵敏度）
        if(appMode==='interior'){
            tgt.x=Math.max(interiorBounds.xMin+1,Math.min(interiorBounds.xMax-1,tgt.x));
            tgt.y=Math.max(1.5,Math.min(4,tgt.y));
            tgt.z=Math.max(interiorBounds.zMin+1,Math.min(interiorBounds.zMax-1,tgt.z));
            md.px*=1-dampF*1.5;md.py*=1-dampF*1.5;
        } else {
            md.px*=1-dampF;md.py*=1-dampF;
        }
        ok=true;
    }
    if(md.z){
        sph.radius=Math.max(25,Math.min(500,sph.radius+md.z*sph.radius*0.5));
        // Interior: limit zoom range（更高灵敏度）
        if(appMode==='interior'){
            sph.radius=Math.max(1.5,Math.min(10,sph.radius));
            md.z*=1-dampF*2;
        } else {
            md.z*=1-dampF;
        }
        ok=true;
    }
    if(ok)updCam();
}
ren.domElement.addEventListener('mousedown',function(e){ms=e.button===0?0:(e.button===2?1:-1);if(ms>=0){mx=e.clientX;my=e.clientY;}});
window.addEventListener('mouseup',function(){ms=-1;});
window.addEventListener('mousemove',function(e){if(ms<0)return;var dx=e.clientX-mx,dy=e.clientY-my;mx=e.clientX;my=e.clientY;
    if(ms===0){var rF=appMode==='interior'?0.0015:(appMode==='cafe'?0.0006:0.0004);md.t+=dx*rF;md.p+=dy*rF;}
    else if(ms===1){md.px+=dx*1.5;md.py+=dy*1.5;}});
ren.domElement.addEventListener('wheel',function(e){e.preventDefault();md.z+=e.deltaY*0.008;},{passive:false});
ren.domElement.addEventListener('contextmenu',function(e){e.preventDefault();});
var t0=[],touchMode=-1,prevPinch=0;
ren.domElement.addEventListener('touchstart',function(e){t0=[].slice.call(e.touches);if(t0.length===1)touchMode=0;else if(t0.length===2){touchMode=2;prevPinch=Math.hypot(t0[0].clientX-t0[1].clientX,t0[0].clientY-t0[1].clientY);}else touchMode=-1;},{passive:true});
ren.domElement.addEventListener('touchmove',function(e){if(touchMode<0)return;e.preventDefault();var t=[].slice.call(e.touches);
if(touchMode===0&&t.length===1){var tF=appMode==='interior'?0.002:(appMode==='cafe'?0.0008:0.0005);md.t+=(t[0].clientX-t0[0].clientX)*tF;md.p+=(t[0].clientY-t0[0].clientY)*tF;}
else if(t.length===2&&t0.length===2){
    var d0=Math.hypot(t0[0].clientX-t0[1].clientX,t0[0].clientY-t0[1].clientY);
    var d1=Math.hypot(t[0].clientX-t[1].clientX,t[0].clientY-t[1].clientY);
    var pinchDelta=d1-d0;
    if(Math.abs(pinchDelta)>2){if(d0>1){var pMin=appMode==='interior'?1.5:25;var pMax=appMode==='interior'?10:500;sph.radius=Math.max(pMin,Math.min(pMax,sph.radius*(d0/d1)));}}
    else{var cx0=(t0[0].clientX+t0[1].clientX)/2,cy0=(t0[0].clientY+t0[1].clientY)/2;var cx1=(t[0].clientX+t[1].clientX)/2,cy1=(t[0].clientY+t[1].clientY)/2;md.px+=cx1-cx0;md.py+=cy1-cy0;}
}t0=t;},{passive:false});
ren.domElement.addEventListener('touchend',function(){touchMode=-1;});

// ===== Lights (night warm) - LIMITED for WebGL compatibility =====
// Use strong ambient + directional + hemisphere, minimize PointLights
var ambient=gAmbient=new THREE.AmbientLight(0xCCDDFF,1.2);
scn.add(ambient);

var moon=gMoon=new THREE.DirectionalLight(0x8899CC,0.8);
moon.position.set(-100,180,-80);
moon.castShadow=true;
moon.shadow.mapSize.set(1024,1024);
moon.shadow.camera.left=moon.shadow.camera.bottom=-200;
moon.shadow.camera.right=moon.shadow.camera.top=200;
scn.add(moon);

var hemi=gHemi=new THREE.HemisphereLight(0x6688CC,0x2A3020,0.8);
scn.add(hemi);

// Only use a few strategic PointLights (keep under WebGL maxLights)
var lightCount=0;
var MAX_PT_LIGHTS=10;
function addPtLight(color,intensity,dist,x,y,z){
    if(lightCount>=MAX_PT_LIGHTS)return;
    var l=new THREE.PointLight(color,intensity,dist);
    l.position.set(x,y,z);
    scn.add(l);
    lightCount++;
}
// Strategic warm lights at key locations
addPtLight(0xFFAA44,1.0,40, 0,8,0);       // center
addPtLight(0xFFAA44,0.8,35, -35,-35,8);   // NW hub
addPtLight(0xFFAA44,0.8,35, 35,-35,8);    // NE hub
addPtLight(0xFFAA44,0.8,35, -35,35,8);    // SW hub
addPtLight(0xFFAA44,0.8,35, 35,35,8);     // SE hub
addPtLight(0xFFCC66,0.6,30, 0,-75,6);     // north fountain
addPtLight(0xFFCC66,0.6,30, -110,-60,6);  // pond
addPtLight(0xFFAA44,0.5,25, -60,0,6);     // west road
addPtLight(0xFFAA44,0.5,25, 60,0,6);      // east road
addPtLight(0xFFAA44,0.5,25, 0,60,6);      // south road

console.log('PointLights used:',lightCount,'/',MAX_PT_LIGHTS);

// ===== Starfield (星空背景) =====
var starGeo=null,starMat=null;
(function mkStars(){
    var count=1500;
    var positions=new Float32Array(count*3);
    for(var i=0;i<count;i++){
        var r=300+Math.random()*500;
        var theta=Math.random()*Math.PI*2;
        var phi=Math.acos(2*Math.random()-1);
        positions[i*3]=r*Math.sin(phi)*Math.cos(theta);
        positions[i*3+1]=Math.abs(r*Math.cos(phi))+30;
        positions[i*3+2]=r*Math.sin(phi)*Math.sin(theta);
    }
    starGeo=new THREE.BufferGeometry();
    starGeo.setAttribute('position',new THREE.BufferAttribute(positions,3));
    starMat=new THREE.PointsMaterial({color:0xFFFFEE,size:1,transparent:true,opacity:0.9,sizeAttenuation:true,blending:THREE.AdditiveBlending,depthWrite:false});
    gStars=new THREE.Points(starGeo,starMat);
    scn.add(gStars);
})();

// ===== Helpers =====
function M(c){return new THREE.MeshPhongMaterial({color:c,shininess:10,specular:0x111111});}
// mkEmissiveMat: for glowing windows - MeshStandardMaterial with strong emissive
function mkEmissiveMat(c,i){
    return new THREE.MeshStandardMaterial({
        color:new THREE.Color(c),
        emissive:new THREE.Color(c),
        emissiveIntensity:i||1.0
    });
}
function addBody(g,w,h,d,c){var bd=new THREE.Mesh(new THREE.BoxGeometry(Math.max(0.1,w),Math.max(0.1,h),Math.max(0.1,d)),M(c));bd.position.y=h/2;bd.castShadow=true;bd.receiveShadow=true;g.add(bd);}
function addWin(g,x,y,z,w,h,c,i){var gl=new THREE.Mesh(new THREE.BoxGeometry(Math.max(0.05,w),Math.max(0.05,h),0.12),mkEmissiveMat(c,i||1.2));gl.position.set(x,y,z);g.add(gl);}

// ===== Name Pools =====
var NAME_POOL={
    cafe:['慢半拍','一日','角落之光','黑胶与咖啡','停留','月光杯','半醒','第三空间'],
    bookstore:['纸上','翻阅','不是书店','深夜书架','字里行间','盲盒书','读铃','纸上旅行'],
    tea:['半杯','珍珠语','泡泡','茶颜','一杯入魂','慢茶','茶觉','半山春'],
    flower:['野花','瓶中诗','花期','一束','慢花','花间集','朝颜','植觉'],
    pet:['爪印','毛孩子','尾巴','汪喵','四只脚','爪爪铺','尾巴档案馆'],
    bakery:['麦田','烤箱','香气','酥皮','早晨','酵母公社','烤物志'],
    workshop:['造物','手工课','铁皮屋','刨花','匠人','敲敲打打','木工误差'],
    gallery:['白盒子','空間','展','一隅','看见','取景框','无界'],
    music:['低频','共振','节拍','声穴','音浪','回声公园','黑胶Fiction'],
    clothing:['衣橱','布','质地','穿搭','形态','剪标','无用服'],
    restaurant:['灶台','烟火','围桌','锅气','味道','夜食堂','聚光灯'],
    design:['像素','线条','构','比例','原型','网格','草稿本'],
    theater:['幕','台','角色','剧本','灯暗','第四堵墙','彩排室'],
    yoga:['呼吸','伸展','静座','平衡','内观','折叠','松绑'],
    boardgame:['骰子','回合','桌面上','卡牌','策略','运气有限公司'],
    photo:['快门','取景器','光影','定格','焦距','曝光补偿','暗房']
};
function rndName(type){var pool=NAME_POOL[type];return pool?pool[Math.floor(Math.random()*pool.length)]:'小店';}

// ===== Door Sign (门牌号) =====
// w=建筑宽度, d=建筑深度; 门牌放在建筑正前方(+z方向)
function mkSign(x,z,type,name,w,d){
    var cv=document.createElement('canvas');
    cv.width=200;cv.height=150;
    var ctx=cv.getContext('2d');
    ctx.fillStyle='#1A1208';ctx.fillRect(0,0,200,150);
    ctx.strokeStyle='#D4A040';ctx.lineWidth=2;ctx.strokeRect(4,4,192,142);
    ctx.strokeStyle='#8A6A2A';ctx.lineWidth=1;ctx.strokeRect(9,9,182,132);
    var labels={cafe:'[ 咖啡 ]',bookstore:'[ 书店 ]',tea:'[ 奶茶 ]',flower:'[ 花店 ]',pet:'[ 宠物 ]',bakery:'[ 面包 ]',workshop:'[ 工坊 ]',gallery:'[ 画廊 ]',music:'[ 音乐 ]',clothing:'[ 买手 ]',restaurant:'[ 餐厅 ]',design:'[ 设计 ]',theater:'[ 剧场 ]',yoga:'[ 冥想 ]',boardgame:'[ 桌游 ]',photo:'[ 摄影 ]'};
    ctx.fillStyle='#D4A040';ctx.font='bold 12px sans-serif';ctx.textAlign='center';
    ctx.fillText(labels[type]||'[ 商店 ]',100,30);
    ctx.fillStyle='#FFCC66';ctx.font='bold 20px "PingFang SC","Microsoft YaHei",sans-serif';
    ctx.textAlign='center';ctx.textBaseline='middle';
    var dn=name.length>5?name.substring(0,5):name;
    ctx.fillText(dn,100,75);
    ctx.fillStyle='#8A7A5A';ctx.font='11px sans-serif';
    ctx.fillText('[ 可进入 ]',100,125);
    var tex=new THREE.CanvasTexture(cv);tex.minFilter=THREE.LinearFilter;
    var sign=new THREE.Mesh(new THREE.PlaneGeometry(2.8,2.1),new THREE.MeshBasicMaterial({map:tex,transparent:true,side:THREE.DoubleSide}));

// ===== Camera Animation =====
var camAnim=null;
function animCam(ep,et){camAnim={sp:cam3d.position.clone(),ep:ep,st:tgt.clone(),et:et,p:0};}
function updAnim(){
    if(!camAnim)return;
    camAnim.p+=0.02;
    if(camAnim.p>=1){cam3d.position.copy(camAnim.ep);tgt.copy(camAnim.et);sph.setFromVector3(cam3d.position.clone().sub(tgt));camAnim=null;return;}
    var t=camAnim.p;var e=t<0.5?2*t*t:-1+(4-2*t)*t;
    cam3d.position.lerp(camAnim.ep,e);tgt.lerp(camAnim.et,e);
    sph.setFromVector3(cam3d.position.clone().sub(tgt));
}

    cafeGroup.add(cafeSpot.target);

    console.log('Cafe scene built, lights:',lightCount);
}

// ===== Raycaster & Door Click =====
var raycaster=new THREE.Raycaster();
var mouse=new THREE.Vector2();
var doorMeshes=[]; // 存储门板mesh引用，用于点击检测
var doorWorldPos=new THREE.Vector3(-1.65,3,-7.12); // 门的世界坐标

ren.domElement.addEventListener('click',function(e){
    // 内部模式：检测点击门区域
    if(appMode==='interior' && interiorGroup){
        mouse.x=(e.clientX/innerWidth)*2-1;
        mouse.y=-(e.clientY/innerHeight)*2+1;
        raycaster.setFromCamera(mouse,cam3d);
        var iHits=raycaster.intersectObjects(interiorGroup.children,true);
        // 先检测NPC点击（优先级高于门）
        for(var ih=0;ih<iHits.length;ih++){
            var obj=iHits[ih].object;
            while(obj){if(obj.userData&&obj.userData.type==='npc')break;obj=obj.parent;}
            if(obj&&obj.userData.type==='npc'){
                openNpcDialog();
                return;
            }
        }
        // 再检测门点击
        for(var ih=0;ih<iHits.length;ih++){
            var iPt=iHits[ih].point;
            // 前墙门洞区域（z < -2.5, x在门宽内, y在门高内）
            if(iPt.z<-2 && Math.abs(iPt.x)<2 && iPt.y>0.5 && iPt.y<5){
                document.getElementById('exitOverlay').style.display='flex';
                return;
            }
        }
        // 检测海报、笔记本、笔记本电脑、咖啡机、植物点击
        for(var ih=0;ih<iHits.length;ih++){
            var iObj=iHits[ih].object;
            while(iObj&&iObj!==interiorGroup){
                if(iObj.userData&&iObj.userData.type==='poster'){
                    showItemPopup(iObj.userData.title,getPosterContent(iObj.userData.title));
                    return;
                }
                if(iObj.userData&&iObj.userData.type==='notebook'){
                    showItemPopup('碰撞笔记本',getNotebookContent());
                    return;
                }
                if(iObj.userData&&iObj.userData.type==='laptop'){
                    showItemPopup('慢半拍 · 豆子商城',getLaptopContent());
                    return;
                }
                if(iObj.userData&&iObj.userData.type==='coffeeMachine'){
                    showItemPopup('今日特供 · 优惠活动',getCoffeeMachineContent());
                    return;
                }
                if(iObj.userData&&iObj.userData.type==='plant'){
                    showItemPopup('绿植的秘密',getPlantContent());
                    return;
                }
                iObj=iObj.parent;
            }
        }
        return;
    }
    if(appMode!=='cafe')return;
    // 标准化鼠标坐标
    mouse.x=(e.clientX/innerWidth)*2-1;
    mouse.y=-(e.clientY/innerHeight)*2+1;
    raycaster.setFromCamera(mouse,cam3d);
    // 检测是否点击到cafeGroup内门板区域
    if(cafeGroup){
        var hits=raycaster.intersectObjects(cafeGroup.children,true);
        for(var hi=0;hi<hits.length;hi++){
            var pt=hits[hi].point;
            // 判断是否在门板范围内（x: -3.2~-0.1, y: 1~6, z: -7.2~-7.0）
            if(Math.abs(pt.x+1.65)<1.8 && pt.y>1 && pt.y<6.2 && Math.abs(pt.z+7.1)<0.5){
                showEnterDialog();
                return;
            }
        }
    }
});

    function ia(g,geo,mat,x,y,z){var m=new THREE.Mesh(geo,mat);m.position.set(x,y,z);g.add(m);return m;}

var npcLineIdx=0;

function openNpcDialog(){
    npcLineIdx=0;
    renderNpcDialog();
    document.getElementById('npcDialog').style.display='flex';
}
function closeNpcDialog(){
    document.getElementById('npcDialog').style.display='none';
}
function renderNpcDialog(){
    var text=npcLines[npcLineIdx];
    if(!text){closeNpcDialog();return;}
    document.getElementById('npcText').innerHTML=text.replace(/\n/g,'<br>');
    var optsDiv=document.getElementById('npcOptions');
    optsDiv.innerHTML='';
    // "下一条"按钮
    if(npcLineIdx<npcLines.length-1){
        (function(idx){
            var btn=document.createElement('button');
            btn.textContent='下一条 ▸';
            btn.style.cssText='padding:10px 16px;background:rgba(74,158,184,.12);border:1px solid rgba(74,158,184,.4);border-radius:10px;color:#7DD4E8;font-size:13px;cursor:pointer;text-align:left;transition:background .15s,border-color .15s;';
            btn.onmouseover=function(){this.style.background='rgba(74,158,184,.25)';this.style.borderColor='#4A9EB8';};
            btn.onmouseout=function(){this.style.background='rgba(74,158,184,.12)';this.style.borderColor='rgba(74,158,184,.4)';};
            btn.onclick=function(){
                npcLineIdx=idx+1;
                renderNpcDialog();
            };
            optsDiv.appendChild(btn);
        })(npcLineIdx);
    }
    // "离开对话"按钮
    var btn2=document.createElement('button');
    btn2.textContent=npcLineIdx>=npcLines.length-1?'拜拜 👋':'离开对话';
    btn2.style.cssText='padding:10px 16px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.15);border-radius:10px;color:rgba(255,255,255,.5);font-size:13px;cursor:pointer;text-align:left;transition:background .15s,border-color .15s;';
    btn2.onmouseover=function(){this.style.background='rgba(255,255,255,.1)';this.style.borderColor='rgba(255,255,255,.3)';};
    btn2.onmouseout=function(){this.style.background='rgba(255,255,255,.05)';this.style.borderColor='rgba(255,255,255,.15)';};
    btn2.onclick=closeNpcDialog;
    optsDiv.appendChild(btn2);
}
document.getElementById('npcClose').onclick=closeNpcDialog;

// ===== Mode Switch Logic =====
function switchToCafe(){
    buildCafeScene();
    appMode='cafe';
    blockGroup.visible=false;
    cafeGroup.visible=true;
    if(interiorGroup)interiorGroup.visible=false;
    document.getElementById('btnBack').style.display='block';
    document.querySelector('.ctrl').style.display='none';
    document.querySelector('.ctrl-l').style.display='none';
    document.getElementById('enterOverlay').style.display='none';
    document.querySelector('.hdr').innerHTML='<div class="ht">慢半拍 · 咖啡店</div><div class="hs">TOPSPACE · SINGLE STORE PREVIEW</div>';
    animCam(new THREE.Vector3(0,15,-25),new THREE.Vector3(0,4,-7));
}

function switchToBlock(){
    appMode='block';
    blockGroup.visible=true;
    if(cafeGroup)cafeGroup.visible=false;
    if(interiorGroup)interiorGroup.visible=false;
    document.getElementById('btnBack').style.display='none';
    document.getElementById('enterOverlay').style.display='none';
    document.querySelector('.ctrl').style.display='flex';
    document.querySelector('.ctrl-l').style.display='';
    document.querySelector('.hdr').innerHTML='<div class="ht">蛋生壹号街区</div><div class="hs">TOPSPACE · 3D BLOCK #001</div>';
    animCam(new THREE.Vector3(120,150,120),new THREE.Vector3(0,0,0));
}

document.getElementById('btnCafe').onclick=switchToCafe;
document.getElementById('btnBack').onclick=function(){
    if(appMode==='interior'){
        // 从内部回到咖啡店外部
        appMode='cafe';
        interiorGroup.visible=false;
        cafeGroup.visible=true;
        // 恢复环境光
        gAmbient.intensity=1.2;
        // 恢复外部视角参数
        sph.radius=30;sph.phi=Math.PI/2-0.05;
        document.querySelector('.hdr').innerHTML='<div class="ht">慢半拍 · 咖啡店</div><div class="hs">TOPSPACE · SINGLE STORE PREVIEW</div>';
        animCam(new THREE.Vector3(0,15,-25),new THREE.Vector3(0,4,-7));
    } else if(appMode==='cafe'){
        switchToBlock();
    }
};

// ===== CDN Loading =====
(function(){
    var cdns=[
        'https://unpkg.com/three@0.152.0/build/three.min.js',
        'https://cdn.jsdelivr.net/npm/three@0.152.0/build/three.min.js',
        'https://cdnjs.cloudflare.com/ajax/libs/three.js/r152/three.min.js'
    ];
    var i=0;
    function go(){
        if(i>=cdns.length){var el=document.getElementById('err');el.style.display='flex';el.textContent='Three.js CDN load failed.\nPlease check network.';return;}
        var s=document.createElement('script');
        s.src=cdns[i];
        s.onload=function(){console.log('Loaded:',cdns[i]);initApp();};
        s.onerror=function(){console.log('Failed:',cdns[i]);i++;go();};
        document.head.appendChild(s);
    }
    if(typeof THREE!=='undefined')initApp(); else go();
})();
</script>
