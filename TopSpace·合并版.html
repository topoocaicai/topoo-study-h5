<!DOCTYPE html>
<html lang="zh-CN">
<head>

<title>TopSpace · 让小而美被世界看见</title>
<style>/* ===== 全局基础 ===== */
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}:root{--dark:#0B0F1E;--dark2:#1A2035;--amber:#E8B44C;--rust:#D96B6B;--water:#4A9EB8;--wood:#A0B87A;--earth:#9B7BBF;--warm:#F5F0E8;}html,body{width:100%;height:100%;overflow:hidden}body{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Noto Serif SC",Georgia,serif;background:var(--dark);color:#fff;}/* ===== 入场屏 ===== */
.splash{position:fixed;inset:0;z-index:1000;display:flex;flex-direction:column;align-items:center;justify-content:center;background:var(--dark);transition:opacity .8s ease,transform .8s ease;}.splash.fade-out{opacity:0;transform:scale(1.05);pointer-events:none}.splash.hidden{display:none!important}.splash-stars{position:absolute;inset:0;pointer-events:none;overflow:hidden}.splash-star{position:absolute;background:#fff;border-radius:50%;animation:twinkle var(--dur) ease-in-out infinite alternate}@keyframes twinkle{0%{opacity:.1}100%{opacity:.8}}.splash-glow{position:absolute;border-radius:50%;filter:blur(60px);opacity:0;animation:glowPulse var(--dur) var(--delay) ease-in-out infinite}@keyframes glowPulse{0%,100%{opacity:.06;transform:scale(1)}50%{opacity:.15;transform:scale(1.2)}}.splash-logo{width:56px;height:56px;border-radius:16px;background:linear-gradient(135deg,var(--amber),var(--rust));display:flex;align-items:center;justify-content:center;font-size:26px;font-weight:700;box-shadow:0 0 40px rgba(232,180,76,.25);opacity:0;animation:fadeInUp .8s .3s ease forwards;position:relative;z-index:2}.splash-text{margin-top:32px;text-align:center;position:relative;z-index:2}.splash-eyebrow{font-size:11px;letter-spacing:4px;color:rgba(255,255,255,.35);margin-bottom:16px;opacity:0;animation:fadeInUp .6s .6s ease forwards}.splash-main{font-size:20px;line-height:2;color:rgba(255,255,255,.85);letter-spacing:2px;opacity:0;animation:fadeInUp .8s 1s ease forwards}.splash-main em{font-style:normal;color:var(--amber);text-shadow:0 0 20px rgba(232,180,76,.3)}.splash-slogan{position:absolute;bottom:100px;font-size:12px;letter-spacing:3px;color:rgba(255,255,255,.2);opacity:0;animation:fadeInUp .6s 1.8s ease forwards}.splash-skip{position:absolute;bottom:50px;font-size:12px;color:rgba(255,255,255,.25);cursor:pointer;opacity:0;animation:fadeInUp .5s 2.2s ease forwards;transition:color .2s;z-index:5}.splash-skip:active{color:rgba(255,255,255,.6)}.splash-progress{position:absolute;bottom:30px;left:50%;transform:translateX(-50%);width:80px;height:2px;background:rgba(255,255,255,.06);border-radius:1px;overflow:hidden;opacity:0;animation:fadeIn .5s 2s ease forwards}.splash-progress-bar{height:100%;width:0;background:linear-gradient(90deg,var(--water),var(--amber),var(--rust));border-radius:1px;animation:progressFill 2.5s 2s linear forwards}@keyframes progressFill{0%{width:0}100%{width:100%}}@keyframes fadeInUp{0%{opacity:0;transform:translateY(16px)}100%{opacity:1;transform:translateY(0)}}@keyframes fadeIn{0%{opacity:0}100%{opacity:1}}/* ===== 主应用 ===== */
.app-shell{width:100%;height:100%;display:flex;flex-direction:column}.page-wrap{flex:1;overflow:hidden;position:relative}/* ===== 页面容器 ===== */
.page-section{position:absolute;inset:0;overflow-y:auto;-webkit-overflow-scrolling:touch;display:none;padding-bottom:68px}.page-section.active{display:block}/* ===== 底部Tab ===== */
.bottom-tab{height:68px;background:rgba(11,15,30,.96);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);border-top:1px solid rgba(255,255,255,.04);display:flex;align-items:flex-start;padding-top:8px;flex-shrink:0;position:fixed;bottom:0;left:0;right:0;z-index:500;}.tab-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;-webkit-user-select:none;user-select:none;transition:all .2s;position:relative;}.tab-item:active{transform:scale(.9)}.tab-icon-wrap{width:28px;height:28px;display:flex;align-items:center;justify-content:center;transition:all .25s}.tab-icon-wrap svg{width:22px;height:22px;transition:all .25s}.tab-label{font-size:10px;font-weight:500;transition:color .25s;letter-spacing:.5px}.tab-item[data-color="gold"] .tab-icon-wrap svg{fill:rgba(232,180,76,.25);stroke:rgba(232,180,76,.25)}.tab-item[data-color="water"] .tab-icon-wrap svg{fill:rgba(74,158,184,.25);stroke:rgba(74,158,184,.25)}.tab-item[data-color="fire"] .tab-icon-wrap svg{fill:rgba(217,107,107,.25);stroke:rgba(217,107,107,.25)}.tab-item[data-color="earth"] .tab-icon-wrap svg{fill:rgba(155,123,191,.25);stroke:rgba(155,123,191,.25)}.tab-item[data-color="wood"] .tab-icon-wrap svg{fill:rgba(160,184,122,.25);stroke:rgba(160,184,122,.25)}.tab-item .tab-label{color:rgba(255,255,255,.3)}.tab-item.active[data-color="gold"] .tab-icon-wrap svg{fill:var(--amber);stroke:var(--amber);filter:drop-shadow(0 0 6px rgba(232,180,76,.5))}.tab-item.active[data-color="water"] .tab-icon-wrap svg{fill:var(--water);stroke:var(--water);filter:drop-shadow(0 0 6px rgba(74,158,184,.5))}.tab-item.active[data-color="fire"] .tab-icon-wrap svg{fill:var(--rust);stroke:var(--rust);filter:drop-shadow(0 0 6px rgba(217,107,107,.5))}.tab-item.active[data-color="earth"] .tab-icon-wrap svg{fill:var(--earth);stroke:var(--earth);filter:drop-shadow(0 0 6px rgba(155,123,191,.5))}.tab-item.active[data-color="wood"] .tab-icon-wrap svg{fill:var(--wood);stroke:var(--wood);filter:drop-shadow(0 0 6px rgba(160,184,122,.5))}.tab-item.active .tab-label{color:rgba(255,255,255,.9);font-weight:600}</style>
</head>

</div> <div class="app-shell"> <div class="page-wrap"> <section class="page-section active" id="pageStar" data-page="star"></section> <section class="page-section" id="pageStory" data-page="story"></section> <section class="page-section" id="pageCollide" data-page="collide"></section> <section class="page-section" id="pageSquare" data-page="square"></section> <section class="page-section" id="pageMe" data-page="me"></section> </div> <div class="bottom-tab" id="bottomTab"> <div class="tab-item active" data-page="star" data-color="gold" onclick="switchTab('star')"> <div class="tab-icon-wrap"> <svg viewBox="0 0 24 24" fill="none"> <circle cx="12" cy="12" r="2.5" fill="currentColor" opacity="0.9"/> <ellipse cx="12" cy="12" rx="5" ry="2" stroke="currentColor" stroke-width="1" opacity="0.5" transform="rotate(-30 12 12)"/> <ellipse cx="12" cy="12" rx="8" ry="3" stroke="currentColor" stroke-width="1" opacity="0.3" transform="rotate(20 12 12)"/> <circle cx="6" cy="8" r="0.8" fill="currentColor" opacity="0.6"/> <circle cx="18" cy="7" r="0.6" fill="currentColor" opacity="0.5"/> <circle cx="17" cy="17" r="0.7" fill="currentColor" opacity="0.4"/> <circle cx="7" cy="16" r="0.5" fill="currentColor" opacity="0.5"/> </svg> </div> <div class="tab-label">星图</div> </div> <div class="tab-item" data-page="story" data-color="water" onclick="switchTab('story')"> <div class="tab-icon-wrap"> <svg viewBox="0 0 24 24" fill="none"> <circle cx="12" cy="12" r="1.5" fill="currentColor"/> <path d="M12 7a5 5 0 100 10 5 5 0 000-10" stroke="currentColor" stroke-width="1.2" opacity="0.7" fill="none"/> <path d="M12 4.5a7.5 7.5 0 100 15 7.5 7.5 0 000-15" stroke="currentColor" stroke-width="1" opacity="0.4" fill="none"/> <path d="M5 12h2M17 12h2M12 5v2M12 17v2" stroke="currentColor" stroke-width="0.8" opacity="0.3" stroke-linecap="round"/> </svg> </div> <div class="tab-label">故事</div> </div> <div class="tab-item" data-page="collide" data-color="fire" onclick="switchTab('collide')"> <div class="tab-icon-wrap"> <svg viewBox="0 0 24 24" fill="none"> <circle cx="8" cy="12" r="3" fill="currentColor" opacity="0.7"/> <circle cx="16" cy="12" r="3" fill="currentColor" opacity="0.7"/> <path d="M11 9l2-2M11 15l2 2M13 9l-2-2M13 15l-2 2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" opacity="0.9"/> <circle cx="12" cy="12" r="1.5" fill="currentColor" opacity="0.5"/> <path d="M8 8.5c1.5-1.5 5-1.5 6.5 0" stroke="currentColor" stroke-width="0.8" opacity="0.4" fill="none"/> <path d="M8 15.5c1.5 1.5 5 1.5 6.5 0" stroke="currentColor" stroke-width="0.8" opacity="0.4" fill="none"/> </svg> </div> <div class="tab-label">碰撞</div> </div> <div class="tab-item" data-page="square" data-color="earth" onclick="switchTab('square')"> <div class="tab-icon-wrap"> <svg viewBox="0 0 24 24" fill="none"> <circle cx="12" cy="12" r="3" fill="currentColor" opacity="0.8"/> <path d="M12 12 Q8 8 5 9 Q3 10 4 13" stroke="currentColor" stroke-width="1.2" opacity="0.5" fill="none" stroke-linecap="round"/> <path d="M12 12 Q16 8 19 9 Q21 10 20 13" stroke="currentColor" stroke-width="1.2" opacity="0.5" fill="none" stroke-linecap="round"/> <path d="M12 12 Q8 16 5 15 Q3 14 4 11" stroke="currentColor" stroke-width="1.2" opacity="0.5" fill="none" stroke-linecap="round"/> <path d="M12 12 Q16 16 19 15 Q21 14 20 11" stroke="currentColor" stroke-width="1.2" opacity="0.5" fill="none" stroke-linecap="round"/> <circle cx="6" cy="7" r="0.7" fill="currentColor" opacity="0.4"/> <circle cx="18" cy="7" r="0.6" fill="currentColor" opacity="0.4"/> <circle cx="6" cy="17" r="0.6" fill="currentColor" opacity="0.4"/> <circle cx="18" cy="17" r="0.7" fill="currentColor" opacity="0.4"/> </svg> </div> <div class="tab-label">广场</div> </div> <div class="tab-item" data-page="me" data-color="wood" onclick="switchTab('me')"> <div class="tab-icon-wrap"> <svg viewBox="0 0 24 24" fill="none"> <path d="M12 22v-8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/> <path d="M12 14c-2.5-1-4-3-4-5.5a4 4 0 018 0c0 2.5-1.5 4.5-4 5.5z" fill="currentColor" opacity="0.3" stroke="currentColor" stroke-width="1"/> <path d="M12 10c-1-0.5-1.8-1.5-1.8-2.8a1.8 1.8 0 013.6 0c0 1.3-0.8 2.3-1.8 2.8z" fill="currentColor" opacity="0.6"/> <circle cx="8" cy="12" r="0.6" fill="currentColor" opacity="0.4"/> <circle cx="16" cy="11" r="0.5" fill="currentColor" opacity="0.4"/> <circle cx="9" cy="8" r="0.4" fill="currentColor" opacity="0.3"/> <circle cx="15" cy="7" r="0.4" fill="currentColor" opacity="0.3"/> <path d="M10 22c0-1 0.8-1.5 2-1.5s2 0.5 2 1.5" stroke="currentColor" stroke-width="0.8" opacity="0.3" fill="none"/> </svg> </div> <div class="tab-label">我的</div> </div> </div>
</div> <script>// ===== 星空生成 =====
(function(){var c=document.getElementById('splashStars');for(var i=0;i<50;i++){var s=document.createElement('div');s.className='splash-star';s.style.left=Math.random()*100+'%';s.style.top=Math.random()*100+'%';var size=Math.random()*2+0.5;s.style.width=size+'px';s.style.height=size+'px';s.style.setProperty('--dur',(Math.random()*3+2)+'s');s.style.animationDelay=Math.random()*3+'s';c.appendChild(s);}})();// ===== 入场逻辑 =====
var splash=document.getElementById('splash');var jumped=false;function enterApp(){if(jumped)return;jumped=true;splash.classList.add('fade-out');setTimeout(function(){splash.classList.add('hidden');},900);}document.getElementById('skipBtn').addEventListener('click',enterApp);setTimeout(function(){if(!jumped)enterApp();},4500);// ===== Tab切换 =====
var currentPage='star';function switchTab(page){if(page===currentPage)return;currentPage=page;// 切换active状态 var tabs=document.querySelectorAll('.tab-item');tabs.forEach(function(t){t.classList.remove('active')});document.querySelector('.tab-item[data-page="'+page+'"]').classList.add('active');// 切换页面 var sections=document.querySelectorAll('.page-section');sections.forEach(function(s){s.classList.remove('active')});var pageId='page'+page.charAt(0).toUpperCase()+page.slice(1);document.getElementById(pageId).classList.add('active');// 触发页面加载 loadPage(page);// 确保splash已隐藏 if(!splash.classList.contains('hidden')){splash.classList.add('hidden');}}// ===== 页面内容加载 =====
var pagesLoaded={};function loadPage(page){if(pagesLoaded[page])return;pagesLoaded[page]=true;var pageId='page'+page.charAt(0).toUpperCase()+page.slice(1);var el=document.getElementById(pageId);// 通过fetch加载页面内容 var files={star:'导航一星图首页.html',story:'导航二故事首页.html',collide:'导航三碰撞首页.html',square:'导航四广场首页.html',me:'导航五我的首页.html'};fetch(files[page]) .then(function(r){return r.text()}) .then(function(html){// 提取body内容 var match=html.match(/<body[^>]*>([\s\S]*?)<\/body>/i);if(match){el.innerHTML=match[1];// 移除子页面的body样式 var style=el.querySelector('style');if(style){// 让子页面的样式生效 document.head.appendChild(style);}// 执行script var scripts=el.querySelectorAll('script');scripts.forEach(function(s){var ns=document.createElement('script');ns.textContent=s.textContent;document.body.appendChild(ns);s.remove();});}}) .catch(function(e){el.innerHTML='<div style="padding:40px;text-align:center;color:#666;">页面加载失败<br><small>'+e.message+'</small></div>';});}// ===== 预加载第一个页面 =====
setTimeout(function(){loadPage('star');},100);</script>
