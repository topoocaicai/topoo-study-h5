<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TopSpace · 街区地图</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0B0F1E;
            color: #F5F0E8;
            font-family: -apple-system, "PingFang SC", "Helvetica Neue", sans-serif;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            touch-action: none;
            -webkit-user-select: none;
            user-select: none;
        }

        /* 顶部栏 */
        .top-bar {
            position: fixed; top: 0; left: 0; right: 0; z-index: 100;
            display: flex; align-items: center; justify-content: space-between;
            padding: 12px 16px;
            background: linear-gradient(180deg, rgba(11,15,30,0.95) 0%, rgba(11,15,30,0) 100%);
        }
        .top-left { display: flex; align-items: center; gap: 8px; }
        .logo-icon {
            width: 32px; height: 32px; border-radius: 50%;
            background: linear-gradient(135deg, #4A9EB8, #9B7BBF);
            display: flex; align-items: center; justify-content: center;
            font-weight: 700; font-size: 14px; color: #fff;
        }
        .logo-text { font-size: 16px; font-weight: 600; letter-spacing: 1px; }
        .top-right { display: flex; align-items: center; gap: 12px; }
        .plate-badge {
            background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.12);
            border-radius: 12px; padding: 4px 10px; font-size: 12px; font-weight: 600;
            letter-spacing: 1px; color: #F5F0E8;
        }
        .btn-back {
            background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.12);
            border-radius: 20px; padding: 6px 14px; font-size: 12px; color: #F5F0E8;
            cursor: pointer; border: none;
        }

        /* 街区标题 */
        .map-title {
            position: fixed; top: 56px; left: 0; right: 0; z-index: 99;
            text-align: center; padding: 8px;
        }
        .map-title-main { font-size: 18px; font-weight: 700; letter-spacing: 2px; }
        .map-title-sub { font-size: 11px; color: rgba(245,240,232,0.45); margin-top: 2px; }

        /* 地图画布 */
        #mapCanvas {
            position: fixed; top: 0; left: 0;
            width: 100vw; height: 100vh;
        }

        /* 提示 */
        .hint-bar {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            z-index: 100;
            background: rgba(11,15,30,0.7); border: 1px solid rgba(255,255,255,0.08);
            border-radius: 20px; padding: 6px 18px;
            font-size: 11px; color: rgba(245,240,232,0.4);
            backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
        }

        /* 迷你地图 */
        .minimap {
            position: fixed; bottom: 56px; right: 12px; z-index: 100;
            width: 80px; height: 80px; border-radius: 12px;
            background: rgba(11,15,30,0.8); border: 1px solid rgba(255,255,255,0.1);
            overflow: hidden; backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
        }
        .minimap canvas { width: 100%; height: 100%; }

        /* 信息卡弹窗 */
        .info-overlay {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            z-index: 200; display: none; align-items: flex-end; justify-content: center;
        }
        .info-overlay.show { display: flex; }
        .info-overlay-bg {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.5);
        }
        .info-panel {
            position: relative; z-index: 1;
            width: 92%; max-width: 380px;
            background: linear-gradient(135deg, rgba(20,24,40,0.98), rgba(30,35,55,0.98));
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px 20px 0 0;
            padding: 20px 20px 32px;
            animation: slideUp 0.3s ease;
        }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        .info-close {
            position: absolute; top: 12px; right: 16px;
            background: none; border: none; color: rgba(245,240,232,0.4);
            font-size: 18px; cursor: pointer;
        }
        .info-header { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }
        .info-avatar {
            width: 48px; height: 48px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 24px;
        }
        .info-name { font-size: 17px; font-weight: 700; }
        .info-type { font-size: 12px; margin-top: 2px; }
        .secluded-tag {
            display: inline-block; margin-top: 4px;
            background: rgba(255,255,255,0.06); border-radius: 8px;
            padding: 2px 8px; font-size: 10px; color: rgba(245,240,232,0.35);
        }
        /* 五行条 */
        .elem-bars { display: flex; flex-direction: column; gap: 6px; margin-bottom: 16px; }
        .elem-bar-row { display: flex; align-items: center; gap: 8px; }
        .elem-bar-label { font-size: 11px; width: 60px; color: rgba(245,240,232,0.5); text-align: right; }
        .elem-bar-track { flex: 1; height: 6px; background: rgba(255,255,255,0.06); border-radius: 3px; overflow: hidden; }
        .elem-bar-fill { height: 100%; border-radius: 3px; transition: width 0.5s ease; }
        .elem-bar-val { font-size: 11px; width: 28px; color: rgba(245,240,232,0.4); }
        /* 统计 */
        .info-stats { display: flex; gap: 20px; margin-bottom: 16px; }
        .info-stat-item { text-align: center; }
        .info-stat-val { font-size: 22px; font-weight: 700; }
        .info-stat-lbl { font-size: 11px; color: rgba(245,240,232,0.4); margin-top: 2px; }
        /* 按钮 */
        .btn-enter {
            width: 100%; padding: 12px; border-radius: 12px;
            background: linear-gradient(135deg, rgba(74,158,184,0.3), rgba(155,123,191,0.3));
            border: 1px solid rgba(255,255,255,0.1);
            color: #F5F0E8; font-size: 14px; font-weight: 600;
            letter-spacing: 3px; cursor: pointer;
        }
        .btn-enter.disabled {
            opacity: 0.3; pointer-events: none;
        }
    </style>
</head>
<body>

<div class="top-bar">
    <div class="top-left">
        <div class="logo-icon">T</div>
        <div class="logo-text">TopSpace</div>
    </div>
    <div class="top-right">
        <div class="plate-badge">0527</div>
        <button class="btn-back" onclick="history.back()">← 返回球体</button>
    </div>
</div>

<div class="map-title">
    <div class="map-title-main">蛋生壹号街区</div>
    <div class="map-title-sub">金陵大陆 · 平面星图</div>
</div>

<canvas id="mapCanvas"></canvas>

<div class="hint-bar">单指滑动探索 · 双指缩放 · 点击星球查看</div>

<div class="minimap"><canvas id="minimapCanvas"></canvas></div>

<!-- 信息卡 -->
<div class="info-overlay" id="infoOverlay">
    <div class="info-overlay-bg" onclick="closeInfo()"></div>
    <div class="info-panel">
        <button class="info-close" onclick="closeInfo()">✕</button>
        <div class="info-header">
            <div class="info-avatar" id="iAvatar"></div>
            <div>
                <div class="info-name" id="iName">—</div>
                <div class="info-type" id="iType">—</div>
                <div class="secluded-tag" id="iSecluded" style="display:none;">闭关中</div>
            </div>
        </div>
        <div class="elem-bars" id="iBars"></div>
        <div class="info-stats">
            <div class="info-stat-item">
                <div class="info-stat-val" id="iCollisions">0</div>
                <div class="info-stat-lbl">碰撞</div>
            </div>
            <div class="info-stat-item">
                <div class="info-stat-val" id="iIgnitions">0</div>
                <div class="info-stat-lbl">点亮</div>
            </div>
            <div class="info-stat-item">
                <div class="info-stat-val" id="iDistance">0</div>
                <div class="info-stat-lbl">距你</div>
            </div>
        </div>
        <button class="btn-enter" id="btnEnter" onclick="enterSpace()">进 入 空 间</button>
    </div>
</div>

<script>
// ========== 五行配色 ==========
const EL_COLORS = {
    fire:  { main: '#D96B6B', glow: 'rgba(217,107,107,0.3)', bg: 'rgba(217,107,107,0.12)', label: '🔥 火型' },
    water: { main: '#4A9EB8', glow: 'rgba(74,158,184,0.3)',  bg: 'rgba(74,158,184,0.12)',  label: '💧 水型' },
    wood:  { main: '#A0B87A', glow: 'rgba(160,184,122,0.3)', bg: 'rgba(160,184,122,0.12)', label: '🌱 木型' },
    metal: { main: '#E8B44C', glow: 'rgba(232,180,76,0.3)',  bg: 'rgba(232,180,76,0.12)',  label: '⚙️ 金型' },
    earth: { main: '#9B7BBF', glow: 'rgba(155,123,191,0.3)', bg: 'rgba(155,123,191,0.12)', label: '🌍 土型' },
};
const EL_KEYS = ['fire','water','wood','metal','earth'];
const EL_CN = { fire:'火', water:'水', wood:'木', metal:'金', earth:'土' };

// ========== Mock数据 ==========
function generateMockNodes() {
    const NAMES = [
        '星尘','流光','青木','金石','厚土','晨露','焱焰','碧藤','银铃','琥珀',
        '极光','赤松','云归','霜降','岚烟','墨染','月蚀','星轨','潮汐','萤火',
        '破晓','暮色','归鸿','逝川','空镜','浮岛','晚祷','迷迭','霜天','半夏',
        '长风','微澜','寒烟','素履','清欢','南风','北望','东篱','西洲','中岳',
        '白驹','苍狗','丹枫','碧落','紫陌','红尘','青瓦','墨客','诗酒','茶凉',
        '听雨','看云','临风','对月','烹茶','煮酒','抚琴','对弈','听涛','观海',
        '织锦','刺绣','烧瓷','炼铁','琢玉','雕木','垒石','筑土','引水','开山',
        '拾光','捕风','捉影','留香','寄梦','托月','挽星','摘云','渡舟','归帆',
        '踏雪','寻梅','访菊','问兰','采薇','钓雪','锄月','种云','栽星','养光',
        '无声','未央','不系','无疆','自在','如初','似锦','归零','出发','抵达'
    ];
    const EMOJIS = ['🌙','✨','🌿','💎','🏔️','💧','🔥','🌱','🔔','🟤',
                  '🌈','🎋','⭐','🌊','🍃','🗿','🌾','🔮','🎐','💫',
                  '🦊','🐉','🦉','🐚','🌺','🌸','🍂️','🌻','🌷','🌹',
                  '⚗️','🔭','🧪','📡','🔬','🔧','⚙️','🛠️','🧬','💊',
                  '⚗','📖','🖋️','🎵','🎶','🎸','🎹','🎺','🎻','🥁'];
    const nodes = [];
    const secludedIndices = new Set();
    while (secludedIndices.size < 15) { secludedIndices.add(Math.floor(Math.random() * 100)); }
    for (let i = 0; i < 100; i++) {
        nodes.push({
            id: i + 1, name: NAMES[i], emoji: EMOJIS[i % EMOJIS.length],
            element: EL_KEYS[i % 5], secluded: secludedIndices.has(i),
            fire: Math.floor(30 + Math.random() * 70),
            water: Math.floor(30 + Math.random() * 70),
            wood: Math.floor(30 + Math.random() * 70),
            metal: Math.floor(30 + Math.random() * 70),
            earth: Math.floor(30 + Math.random() * 70),
            collisions: Math.floor(Math.random() * 500),
            ignitions: Math.floor(Math.random() * 80),
            visited: i < 8, // 模拟前8个已碰撞过
        });
    }
    return nodes;
}

// ========== 球面→平面投影 ==========
function sphereToPlane(nodes) {
    const N = nodes.length;
    const goldenAngle = Math.PI * (3 - Math.sqrt(5));
    const result = [];
    for (let i = 0; i < N; i++) {
        // Fibonacci球面坐标
        const y = 1 - (i / (N - 1)) * 2;
        const radius = Math.sqrt(1 - y * y);
        const theta = goldenAngle * i;
        const x3d = radius * Math.cos(theta);
        const z3d = radius * Math.sin(theta);
        // 墨卡托投影（球面→平面）
        const lon = Math.atan2(z3d, x3d); // -PI ~ PI
        const lat = Math.asin(y);          // -PI/2 ~ PI/2
        // 映射到像素坐标（世界坐标）
        const mapW = 1600;
        const mapH = 800;
        const px = ((lon + Math.PI) / (2 * Math.PI)) * mapW;
        const py = ((Math.PI / 2 - lat) / Math.PI) * mapH;
        result.push({
            ...nodes[i],
            wx: px, wy: py,    // 世界坐标
            lon, lat,           // 经纬度（用于计算距离）
        });
    }
    return result;
}

// ========== 生成边（邻接关系：最近邻） ==========
function generateEdges(nodes) {
    const edges = [];
    const maxDist = 0.35; // 弧度阈值
    for (let i = 0; i < nodes.length; i++) {
        for (let j = i + 1; j < nodes.length; j++) {
            // 用球面角距离
            const dot = (
                Math.cos(nodes[i].lat) * Math.cos(nodes[j].lat) *
                Math.cos(nodes[i].lon - nodes[j].lon) +
                Math.sin(nodes[i].lat) * Math.sin(nodes[j].lat)
            );
            const dist = Math.acos(Math.max(-1, Math.min(1, dot)));
            if (dist < maxDist) {
                edges.push([i, j]);
            }
        }
    }
    return edges;
}

// ========== 初始化数据 ==========
const mockNodes = generateMockNodes();
const mapNodes = sphereToPlane(mockNodes);
const mapEdges = generateEdges(mapNodes);

// ========== Canvas & 视口 ==========
const canvas = document.getElementById('mapCanvas');
const ctx = canvas.getContext('2d');
const mmCanvas = document.getElementById('minimapCanvas');
const mmCtx = mmCanvas.getContext('2d');

let W, H, dpr;
let viewX = 0, viewY = 0;   // 视口中心的世界坐标
let zoom = 1;
const MAP_W = 1600, MAP_H = 800;

// 用户自己的星球（第1个）
const MY_ID = 0;

function resize() {
    dpr = window.devicePixelRatio || 1;
    W = window.innerWidth;
    H = window.innerHeight;
    canvas.width = W * dpr;
    canvas.height = H * dpr;
    canvas.style.width = W + 'px';
    canvas.style.height = H + 'px';
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    mmCanvas.width = 80 * dpr;
    mmCanvas.height = 80 * dpr;
    mmCtx.setTransform(dpr, 0, 0, dpr, 0, 0);
}
window.addEventListener('resize', resize);
resize();

// 初始居中到自己的星球
viewX = mapNodes[MY_ID].wx;
viewY = mapNodes[MY_ID].wy;

// ========== 触摸交互 ==========
let touching = false;
let touchStartX = 0, touchStartY = 0;
let touchViewX = 0, touchViewY = 0;
let pinchDist0 = 0, pinchZoom0 = 1;
let isPinch = false;

function wrapCoord(v, max) { return ((v % max) + max) % max; }

canvas.addEventListener('touchstart', e => {
    e.preventDefault();
    if (e.touches.length === 1) {
        touching = true; isPinch = false;
        touchStartX = e.touches[0].clientX;
        touchStartY = e.touches[0].clientY;
        touchViewX = viewX;
        touchViewY = viewY;
    } else if (e.touches.length === 2) {
        isPinch = true;
        const dx = e.touches[1].clientX - e.touches[0].clientX;
        const dy = e.touches[1].clientY - e.touches[0].clientY;
        pinchDist0 = Math.sqrt(dx * dx + dy * dy);
        pinchZoom0 = zoom;
    }
}, { passive: false });

canvas.addEventListener('touchmove', e => {
    e.preventDefault();
    if (isPinch && e.touches.length === 2) {
        const dx = e.touches[1].clientX - e.touches[0].clientX;
        const dy = e.touches[1].clientY - e.touches[0].clientY;
        const dist = Math.sqrt(dx * dx + dy * dy);
        zoom = Math.max(0.4, Math.min(3, pinchZoom0 * (dist / pinchDist0)));
    } else if (touching && e.touches.length === 1) {
        const dx = e.touches[0].clientX - touchStartX;
        const dy = e.touches[0].clientY - touchStartY;
        // 地图跟随手指移动（世界坐标取反）
        viewX = wrapCoord(touchViewX - dx / zoom, MAP_W);
        viewY = wrapCoord(touchViewY - dy / zoom, MAP_H);
    }
}, { passive: false });

canvas.addEventListener('touchend', e => {
    if (e.touches.length < 2) isPinch = false;
    if (e.touches.length === 0) touching = false;
});

// 鼠标交互（PC调试）
let mDown = false, mStartX = 0, mStartY = 0, mViewX = 0, mViewY = 0;
canvas.addEventListener('mousedown', e => {
    mDown = true; mStartX = e.clientX; mStartY = e.clientY;
    mViewX = viewX; mViewY = viewY;
});
canvas.addEventListener('mousemove', e => {
    if (!mDown) return;
    const dx = e.clientX - mStartX;
    const dy = e.clientY - mStartY;
    viewX = wrapCoord(mViewX - dx / zoom, MAP_W);
    viewY = wrapCoord(mViewY - dy / zoom, MAP_H);
});
canvas.addEventListener('mouseup', () => mDown = false);
canvas.addEventListener('mouseleave', () => mDown = false);
canvas.addEventListener('wheel', e => {
    e.preventDefault();
    zoom = Math.max(0.4, Math.min(3, zoom * (e.deltaY > 0 ? 0.92 : 1.08)));
}, { passive: false });

// 点击检测
let tapStart = 0;
canvas.addEventListener('touchstart', () => { tapStart = Date.now(); });
canvas.addEventListener('touchend', e => {
    if (Date.now() - tapStart > 300) return; // 长按不算点击
    if (e.changedTouches.length !== 1) return;
    const tx = e.changedTouches[0].clientX;
    const ty = e.changedTouches[0].clientY;
    const hit = hitTest(tx, ty);
    if (hit !== null) showInfo(hit);
});
canvas.addEventListener('click', e => {
    // PC click
    const hit = hitTest(e.clientX, e.clientY);
    if (hit !== null) showInfo(hit);
});

// ========== 碰撞检测 ==========
function worldToScreen(wx, wy) {
    let dx = wx - viewX;
    let dy = wy - viewY;
    // 环面最短路径
    if (dx > MAP_W / 2) dx -= MAP_W;
    if (dx < -MAP_W / 2) dx += MAP_W;
    if (dy > MAP_H / 2) dy -= MAP_H;
    if (dy < -MAP_H / 2) dy += MAP_H;
    return {
        x: W / 2 + dx * zoom,
        y: H / 2 + dy * zoom,
    };
}

function hitTest(sx, sy) {
    let closest = null, closestDist = 30;
    for (let i = 0; i < mapNodes.length; i++) {
        const p = worldToScreen(mapNodes[i].wx, mapNodes[i].wy);
        const d = Math.sqrt((sx - p.x) ** 2 + (sy - p.y) ** 2);
        if (d < closestDist) { closest = i; closestDist = d; }
    }
    return closest;
}

// ========== 信息卡 ==========
function showInfo(idx) {
    const n = mapNodes[idx];
    const c = n.secluded ? '#3A3A44' : EL_COLORS[n.element].main;
    document.getElementById('iAvatar').style.background = c;
    document.getElementById('iAvatar').textContent = n.emoji;
    document.getElementById('iName').textContent = n.name;
    document.getElementById('iType').textContent = n.secluded ? '闭关中' : EL_COLORS[n.element].label;
    document.getElementById('iSecluded').style.display = n.secluded ? 'inline-block' : 'none';
    // 五行条
    const bars = document.getElementById('iBars');
    bars.innerHTML = '';
    EL_KEYS.forEach(k => {
        const val = n[k];
        bars.innerHTML += `
            <div class="elem-bar-row">
                <div class="elem-bar-label">${EL_CN[k]}</div>
                <div class="elem-bar-track">
                    <div class="elem-bar-fill" style="width:${val}%;background:${EL_COLORS[k].main}"></div>
                </div>
                <div class="elem-bar-val">${val}</div>
            </div>`;
    });
    document.getElementById('iCollisions').textContent = n.collisions;
    document.getElementById('iIgnitions').textContent = n.ignitions;
    // 计算距离
    const dot = (
        Math.cos(n.lat) * Math.cos(mapNodes[MY_ID].lat) *
        Math.cos(n.lon - mapNodes[MY_ID].lon) +
        Math.sin(n.lat) * Math.sin(mapNodes[MY_ID].lat)
    );
    const arcDist = Math.acos(Math.max(-1, Math.min(1, dot)));
    const stepDist = Math.round(arcDist / 0.35);
    document.getElementById('iDistance').textContent = stepDist + '步';
    // 进入按钮
    const btn = document.getElementById('btnEnter');
    if (n.secluded) {
        btn.classList.add('disabled');
        btn.textContent = '闭关中，无法进入';
    } else {
        btn.classList.remove('disabled');
        btn.textContent = '进 入 空 间';
    }
    document.getElementById('infoOverlay').classList.add('show');
}

function closeInfo() {
    document.getElementById('infoOverlay').classList.remove('show');
}

function enterSpace() {
    alert('进入空间功能（待实现）');
}

// ========== 渲染 ==========
function render() {
    ctx.clearRect(0, 0, W, H);
    // 深色背景
    ctx.fillStyle = '#0B0F1E';
    ctx.fillRect(0, 0, W, H);

    // 微弱星空背景
    const starSeed = 42;
    for (let i = 0; i < 60; i++) {
        const sx = ((i * 137.508 + starSeed) % W);
        const sy = ((i * 97.31 + starSeed * 2) % H);
        const alpha = 0.15 + (i % 5) * 0.06;
        ctx.fillStyle = `rgba(245,240,232,${alpha})`;
        ctx.beginPath();
        ctx.arc(sx, sy, 0.5 + (i % 3) * 0.3, 0, Math.PI * 2);
        ctx.fill();
    }

    const nodeRadius = Math.max(4, 12 * zoom);

    // 绘制连线（考虑环面绕接）
    ctx.lineWidth = Math.max(0.5, 1 * zoom);
    mapEdges.forEach(([a, b]) => {
        const pa = worldToScreen(mapNodes[a].wx, mapNodes[a].wy);
        const pb = worldToScreen(mapNodes[b].wx, mapNodes[b].wy);
        // 裁剪：至少一端在视口内才画
        const margin = 100;
        const aVisible = pa.x > -margin && pa.x < W + margin && pa.y > -margin && pa.y < H + margin;
        const bVisible = pb.x > -margin && pb.x < W + margin && pb.y > -margin && pb.y < H + margin;
        if (!aVisible && !bVisible) return;
        // 如果屏幕距离太远说明绕了半个地图，跳过
        const screenDist = Math.sqrt((pa.x - pb.x) ** 2 + (pa.y - pb.y) ** 2);
        if (screenDist > 400 * zoom) return;

        const bothVisited = mapNodes[a].visited && mapNodes[b].visited;
        const eitherSecluded = mapNodes[a].secluded || mapNodes[b].secluded;
        ctx.strokeStyle = eitherSecluded
            ? 'rgba(58,58,68,0.2)'
            : bothVisited
                ? 'rgba(245,240,232,0.15)'
                : 'rgba(245,240,232,0.06)';
        ctx.beginPath();
        ctx.moveTo(pa.x, pa.y);
        ctx.lineTo(pb.x, pb.y);
        ctx.stroke();
    });

    // 绘制星球节点
    for (let i = 0; i < mapNodes.length; i++) {
        const n = mapNodes[i];
        const p = worldToScreen(n.wx, n.wy);
        // 裁剪
        if (p.x < -50 || p.x > W + 50 || p.y < -50 || p.y > H + 50) continue;

        const isMe = i === MY_ID;
        const r = isMe ? nodeRadius * 1.5 : nodeRadius;

        if (n.secluded) {
            // 闭关：灰色半透明
            ctx.fillStyle = 'rgba(58,58,68,0.4)';
            ctx.strokeStyle = 'rgba(58,58,68,0.3)';
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.arc(p.x, p.y, r, 0, Math.PI * 2);
            ctx.fill();
            ctx.stroke();
            // 灰色emoji
            ctx.globalAlpha = 0.3;
            ctx.font = `${r * 1.2}px sans-serif`;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('🪨', p.x, p.y);
            ctx.globalAlpha = 1;
        } else {
            const color = EL_COLORS[n.element];
            // 已碰撞的：发光+亮色
            if (n.visited) {
                // 外发光
                const grd = ctx.createRadialGradient(p.x, p.y, r * 0.5, p.x, p.y, r * 2.5);
                grd.addColorStop(0, color.glow);
                grd.addColorStop(1, 'rgba(0,0,0,0)');
                ctx.fillStyle = grd;
                ctx.beginPath();
                ctx.arc(p.x, p.y, r * 2.5, 0, Math.PI * 2);
                ctx.fill();
                // 实心球
                ctx.fillStyle = color.bg;
                ctx.beginPath();
                ctx.arc(p.x, p.y, r, 0, Math.PI * 2);
                ctx.fill();
                ctx.strokeStyle = color.main;
                ctx.lineWidth = 1.5;
                ctx.stroke();
            } else {
                // 未碰撞：暗色轮廓
                ctx.fillStyle = 'rgba(255,255,255,0.03)';
                ctx.beginPath();
                ctx.arc(p.x, p.y, r, 0, Math.PI * 2);
                ctx.fill();
                ctx.strokeStyle = 'rgba(245,240,232,0.12)';
                ctx.lineWidth = 1;
                ctx.setLineDash([2, 2]);
                ctx.stroke();
                ctx.setLineDash([]);
            }
            // emoji
            ctx.font = `${r * 1.3}px sans-serif`;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.globalAlpha = n.visited ? 1 : 0.35;
            ctx.fillText(n.emoji, p.x, p.y);
            ctx.globalAlpha = 1;
        }

        // 名字（缩放足够大时显示）
        if (zoom > 0.7 && !n.secluded) {
            ctx.font = `${Math.max(9, 10 * zoom)}px "PingFang SC", sans-serif`;
            ctx.textAlign = 'center';
            ctx.fillStyle = n.visited ? 'rgba(245,240,232,0.7)' : 'rgba(245,240,232,0.2)';
            ctx.fillText(n.name, p.x, p.y + r + 12 * zoom);
        }

        // "我"的标记
        if (isMe) {
            ctx.strokeStyle = '#F5F0E8';
            ctx.lineWidth = 2;
            ctx.setLineDash([4, 3]);
            ctx.beginPath();
            ctx.arc(p.x, p.y, r + 6, 0, Math.PI * 2);
            ctx.stroke();
            ctx.setLineDash([]);
            // "你"标签
            ctx.font = 'bold 10px "PingFang SC", sans-serif';
            ctx.fillStyle = '#F5F0E8';
            ctx.fillText('你在这里', p.x, p.y - r - 10);
        }
    }

    // 绘制迷你地图
    renderMinimap();

    requestAnimationFrame(render);
}

function renderMinimap() {
    const mw = 80, mh = 80;
    mmCtx.clearRect(0, 0, mw, mh);
    mmCtx.fillStyle = 'rgba(11,15,30,0.9)';
    mmCtx.fillRect(0, 0, mw, mh);
    const sx = mw / MAP_W, sy = mh / MAP_H;
    // 画所有节点
    mapNodes.forEach((n, i) => {
        const mx = n.wx * sx, my = n.wy * sy;
        if (n.secluded) {
            mmCtx.fillStyle = 'rgba(58,58,68,0.5)';
        } else if (n.visited) {
            mmCtx.fillStyle = EL_COLORS[n.element].main;
        } else {
            mmCtx.fillStyle = 'rgba(245,240,232,0.15)';
        }
        mmCtx.beginPath();
        mmCtx.arc(mx, my, i === MY_ID ? 3 : 1.5, 0, Math.PI * 2);
        mmCtx.fill();
    });
    // 视口框
    const vpW = (W / zoom) * sx;
    const vpH = (H / zoom) * sy;
    const vpX = viewX * sx - vpW / 2;
    const vpY = viewY * sy - vpH / 2;
    mmCtx.strokeStyle = 'rgba(245,240,232,0.4)';
    mmCtx.lineWidth = 1;
    mmCtx.strokeRect(vpX, vpY, vpW, vpH);
}

// 启动
render();
</script>
