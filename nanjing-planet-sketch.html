// ========== RUSTY LAKE STYLE ==========
// Thick black ink outlines, flat colored fills, hand-drawn wobble
// Like it was drawn with a thick marker on rough paper

// Seeded random for consistent wobble
function seededRand(seed) {
  let s = seed;
  return function() {
    s = (s * 16807 + 0) % 2147483647;
    return (s - 1) / 2147483646;
  };
}

// Hand-drawn circle with visible wobble (thick marker feel)
function sketchCircle(x, y, r, seed) {
  const seg = 24;
  const rng = seededRand(seed);
  ctx.beginPath();
  for (let i = 0; i <= seg; i++) {
    const a = (i / seg) * Math.PI * 2;
    // Visible but not crazy wobble - feels hand-drawn
    const w = (rng() - 0.5) * r * 0.06 + (rng() - 0.5) * r * 0.04;
    const px = x + Math.cos(a) * (r + w);
    const py = y + Math.sin(a) * (r + w);
    if (i === 0) ctx.moveTo(px, py);
    else ctx.lineTo(px, py);
  }
  ctx.closePath();
}

// Hand-drawn wavy line
function sketchLine(x1, y1, x2, y2, seed) {
  const dx = x2 - x1, dy = y2 - y1;
  const len = Math.sqrt(dx*dx + dy*dy);
  const steps = Math.max(3, Math.floor(len / 18));
  const rng = seededRand(seed);
  ctx.beginPath();
  ctx.moveTo(x1, y1);
  for (let i = 1; i < steps; i++) {
    const t = i / steps;
    const wobble = (rng() - 0.5) * 2.5;
    const nx = -dy / len, ny = dx / len;
    ctx.lineTo(x1 + dx * t + nx * wobble, y1 + dy * t + ny * wobble);
  }
  ctx.lineTo(x2, y2);
  ctx.stroke();
}

// Flat color fill (clean circle, no gradient at all)
function flatFillCircle(x, y, r, color) {
  ctx.fillStyle = color;
  ctx.beginPath();
  ctx.arc(x, y, r, 0, Math.PI * 2);
  ctx.fill();
}

// ========== COLORS - Rusty Lake inspired ==========

  '城市探索': { bio: '用镜头记录南京每一个被忽略的角落。每条巷子都有自己的故事。', tags: ['城市文化','街拍','人文纪实'], fans: 28000, deals: 45 },
  '品牌设计': { bio: '8年品牌设计经验，服务过50+本土品牌。好设计不是好看，是好用。', tags: ['品牌策略','视觉设计','VI系统'], fans: 4200, deals: 312 },
  '城市市集': { bio: '每月一期的城市创意市集，已成功举办18期。聚集南京最有趣的独立品牌。', tags: ['线下活动','创意市集','社群运营'], fans: 15000, deals: 89 },
  '精酿工坊': { bio: '南京本土精酿品牌，坚持小批量酿造。每一口都是南京的味道。', tags: ['精酿啤酒','本地品牌','手工酿造'], fans: 8500, deals: 520 },

  '美食vlog': { bio: '南京土著，吃了30年。只为记录那些真正好吃的苍蝇馆子和深夜食堂。', tags: ['美食','本地生活','短视频'], fans: 45000, deals: 120 },
  '播客主理人': { bio: '《城市野人》播客主理人，每周更新。聊城市、聊人、聊那些有意思的事。', tags: ['播客','内容创作','访谈'], fans: 18000, deals: 67 },
  '空间设计': { bio: '专注小空间大利用。30平米做出60平米的既视感。', tags: ['室内设计','空间优化','小户型'], fans: 6700, deals: 89 },
  '摄影工作室': { bio: '不拍流水线证件照，只拍有温度的照片。', tags: ['商业摄影','人像','产品拍摄'], fans: 9200, deals: 234 },

const seekerNames = [
  'S-201','S-215','S-228','S-241','S-256',
  'S-269','S-282','S-295','S-308','S-321',
  'S-334','S-347','S-360','S-373','S-386',
  'S-399','S-412','S-425','S-438','S-451',
  'S-464','S-477','S-490','S-503','S-516',
  'S-529','S-542','S-555','S-568','S-581',

  'S-659','S-672','S-685','S-698','S-711'
];

// ========== BUILD NODES ==========
const nodes = [];
const SPHERE_R = 220;
const SEEKER_R = 330;

// Sphere distribution (Fibonacci sphere)
function fibSphere(i, total, radius) {
  const golden = Math.PI * (3 - Math.sqrt(5));
  const baseY = 1 - (i / (total - 1)) * 2;
  const y = Math.max(-0.95, Math.min(0.95, baseY));
  const r = Math.sqrt(1 - y * y);
  const theta = golden * i;
  const jitter = 0.92 + (Math.sin(i * 7.3 + 1.1) * 0.5 + 0.5) * 0.16;
  return {
    x: Math.cos(theta) * r * radius * jitter,
    y: y * radius * jitter,
    z: Math.sin(theta) * r * radius * jitter
  };
}

// Build all creators
const catKeys = ['product','store','content','service','event'];
catKeys.forEach(cat => {
  creatorNames[cat].forEach((name, i) => {
    const idx = nodes.length;
    const hasDetail = detailInfo[name];
    const size = hasDetail
      ? 16 + Math.sin(idx * 2.3) * 5 + Math.cos(idx * 5.1) * 3
      : 8 + Math.sin(idx * 3.7) * 3 + Math.cos(idx * 1.9) * 2;
    nodes.push({
      id: idx, name, cat,
      baseSize: Math.max(6, size),
      color: COLORS[cat],
      emoji: CAT_EMOJI[cat],
      isSeeker: false,
      hasDetail: !!hasDetail,
      detail: detailInfo[name] || null,
      seed: idx * 137.5 + 42
    });
  });
});

// Build seekers
seekerNames.forEach((name, i) => {
  nodes.push({
    id: nodes.length, name, cat: 'seeker',
    baseSize: Math.max(2.5, 3.5 + Math.sin(i * 3.1) * 1.5),
    color: COLORS.seeker,
    emoji: CAT_EMOJI.seeker,
    isSeeker: true, hasDetail: false, detail: null,
    seed: (nodes.length + i) * 97.3 + 13
  });
});

// Interleave positions so colors mix
const creators = nodes.filter(n => !n.isSeeker);
const seekers = nodes.filter(n => n.isSeeker);
const buckets = {};
catKeys.forEach(c => { buckets[c] = creators.filter(n => n.cat === c); });

const interleaved = [];
const queues = {};
catKeys.forEach(c => { queues[c] = [...buckets[c]]; });
let more = true;
while (more) {
  more = false;
  catKeys.forEach(c => {
    if (queues[c].length > 0) { interleaved.push(queues[c].shift()); more = true; }
  });
}
interleaved.forEach((n, i) => {
  const p = fibSphere(i, interleaved.length, SPHERE_R);
  n.x = p.x; n.y = p.y; n.z = p.z;
});
seekers.forEach((n, i) => {
  const p = fibSphere(i + 300, seekers.length, SEEKER_R);
  n.x = p.x; n.y = p.y; n.z = p.z;
});

// ========== EDGES ==========
const edges = [];
const creatorNodes = nodes.filter(n => !n.isSeeker);
const EDGE_DIST = 95;

for (let i = 0; i < creatorNodes.length; i++) {
  const a = creatorNodes[i];
  const dists = [];
  for (let j = 0; j < creatorNodes.length; j++) {
    if (i === j) continue;
    const b = creatorNodes[j];
    const dx = a.x-b.x, dy = a.y-b.y, dz = a.z-b.z;
    const d = Math.sqrt(dx*dx+dy*dy+dz*dz);
    if (d < EDGE_DIST) dists.push({j, d});
  }
  dists.sort((a,b) => a.d - b.d);
  const maxC = 1 + Math.floor(Math.abs(Math.sin(i*2.7)) * 3);
  for (let k = 0; k < Math.min(maxC, dists.length); k++) {
    const iA = nodes.indexOf(a), iB = nodes.indexOf(creatorNodes[dists[k].j]);
    const key = Math.min(iA,iB)+'-'+Math.max(iA,iB);
    if (!edges.find(e => e.key === key))
      edges.push({a: iA, b: iB, key, seed: iA*31+iB*17});
  }
}

const seekerEdges = [];
seekers.forEach((s, si) => {
  let minD = Infinity, nearI = -1;
  creators.forEach(c => {
    const dx=s.x-c.x, dy=s.y-c.y, dz=s.z-c.z;
    const d = Math.sqrt(dx*dx+dy*dy+dz*dz);
    if (d < minD) { minD = d; nearI = nodes.indexOf(c); }
  });
  if (nearI >= 0) seekerEdges.push({a: si, b: nearI, seed: si*53+7});
});

// ========== ROTATION & INPUT ==========
let rotY = 0, rotX = 0.3, autoRot = 0.0012, zoom = 1;
let dragging = false, lastX = 0, lastY = 0, velY = 0, velX = 0;

function project(x, y, z) {
  const cY = Math.cos(rotY), sY = Math.sin(rotY);
  let rx = x*cY - z*sY, rz = x*sY + z*cY;
  const cX = Math.cos(rotX), sX = Math.sin(rotX);
  let ry = y*cX - rz*sX; rz = y*sX + rz*cX;
  return { sx: cx + rx*zoom, sy: cy + ry*zoom, depth: rz };
}

let mouseX = -999, mouseY = -999, hoveredNode = null;

canvas.addEventListener('mousedown', e => { dragging = true; lastX = e.clientX; lastY = e.clientY; velY = velX = 0; });
canvas.addEventListener('mousemove', e => {
  mouseX = e.clientX; mouseY = e.clientY;
  if (dragging) {
    velY = (e.clientX-lastX)*0.004; velX = (e.clientY-lastY)*0.004;
    rotY += velY; rotX += velX;
    rotX = Math.max(-1.2, Math.min(1.2, rotX));
    lastX = e.clientX; lastY = e.clientY;
  }
});
canvas.addEventListener('mouseup', () => dragging = false);
canvas.addEventListener('mouseleave', () => { dragging = false; mouseX = -999; });
canvas.addEventListener('wheel', e => { e.preventDefault(); zoom *= e.deltaY>0 ? 0.93 : 1.07; zoom = Math.max(0.4, Math.min(3, zoom)); }, {passive:false});
canvas.addEventListener('click', () => { if (hoveredNode !== null) showDetail(nodes[hoveredNode]); });

let lastTouchDist = 0, touchSX = 0, touchSY = 0;
canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  if (e.touches.length === 1) {
    dragging = true; lastX = e.touches[0].clientX; lastY = e.touches[0].clientY;
    touchSX = lastX; touchSY = lastY; velY = velX = 0;
  } else if (e.touches.length === 2) {
    dragging = false;
    const dx = e.touches[0].clientX-e.touches[1].clientX, dy = e.touches[0].clientY-e.touches[1].clientY;
    lastTouchDist = Math.sqrt(dx*dx+dy*dy);
  }
}, {passive:false});
canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  if (e.touches.length === 1 && dragging) {
    velY = (e.touches[0].clientX-lastX)*0.004; velX = (e.touches[0].clientY-lastY)*0.004;
    rotY += velY; rotX += velX;
    rotX = Math.max(-1.2, Math.min(1.2, rotX));
    lastX = e.touches[0].clientX; lastY = e.touches[0].clientY;
    mouseX = e.touches[0].clientX; mouseY = e.touches[0].clientY;
  } else if (e.touches.length === 2) {
    const dx = e.touches[0].clientX-e.touches[1].clientX, dy = e.touches[0].clientY-e.touches[1].clientY;
    const dist = Math.sqrt(dx*dx+dy*dy);
    if (lastTouchDist > 0) { zoom *= dist/lastTouchDist; zoom = Math.max(0.4, Math.min(3, zoom)); }
    lastTouchDist = dist;
  }
}, {passive:false});
canvas.addEventListener('touchend', e => {
  if (e.changedTouches.length === 1) {
    const tx = e.changedTouches[0].clientX, ty = e.changedTouches[0].clientY;
    if (Math.sqrt((tx-touchSX)**2+(ty-touchSY)**2) < 10 && hoveredNode !== null) showDetail(nodes[hoveredNode]);
  }
  dragging = false; lastTouchDist = 0;
});

// ========== DETAIL PANEL ==========
function showDetail(node) {
  let h = `<button class="close" onclick="closePanel()">✕</button>`;
  h += `<div class="avatar-big" style="background:${node.color}">${node.emoji}</div>`;
  h += `<div class="p-name">${node.name}</div>`;
  h += `<div class="p-cat">${CAT_LABELS[node.cat]} · #${String(node.id+1).padStart(4,'0')}</div>`;
  if (node.hasDetail && node.detail) {
    const d = node.detail;
    h += `<div class="p-divider"></div>`;
    h += `<div class="p-row"><span>粉丝</span><span class="val">${d.fans.toLocaleString()}</span></div>`;
    h += `<div class="p-row"><span>成交</span><span class="val">${d.deals} 笔</span></div>`;
    h += `<div class="p-bio">${d.bio}</div>`;
    h += `<div class="p-tags">${d.tags.map(t=>`<span class="p-tag">${t}</span>`).join('')}</div>`;
  } else if (node.isSeeker) {
    h += `<div class="p-divider"></div><div class="p-na">🚶 正在探索中...</div>`;
  } else {
    h += `<div class="p-divider"></div><div class="p-na">📝 详细信息待完善</div>`;
  }
  panel.innerHTML = h;
  overlay.classList.add('show');
}
function closePanel() { overlay.classList.remove('show'); }
overlay.addEventListener('click', e => { if (e.target === overlay) closePanel(); });

// ========== PAPER BACKGROUND ==========
const texCvs = document.createElement('canvas');
const texCtx = texCvs.getContext('2d');
function genPaper() {
  texCvs.width = W; texCvs.height = H;
  texCtx.fillStyle = '#f5f0e8';
  texCtx.fillRect(0, 0, W, H);
  const img = texCtx.getImageData(0, 0, W, H);
  const d = img.data;
  for (let i = 0; i < d.length; i += 4) {
    const n = (Math.random() - 0.5) * 10;
    d[i] = Math.max(0, Math.min(255, d[i]+n));
    d[i+1] = Math.max(0, Math.min(255, d[i+1]+n));
    d[i+2] = Math.max(0, Math.min(255, d[i+2]+n));
  }
  texCtx.putImageData(img, 0, 0);
}
genPaper();
window.addEventListener('resize', () => { resize(); genPaper(); });

// ========== RENDER ==========
let frame = 0;

function draw() {
  requestAnimationFrame(draw);
  frame++;

  ctx.drawImage(texCvs, 0, 0);

  if (!dragging) {
    rotY += autoRot + velY * 0.95;
    rotX += velX * 0.95;
    velY *= 0.95; velX *= 0.95;
    rotX = Math.max(-1.2, Math.min(1.2, rotX));
  }

  const projected = nodes.map((n, i) => {
    let py = n.y;
    if (n.isSeeker) py += Math.sin(frame * 0.005 + i * 0.7) * 3;
    const p = project(n.x, py, n.z);
    return { ...p, node: n, idx: i };
  });
  projected.sort((a, b) => a.depth - b.depth);

  // Hover detection
  hoveredNode = null;
  let bestD = 35;
  projected.forEach(p => {
    if (mouseX < 0) return;
    const dx = mouseX - p.sx, dy = mouseY - p.sy;
    const d = Math.sqrt(dx*dx + dy*dy);
    const hitR = p.node.baseSize * zoom * 0.6 + 10;
    if (d < hitR && d < bestD) { bestD = d; hoveredNode = p.idx; }
  });

  // Draw sphere outline (very subtle)
  ctx.save();
  ctx.globalAlpha = 0.06;
  ctx.strokeStyle = '#2a2a2a';
  ctx.lineWidth = 1.5;
  ctx.setLineDash([5, 7]);
  sketchCircle(cx, cy, SPHERE_R * zoom * 0.88, 42);
  ctx.stroke();
  ctx.setLineDash([]);
  ctx.restore();

  // Draw seeker edges
  seekerEdges.forEach(e => {
    const pa = projected.find(p => p.idx === e.a);
    const pb = projected.find(p => p.idx === e.b);
    if (!pa || !pb) return;
    const alpha = Math.max(0, Math.min(0.06, 0.1 - ((pa.depth+pb.depth)/2) * 0.0003));
    if (alpha < 0.01) return;
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.strokeStyle = '#888';
    ctx.lineWidth = 0.8;
    ctx.setLineDash([2, 4]);
    sketchLine(pa.sx, pa.sy, pb.sx, pb.sy, e.seed);
    ctx.setLineDash([]);
    ctx.restore();
  });

  // Draw creator edges
  edges.forEach(e => {
    const pa = projected.find(p => p.idx === e.a);
    const pb = projected.find(p => p.idx === e.b);
    if (!pa || !pb) return;
    if (pa.depth < -80 && pb.depth < -80) return;
    const alpha = Math.max(0, Math.min(0.18, 0.3 - ((pa.depth+pb.depth)/2) * 0.0005));
    if (alpha < 0.01) return;
    const isH = hoveredNode !== null && (e.a === hoveredNode || e.b === hoveredNode);
    ctx.save();
    ctx.globalAlpha = isH ? Math.min(alpha*3, 0.5) : alpha;
    ctx.strokeStyle = isH ? '#2a2a2a' : '#555';
    ctx.lineWidth = isH ? 2 : 1;
    ctx.lineCap = 'round';
    sketchLine(pa.sx, pa.sy, pb.sx, pb.sy, e.seed);
    ctx.restore();
  });

  // Draw nodes
  projected.forEach(p => {
    const n = p.node;
    const df = Math.max(0.12, Math.min(1, (p.depth + SPHERE_R) / (SPHERE_R * 2)));
    const size = n.baseSize * zoom * Math.max(0.45, df);
    if (size < 1.5) return;

    const isH = hoveredNode === p.idx;
    const alpha = n.isSeeker ? df * 0.35 : df * 0.9;

    ctx.save();
    ctx.globalAlpha = isH ? 1 : alpha;

    if (n.isSeeker) {
      // Seekers: tiny dot + thin ring
      ctx.fillStyle = '#bbb';
      ctx.beginPath();
      ctx.arc(p.sx, p.sy, Math.max(1.5, size * 0.3), 0, Math.PI * 2);
      ctx.fill();
      ctx.strokeStyle = '#aaa';
      ctx.lineWidth = 0.8;
      ctx.globalAlpha = alpha * 0.4;
      sketchCircle(p.sx, p.sy, size, n.seed);
      ctx.stroke();
    } else {
      // 1. Flat color fill (no gradient!)
      flatFillCircle(p.sx, p.sy, size, n.color);

      // 2. Bold black hand-drawn outline (the Rusty Lake signature)
      ctx.strokeStyle = '#2a2a2a';
      ctx.lineWidth = isH ? 3.5 : 2.5;
      ctx.lineCap = 'round';
      ctx.lineJoin = 'round';
      ctx.globalAlpha = isH ? 1 : Math.min(alpha + 0.15, 0.85);
      sketchCircle(p.sx, p.sy, size, n.seed);
      ctx.stroke();

      // 3. Emoji
      if (size > 10) {
        ctx.globalAlpha = isH ? 1 : alpha * 0.95;
        ctx.font = `${Math.floor(size * 0.75)}px serif`;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(n.emoji, p.sx, p.sy + 1);
      }

      // 4. Hover glow ring
      if (isH) {
        ctx.globalAlpha = 0.25;
        ctx.strokeStyle = '#2a2a2a';
        ctx.lineWidth = 2;
        ctx.setLineDash([5, 4]);
        ctx.beginPath();
        ctx.arc(p.sx, p.sy, size + 9, 0, Math.PI * 2);
        ctx.stroke();
        ctx.setLineDash([]);
      }
    }
    ctx.restore();
  });

  // Tooltip
  if (hoveredNode !== null) {
    const n = nodes[hoveredNode];
    const p = projected.find(pp => pp.idx === hoveredNode);
    if (p) {
      tipName.textContent = n.emoji + ' ' + n.name;
      tipCat.textContent = CAT_LABELS[n.cat];
      let tx = p.sx + 18, ty = p.sy - 10;
      if (tx + 150 > W) tx = p.sx - 165;
      if (ty < 10) ty = 10;
      tip.style.left = tx + 'px';
      tip.style.top = ty + 'px';
      tip.classList.add('show');
    }
    canvas.style.cursor = 'pointer';
  } else {
    tip.classList.remove('show');
    canvas.style.cursor = dragging ? 'grabbing' : 'grab';
  }
}

draw();
</script>
</body>
</html>
