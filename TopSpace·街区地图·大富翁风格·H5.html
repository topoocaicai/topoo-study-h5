<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>街区地图 · 蛋生壹号街区</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#F5F0E8;font-family:-apple-system,"PingFang SC",sans-serif;overflow:hidden;height:100vh;width:100vw;touch-action:none;-webkit-user-select:none;user-select:none;-webkit-tap-highlight-color:transparent}
.top-bar{position:fixed;top:0;left:0;right:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:12px 16px;background:linear-gradient(180deg,rgba(245,240,232,0.95) 0%,rgba(245,240,232,0) 100%)}
.top-left{display:flex;align-items:center;gap:8px}
.logo{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,#4A9EB8,#9B7BBF);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;color:#fff}
.title{font-size:16px;font-weight:600;letter-spacing:1px;color:#2a2a3e}
.top-right{display:flex;align-items:center;gap:12px}
.badge{background:rgba(42,42,62,0.08);border:1px solid rgba(42,42,62,0.1);border-radius:12px;padding:4px 10px;font-size:12px;font-weight:600;letter-spacing:1px;color:#2a2a3e}
.map-title{position:fixed;top:56px;left:0;right:0;z-index:99;text-align:center;padding:8px;pointer-events:none}
.map-title-main{font-size:18px;font-weight:700;letter-spacing:2px;color:#2a2a3e}
.map-title-sub{font-size:11px;color:rgba(42,42,62,0.4);margin-top:2px}
#mapCanvas{position:absolute;top:0;left:0;width:100%;height:100%}
.hint{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);z-index:100;background:rgba(42,42,62,0.08);border:1px solid rgba(42,42,62,0.08);border-radius:20px;padding:6px 18px;font-size:11px;color:rgba(42,42,62,0.4);pointer-events:none}
.info-mask{position:fixed;top:0;left:0;right:0;bottom:0;z-index:200;display:none;align-items:flex-end;justify-content:center}
.info-mask.show{display:flex}
.info-bg{position:absolute;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.3)}
.info-panel{position:relative;z-index:1;width:92%;max-width:380px;background:#F5F0E8;border:1px solid rgba(42,42,62,0.1);border-radius:20px 20px 0 0;padding:20px 20px 32px;animation:slideUp 0.3s ease}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.info-close{position:absolute;top:12px;right:16px;background:rgba(42,42,62,0.06);border:none;width:28px;height:28px;border-radius:50%;font-size:14px;color:rgba(42,42,62,0.4);cursor:pointer;display:flex;align-items:center;justify-content:center}
.info-header{display:flex;align-items:center;gap:12px;margin-bottom:16px}
.info-avatar{width:48px;height:48px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:24px}
.info-name{font-size:17px;font-weight:700;color:#2a2a3e}
.info-type{font-size:12px;margin-top:2px}
.secluded-tag{display:inline-block;margin-top:4px;background:rgba(42,42,62,0.06);border-radius:8px;padding:2px 8px;font-size:10px;color:rgba(42,42,62,0.35)}
.bars{display:flex;flex-direction:column;gap:6px;margin-bottom:16px}
.bar-row{display:flex;align-items:center;gap:8px}
.bar-label{font-size:11px;width:60px;color:rgba(42,42,62,0.45);text-align:right}
.bar-track{flex:1;height:6px;background:rgba(42,42,62,0.06);border-radius:3px;overflow:hidden}
.bar-fill{height:100%;border-radius:3px;transition:width 0.5s ease}
.bar-val{font-size:11px;width:28px;color:rgba(42,42,62,0.4)}
.stats{display:flex;gap:20px;margin-bottom:16px}
.stat-item{text-align:center;flex:1}
.stat-val{font-size:22px;font-weight:700;color:#2a2a3e}
.stat-lbl{font-size:11px;color:rgba(42,42,62,0.4);margin-top:2px}
.btn-enter{width:100%;padding:12px;border-radius:12px;background:rgba(42,42,62,0.06);border:1px solid rgba(42,42,62,0.1);color:#2a2a3e;font-size:14px;font-weight:600;letter-spacing:3px;cursor:pointer}
.btn-enter.disabled{opacity:0.3;pointer-events:none}
</style>
</head>
<body>

<div class="top-bar">
<div class="top-left"><div class="logo">T</div><div class="title">TopSpace</div></div>
<div class="top-right">
<div class="badge">0527</div>
<button class="btn-enter" style="width:auto;padding:6px 14px;font-size:12px;letter-spacing:0" onclick="history.back()">← 返回</button>
</div>
</div>

<div class="map-title">
<div class="map-title-main">🗺️ 蛋生壹号街区</div>
<div class="map-title-sub">金陵大陆 · 街区平面地图</div>
</div>

<canvas id="mapCanvas"></canvas>
<div class="hint">单指滑动探索 · 双指缩放 · 点击门牌查看</div>

<!-- 信息卡 -->
<div class="info-mask" id="infoOverlay">
<div class="info-bg" onclick="closeInfo()"></div>
<div class="info-panel">
<button class="info-close" onclick="closeInfo()">✕</button>
<div class="info-header">
<div class="info-avatar" id="iAvatar"></div>
<div>
<div class="info-name" id="iName">—</div>
<div class="info-type" id="iType">—</div>
<div class="secluded-tag" id="iSec" style="display:none">闭关中</div>
</div>
</div>
<div class="bars" id="iBars"></div>
<div class="stats">
<div class="stat-item"><div class="stat-val" id="iCol">0</div><div class="stat-lbl">碰撞</div></div>
<div class="stat-item"><div class="stat-val" id="iIgn">0</div><div class="stat-lbl">点亮</div></div>
<div class="stat-item"><div class="stat-val" id="iDist">—</div><div class="stat-lbl">距你</div></div>
</div>
<button class="btn-enter" id="btnEnter" onclick="enterSpace()">进 入 空 间</button>
</div>
</div>

<script>
// ===== 配色 =====
var COL = {
fire:  {c:'#D96B6B',label:'🔥 火型·门店'},
water: {c:'#4A9EB8',label:'💧 水型·内容'},
wood:  {c:'#A0B87A',label:'🌱 木型·产品'},
metal: {c:'#E8B44C',label:'⚙️ 金型·服务'},
earth: {c:'#9B7BBF',label:'🌍 土型·活动'}
};
var KEYS = ['fire','water','wood','metal','earth'];
var CN = {fire:'火',water:'水',wood:'木',metal:'金',earth:'土'};

// ===== 大富翁风格布局 =====
// 设计思路：形成环状的街区道路，节点沿道路分布
// 更像"街道+地块"的感觉，而不是散点

var N = 60; // 减少节点数，更清晰
var nodes = [];
var edges = [];

// 生成环形街区布局
// 主干道：形成一个大环 + 内部小环
function generateMonopolyLayout() {
    var centerX = 700, centerY = 500;
    var mainRadius = 400;  // 外环半径
    var innerRadius = 250; // 内环半径
    var crossLines = [];   // 交叉连接

    // 外环节点（顺时针）
    var outerCount = 24;
    for (var i = 0; i < outerCount; i++) {
        var angle = (i / outerCount) * Math.PI * 2 - Math.PI/2;
        var x = centerX + Math.cos(angle) * mainRadius;
        var y = centerY + Math.sin(angle) * mainRadius;
        nodes.push({id: i, x: x, y: y, ring: 'outer', ringIndex: i});
        // 外环连接
        if (i > 0) edges.push([i-1, i]);
    }
    edges.push([outerCount-1, 0]); // 闭环

    // 内环节点
    var innerCount = 16;
    var innerStartId = outerCount;
    for (var i = 0; i < innerCount; i++) {
        var angle = (i / innerCount) * Math.PI * 2 - Math.PI/2 + 0.2;
        var x = centerX + Math.cos(angle) * innerRadius;
        var y = centerY + Math.sin(angle) * innerRadius;
        nodes.push({id: innerStartId + i, x: x, y: y, ring: 'inner', ringIndex: i});
        // 内环连接
        if (i > 0) edges.push([innerStartId + i - 1, innerStartId + i]);
    }
    edges.push([innerStartId + innerCount - 1, innerStartId]); // 闭环

    // 径向连接（内外环之间的道路）
    var radialCount = 6;
    for (var i = 0; i < radialCount; i++) {
        var outerIdx = Math.floor(i * outerCount / radialCount);
        var innerIdx = Math.floor(i * innerCount / radialCount);
        edges.push([outerIdx, innerStartId + innerIdx]);
    }

    // 内部随机补充一些节点（地块）
    var extraCount = 20;
    var extraStartId = innerStartId + innerCount;
    for (var i = 0; i < extraCount; i++) {
        var angle = Math.random() * Math.PI * 2;
        var r = innerRadius * 0.3 + Math.random() * innerRadius * 0.5;
        var x = centerX + Math.cos(angle) * r;
        var y = centerY + Math.sin(angle) * r;
        nodes.push({id: extraStartId + i, x: x, y: y, ring: 'center', ringIndex: i});

        // 连接到最近的 inner 或 outer 节点
        var closest = innerStartId;
        var closestDist = 99999;
        for (var j = 0; j < innerCount; j++) {
            var dx = x - nodes[innerStartId + j].x;
            var dy = y - nodes[innerStartId + j].y;
            var d = Math.sqrt(dx*dx + dy*dy);
            if (d < closestDist) { closestDist = d; closest = innerStartId + j; }
        }
        edges.push([closest, extraStartId + i]);
    }
}

generateMonopolyLayout();

// 补全节点属性
var NAMES = [
'星尘','流光','青木','金石','厚土','晨露','焱焰','碧藤','银铃','琥珀',
'极光','赤松','云归','霜降','岚烟','墨染','月蚀','星轨','潮汐','萤火',
'破晓','暮色','归鸿','逝川','空镜','浮岛','晚祷','迷迭','霜天','半夏',
'长风','微澜','寒烟','素履','清欢','南风','北望','东篱','西洲','中岳',
'白驹','苍狗','丹枫','碧落','紫陌','红尘','青瓦','墨客','诗酒','茶凉',
'听雨','看云','临风','对月','烹茶','煮酒','抚琴','对弈','听涛','观海'
];
var EMOJIS = ['🌙','✨','🌿','💎','🏔️','💧','🔥','🌱','⚙️','🌍',
'🌈','🎋','⛰️','🌊','🍂','🗿','🌾','🔮','🎐','💫',
'🦊','🐉','🦉','🐚','🌺','🌸','🍂️','🌻','🌷','🌹',
'⚗️','🧪','🧬','📡','🔬','🔧','⚙️','🛠️','🧰','💊',
'📖','🖋️','🎵','🎶','🎸','🎹','🎺','🎻','🥁','🎤'];

for (var i = 0; i < nodes.length; i++) {
    var elem = KEYS[i % 5];
    var secluded = Math.random() < 0.15;
    nodes[i].name = NAMES[i % NAMES.length];
    nodes[i].emoji = EMOJIS[i % EMOJIS.length];
    nodes[i].elem = elem;
    nodes[i].secluded = secluded;
    nodes[i].visited = !secluded && Math.random() < 0.7;
    nodes[i].col = Math.floor(Math.random()*500);
    nodes[i].ign = Math.floor(Math.random()*80);
    nodes[i].fire = 30+Math.floor(Math.random()*70);
    nodes[i].water = 30+Math.floor(Math.random()*70);
    nodes[i].wood = 30+Math.floor(Math.random()*70);
    nodes[i].metal = 30+Math.floor(Math.random()*70);
    nodes[i].earth = 30+Math.floor(Math.random()*70);
}

// ===== Canvas =====
var canvas = document.getElementById('mapCanvas');
var ctx = canvas.getContext('2d');
var W, H, dpr;
var viewX = 700, viewY = 500; // 初始视角在中央
var zoom = 1;

function resize() {
    dpr = window.devicePixelRatio || 1;
    W = window.innerWidth;
    H = window.innerHeight;
    canvas.width = W * dpr;
    canvas.height = H * dpr;
    canvas.style.width = W + 'px';
    canvas.style.height = H + 'px';
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}
window.addEventListener('resize', resize);
resize();

// ===== 坐标转换 =====
function toScreen(wx, wy) {
    return {
        x: W/2 + (wx - viewX) * zoom,
        y: H/2 + (wy - viewY) * zoom
    };
}

// ===== 触摸控制 =====
var touching = false, tx0 = 0, ty0 = 0, vx0 = 0, vy0 = 0;
var pinching = false, pinchDist0 = 0, pinchZoom0 = 1;

canvas.addEventListener('touchstart', function(e) {
    e.preventDefault();
    if (e.touches.length === 1) {
        touching = true;
        pinching = false;
        tx0 = e.touches[0].clientX;
        ty0 = e.touches[0].clientY;
        vx0 = viewX;
        vy0 = viewY;
    } else if (e.touches.length === 2) {
        pinching = true;
        touching = false;
        var dx = e.touches[1].clientX - e.touches[0].clientX;
        var dy = e.touches[1].clientY - e.touches[0].clientY;
        pinchDist0 = Math.sqrt(dx*dx + dy*dy);
        pinchZoom0 = zoom;
    }
}, {passive: false});

canvas.addEventListener('touchmove', function(e) {
    e.preventDefault();
    if (pinching && e.touches.length === 2) {
        var dx = e.touches[1].clientX - e.touches[0].clientX;
        var dy = e.touches[1].clientY - e.touches[0].clientY;
        var dist = Math.sqrt(dx*dx + dy*dy);
        zoom = Math.max(0.3, Math.min(3, pinchZoom0 * dist / pinchDist0));
    } else if (touching && e.touches.length === 1) {
        var dx = e.touches[0].clientX - tx0;
        var dy = e.touches[0].clientY - ty0;
        viewX = vx0 - dx / zoom;
        viewY = vy0 - dy / zoom;
    }
}, {passive: false});

canvas.addEventListener('touchend', function() {
    touching = false;
    pinching = false;
});

// 鼠标控制
var mDown = false, mx0 = 0, my0 = 0, mvx0 = 0, mvy0 = 0;
canvas.addEventListener('mousedown', function(e) {
    mDown = true;
    mx0 = e.clientX;
    my0 = e.clientY;
    mvx0 = viewX;
    mvy0 = viewY;
});
canvas.addEventListener('mousemove', function(e) {
    if (!mDown) return;
    viewX = mvx0 - (e.clientX - mx0) / zoom;
    viewY = mvy0 - (e.clientY - my0) / zoom;
});
canvas.addEventListener('mouseup', function() { mDown = false; });
canvas.addEventListener('mouseleave', function() { mDown = false; });
canvas.addEventListener('wheel', function(e) {
    e.preventDefault();
    zoom = Math.max(0.3, Math.min(3, zoom * (e.deltaY > 0 ? 0.92 : 1.08)));
}, {passive: false});

// ===== 点击检测 =====
var tapTime = 0;
canvas.addEventListener('touchstart', function() { tapTime = Date.now(); });
canvas.addEventListener('touchend', function(e) {
    if (Date.now() - tapTime > 300) return;
    if (e.changedTouches.length !== 1) return;
    var tx = e.changedTouches[0].clientX;
    var ty = e.changedTouches[0].clientY;
    var h = hitTest(tx, ty);
    if (h !== null) showInfo(h);
});
canvas.addEventListener('click', function(e) {
    var h = hitTest(e.clientX, e.clientY);
    if (h !== null) showInfo(h);
});

function hitTest(sx, sy) {
    var closest = null, best = 30;
    for (var i = 0; i < nodes.length; i++) {
        var p = toScreen(nodes[i].x, nodes[i].y);
        var dx = sx - p.x, dy = sy - p.y;
        var d = Math.sqrt(dx*dx + dy*dy);
        if (d < best) { closest = i; best = d; }
    }
    return closest;
}

// ===== 渲染 =====
function render() {
    ctx.clearRect(0, 0, W, H);

    // 浅色底
    ctx.fillStyle = '#F5F0E8';
    ctx.fillRect(0, 0, W, H);

    // 纸质纹理
    ctx.fillStyle = 'rgba(42,42,62,0.01)';
    for (var ix = 0; ix < W; ix += 10) {
        for (var iy = 0; iy < H; iy += 10) {
            if ((Math.floor(ix/10) + Math.floor(iy/10)) % 3 === 0) {
                ctx.beginPath();
                ctx.arc(ix, iy, 0.5, 0, Math.PI*2);
                ctx.fill();
            }
        }
    }

    var r0 = Math.max(5, 11 * zoom);

    // 画道路（细直线）
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    for (var ei = 0; ei < edges.length; ei++) {
        var a = edges[ei][0], b = edges[ei][1];
        var pa = toScreen(nodes[a].x, nodes[a].y);
        var pb = toScreen(nodes[b].x, nodes[b].y);

        // 跳过屏幕外的边
        var margin = 100;
        if (pa.x < -margin && pb.x < -margin) continue;
        if (pa.x > W+margin && pb.x > W+margin) continue;
        if (pa.y < -margin && pb.y < -margin) continue;
        if (pa.y > H+margin && pb.y > H+margin) continue;

        var bothV = nodes[a].visited && nodes[b].visited;
        var anySec = nodes[a].secluded || nodes[b].secluded;

        // 细直线
        ctx.lineWidth = Math.max(1, 1.5 * zoom);
        ctx.strokeStyle = anySec ? 'rgba(42,42,62,0.05)' : bothV ? 'rgba(42,42,62,0.12)' : 'rgba(42,42,62,0.06)';
        ctx.beginPath();
        ctx.moveTo(pa.x, pa.y);
        ctx.lineTo(pb.x, pb.y);
        ctx.stroke();
    }

    // 画节点
    for (var i = 0; i < nodes.length; i++) {
        var n = nodes[i];
        var p = toScreen(n.x, n.y);

        // 跳过屏幕外的节点
        if (p.x < -50 || p.x > W+50 || p.y < -50 || p.y > H+50) continue;

        var r = r0;

        if (n.secluded) {
            // 未探索节点
            ctx.strokeStyle = 'rgba(42,42,62,0.1)';
            ctx.lineWidth = 1;
            ctx.setLineDash([3,3]);
            ctx.beginPath();
            ctx.arc(p.x, p.y, r, 0, Math.PI*2);
            ctx.stroke();
            ctx.setLineDash([]);

            ctx.globalAlpha = 0.15;
            ctx.font = (r*1.1) + 'px sans-serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillStyle = 'rgba(42,42,62,0.45)';
            ctx.fillText('🪨', p.x, p.y);
            ctx.globalAlpha = 1;
        } else if (n.visited) {
            // 已探索节点 - 门牌
            var c = COL[n.elem];

            // 发光效果
            var g = ctx.createRadialGradient(p.x, p.y, r*0.3, p.x, p.y, r*2.5);
            g.addColorStop(0, c.c + '18');
            g.addColorStop(1, 'rgba(0,0,0,0)');
            ctx.fillStyle = g;
            ctx.beginPath();
            ctx.arc(p.x, p.y, r*2.5, 0, Math.PI*2);
            ctx.fill();

            // 门牌圆底
            ctx.fillStyle = c.c + '18';
            ctx.beginPath();
            ctx.arc(p.x, p.y, r, 0, Math.PI*2);
            ctx.fill();

            ctx.strokeStyle = c.c + '55';
            ctx.lineWidth = 1.5;
            ctx.beginPath();
            ctx.arc(p.x, p.y, r, 0, Math.PI*2);
            ctx.stroke();

            // emoji
            ctx.font = (r*1.4) + 'px sans-serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(n.emoji, p.x, p.y);

            // 小屋顶装饰
            ctx.fillStyle = c.c + '20';
            ctx.beginPath();
            ctx.moveTo(p.x - r*0.6, p.y - r);
            ctx.lineTo(p.x, p.y - r - 7*zoom);
            ctx.lineTo(p.x + r*0.6, p.y - r);
            ctx.closePath();
            ctx.fill();

            // 名字
            if (zoom > 0.6) {
                ctx.font = Math.max(9, 10*zoom) + 'px "PingFang SC",sans-serif';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'top';
                ctx.fillStyle = 'rgba(42,42,62,0.5)';
                ctx.fillText(n.name, p.x, p.y + r + 5*zoom);
            }
        } else {
            // 未访问但已解锁
            ctx.strokeStyle = 'rgba(42,42,62,0.13)';
            ctx.lineWidth = 1;
            ctx.setLineDash([3,3]);
            ctx.beginPath();
            ctx.arc(p.x, p.y, r, 0, Math.PI*2);
            ctx.stroke();
            ctx.setLineDash([]);

            ctx.globalAlpha = 0.18;
            ctx.font = (r*1.05) + 'px sans-serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillStyle = 'rgba(42,42,62,0.45)';
            ctx.fillText(n.emoji, p.x, p.y);
            ctx.globalAlpha = 1;
        }
    }

    requestAnimationFrame(render);
}

// ===== 信息卡 =====
function showInfo(idx) {
    var n = nodes[idx];
    document.getElementById('iAvatar').style.background = n.secluded ? 'rgba(42,42,62,0.06)' : COL[n.elem].c+'25';
    document.getElementById('iAvatar').textContent = n.emoji;
    document.getElementById('iName').textContent = n.name;
    document.getElementById('iType').textContent = n.secluded ? '闭关中' : COL[n.elem].label;
    document.getElementById('iType').style.color = COL[n.elem].c;
    document.getElementById('iSec').style.display = n.secluded ? 'inline-block' : 'none';

    // 五行条
    var html = '';
    for (var ki = 0; ki < KEYS.length; ki++) {
        var k = KEYS[ki];
        var val = n[k];
        html += '<div class="bar-row"><div class="bar-label">'+CN[k]+'</div><div class="bar-track"><div class="bar-fill" style="width:'+val+'%;background:'+COL[k].c+'"></div></div><div class="bar-val">'+val+'</div></div>';
    }
    document.getElementById('iBars').innerHTML = html;
    document.getElementById('iCol').textContent = n.col;
    document.getElementById('iIgn').textContent = n.ign;

    // 距离
    var dx = nodes[idx].x - nodes[0].x;
    var dy = nodes[idx].y - nodes[0].y;
    document.getElementById('iDist').textContent = Math.round(Math.sqrt(dx*dx+dy*dy)/30) + '步';

    // 按钮
    var btn = document.getElementById('btnEnter');
    if (n.secluded) { btn.classList.add('disabled'); btn.textContent = '闭关中，无法进入'; }
    else { btn.classList.remove('disabled'); btn.textContent = '进 入 空 间'; }

    document.getElementById('infoOverlay').classList.add('show');
}
function closeInfo() { document.getElementById('infoOverlay').classList.remove('show'); }
function enterSpace() { alert('进入空间（待实现）'); }

// 启动
render();
</script>
</body>
</html>
