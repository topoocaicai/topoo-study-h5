<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>街区地图 · 蛋生壹号街区</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#F5F0E8;font-family:-apple-system,"PingFang SC",sans-serif;overflow:hidden;height:100vh;width:100vw;touch-action:none;-webkit-user-select:none;user-select:none}
.top-bar{position:fixed;top:0;left:0;right:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:12px 16px;background:linear-gradient(180deg,rgba(245,240,232,0.95) 0%,rgba(245,240,232,0) 100%)}
.top-left{display:flex;align-items:center;gap:8px}
.logo{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,#4A9EB8,#9B7BBF);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;color:#fff}
.title{font-size:16px;font-weight:600;letter-spacing:1px;color:#2a2a3e}
.top-right{display:flex;align-items:center;gap:12px}
.badge{background:rgba(42,42,62,0.08);border:1px solid rgba(42,42,62,0.1);border-radius:12px;padding:4px 10px;font-size:12px;font-weight:600;letter-spacing:1px;color:#2a2a3e}
.map-title{position:fixed;top:56px;left:0;right:0;z-index:99;text-align:center;padding:8px;pointer-events:none}
.map-title-main{font-size:18px;font-weight:700;letter-spacing:2px;color:#2a2a3e}
.map-title-sub{font-size:11px;color:rgba(42,42,62,0.4);margin-top:2px}
.map-title-desc{font-size:10px;color:rgba(42,42,62,0.25);margin-top:4px}
#mapCanvas{position:fixed;top:0;left:0;width:100vw;height:100vh}
.minimap{position:fixed;bottom:56px;right:12px;z-index:100;width:80px;height:80px;border-radius:12px;background:rgba(245,240,232,0.9);border:1px solid rgba(42,42,62,0.1);overflow:hidden;box-shadow:0 2px 12px rgba(0,0,0,0.08)}
.minimap canvas{width:100%;height:100%}
.hint{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);z-index:100;background:rgba(42,42,62,0.08);border:1px solid rgba(42,42,62,0.08);border-radius:20px;padding:6px 18px;font-size:11px;color:rgba(42,42,62,0.4)}
.info-mask{position:fixed;top:0;left:0;right:0;bottom:0;z-index:200;display:none;align-items:flex-end;justify-content:center}
.info-mask.show{display:flex}
.info-bg{position:absolute;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.3)}
.info-panel{position:relative;z-index:1;width:92%;max-width:380px;background:#F5F0E8;border:1px solid rgba(42,42,62,0.1);border-radius:20px 20px 0 0;padding:20px 20px 32px;animation:slideUp 0.3s ease}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.info-close{position:absolute;top:12px;right:16px;background:rgba(42,42,62,0.06);border:none;width:28px;height:28px;border-radius:50%;font-size:14px;color:rgba(42,42,62,0.4);cursor:pointer;display:flex;align-items:center;justify-content:center}
.info-header{display:flex;align-items:center;gap:12px;margin-bottom:16px}
.info-avatar{width:48px;height:48px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:24px}
.info-name{font-size:17px;font-weight:700;color:#2a2a3e}
.info-type{font-size:12px;margin-top:2px}
.seculded-tag{display:inline-block;margin-top:4px;background:rgba(42,42,62,0.06);border-radius:8px;padding:2px 8px;font-size:10px;color:rgba(42,42,62,0.35)}
.bars{display:flex;flex-direction:column;gap:6px;margin-bottom:16px}
.bar-row{display:flex;align-items:center;gap:8px}
.bar-label{font-size:11px;width:60px;color:rgba(42,42,62,0.45);text-align:right}
.bar-track{flex:1;height:6px;background:rgba(42,42,62,0.06);border-radius:3px;overflow:hidden}
.bar-fill{height:100%;border-radius:3px;transition:width 0.5s ease}
.bar-val{font-size:11px;width:28px;color:rgba(42,42,62,0.4)}
.stats{display:flex;gap:20px;margin-bottom:16px}
.stat-item{text-align:center;flex:1}
.stat-val{font-size:22px;font-weight:700;color:#2a2a3e}
.stat-lbl{font-size:11px;color:rgba(42,42,62,0.4);margin-top:2px}
.btn-enter{width:100%;padding:12px;border-radius:12px;background:rgba(42,42,62,0.06);border:1px solid rgba(42,42,62,0.1);color:#2a2a3e;font-size:14px;font-weight:600;letter-spacing:3px;cursor:pointer}
.btn-enter.disabled{opacity:0.3;pointer-events:none}
</style>
</head>
<body>

<div class="top-bar">
<div class="top-left"><div class="logo">T</div><div class="title">TopSpace</div></div>
<div class="top-right">
<div class="badge">0527</div>
<button class="btn-enter" style="width:auto;padding:6px 14px;font-size:12px;letter-spacing:0" onclick="history.back()">← 返回</button>
</div>
</div>

<div class="map-title">
<div class="map-title-main">🗺️ 蛋生壹号街区</div>
<div class="map-title-sub">金陵大陆 · 街区平面地图</div>
<div class="map-title-desc">滑动探索街区 · 点击门牌查看</div>
</div>

<canvas id="mapCanvas"></canvas>
<div class="hint">单指滑动探索 · 双指缩放 · 点击门牌查看</div>
<div class="minimap"><canvas id="minimapCanvas"></canvas></div>

<!-- 信息卡 -->
<div class="info-mask" id="infoOverlay">
<div class="info-bg" onclick="closeInfo()"></div>
<div class="info-panel">
<button class="info-close" onclick="closeInfo()">✕</button>
<div class="info-header">
<div class="info-avatar" id="iAvatar"></div>
<div>
<div class="info-name" id="iName">—</div>
<div class="info-type" id="iType">—</div>
<div class="seculded-tag" id="iSec" style="display:none">闭关中</div>
</div>
</div>
<div class="bars" id="iBars"></div>
<div class="stats">
<div class="stat-item"><div class="stat-val" id="iCol">0</div><div class="stat-lbl">碰撞</div></div>
<div class="stat-item"><div class="stat-val" id="iIgn">0</div><div class="stat-lbl">点亮</div></div>
<div class="stat-item"><div class="stat-val" id="iDist">—</div><div class="stat-lbl">距你</div></div>
</div>
<button class="btn-enter" id="btnEnter" onclick="enterSpace()">进 入 空 间</button>
</div>
</div>

<script>
// ===== 配色 =====
var COL = {
fire:  {c:'#D96B6B',label:'🔥 火型·门店'},
water: {c:'#4A9EB8',label:'💧 水型·内容'},
wood:  {c:'#A0B87A',label:'🌱 木型·产品'},
metal: {c:'#E8B44C',label:'⚙️ 金型·服务'},
earth: {c:'#9B7BBF',label:'🌍 土型·活动'}
};
var KEYS = ['fire','water','wood','metal','earth'];
var CN = {fire:'火',water:'水',wood:'木',metal:'金',earth:'土'};

// ===== 数据 =====
var NAMES = [
'星尘','流光','青木','金石','厚土','晨露','焱焰','碧藤','银铃','琥珀',
'极光','赤松','云归','霜降','岚烟','墨染','月蚀','星轨','潮汐','萤火',
'破晓','暮色','归鸿','逝川','空镜','浮岛','晚祷','迷迭','霜天','半夏',
'长风','微澜','寒烟','素履','清欢','南风','北望','东篱','西洲','中岳',
'白驹','苍狗','丹枫','碧落','紫陌','红尘','青瓦','墨客','诗酒','茶凉',
'听雨','看云','临风','对月','烹茶','煮酒','抚琴','对弈','听涛','观海',
'织锦','刺绣','烧瓷','炼铁','琢玉','雕木','垒石','筑土','引水','开山',
'拾光','捕风','捉影','留香','寄梦','托月','挽星','摘云','渡舟','归帆',
'踏雪','寻梅','访菊','问兰','采薇','钓雪','锄月','种云','栽星','养光',
'无声','未央','不系','无疆','自在','如初','似锦','归零','出发','抵达'
];
var EMOJIS = ['🌙','✨','🌿','💎','🏔️','💧','🔥','🌱','🔔','🟤',
'🌈','🎋','⛰️','🌊','🍂','🗿','🌾','🔮','🎐','💫',
'🦊','🐉','🦉','🐚','🌺','🌸','🍂️','🌻','🌷','🌹',
'⚗️','🧪','🧬','📡','🔬','🔧','⚙️','🛠️','🧬','💊',
'⚗','📖','🖋️','🎵','🎶','🎸','🎹','🎺','🎻','🥁'];

var N = 100;
var nodes = [];
var secSet = {};
var secCnt = 0;
while (secCnt < 15) {
var r = Math.floor(Math.random() * N);
if (!secSet[r]) { secSet[r] = true; secCnt++; }
}
for (var i = 0; i < N; i++) {
nodes.push({
id: i+1,
name: NAMES[i],
emoji: EMOJIS[i % EMOJIS.length],
elem: KEYS[i % 5],
secluded: !!secSet[i],
visited: i < 12,
fire: 30+Math.floor(Math.random()*70),
water: 30+Math.floor(Math.random()*70),
wood: 30+Math.floor(Math.random()*70),
metal: 30+Math.floor(Math.random()*70),
earth: 30+Math.floor(Math.random()*70),
col: Math.floor(Math.random()*500),
ign: Math.floor(Math.random()*80)
});
}

// ===== 邻接表（球面最近邻）=====
// 先算球面坐标
var pts3 = [];
var ga = Math.PI * (3 - Math.sqrt(5));
for (var i = 0; i < N; i++) {
var y = 1 - (i / (N-1)) * 2;
var r = Math.sqrt(1 - y*y);
var theta = ga * i;
pts3.push({x: r*Math.cos(theta), y: y, z: r*Math.sin(theta)});
}
// 建邻接
var adj = {};
for (var i = 0; i < N; i++) adj[i] = [];
var maxArc = 0.4;
for (var i = 0; i < N; i++) {
for (var j = i+1; j < N; j++) {
var dot = pts3[i].x*pts3[j].x + pts3[i].y*pts3[j].y + pts3[i].z*pts3[j].z;
var ad = Math.acos(Math.max(-1, Math.min(1, dot)));
if (ad < maxArc) { adj[i].push(j); adj[j].push(i); }
}}
// ===== 力导向布局 =====
var MW = 1400, MH = 1000;
// 初始位置：球面->平面
var pts = [];
for (var i = 0; i < N; i++) {
var lon = Math.atan2(pts3[i].z, pts3[i].x);
var lat = Math.asin(pts3[i].y);
pts.push({id:i, x: ((lon+Math.PI)/(2*Math.PI))*MW, y: ((Math.PI/2-lat)/Math.PI)*MH, vx:0, vy:0});
}
// 迭代
for (var iter = 0; iter < 180; iter++) {
// 排斥
for (var a = 0; a < N; a++) {
for (var b = a+1; b < N; b++) {
var dx = pts[a].x - pts[b].x;
var dy = pts[a].y - pts[b].y;
if (dx > MW/2) dx -= MW;
if (dx < -MW/2) dx += MW;
if (dy > MH/2) dy -= MH;
if (dy < -MH/2) dy += MH;
var d = Math.sqrt(dx*dx + dy*dy) + 0.1;
var f = 550 / (d*d);
dx /= d; dy /= d;
pts[a].vx += f*dx; pts[a].vy += f*dy;
pts[b].vx -= f*dx; pts[b].vy -= f*dy;
}}
// 弹簧（邻接）
for (var a = 0; a < N; a++) {
var nb = adj[a];
for (var ni = 0; ni < nb.length; ni++) {
var b = nb[ni];
if (b <= a) continue;
var dx = pts[b].x - pts[a].x;
var dy = pts[b].y - pts[a].y;
if (dx > MW/2) dx -= MW;
if (dx < -MW/2) dx += MW;
if (dy > MH/2) dy -= MH;
if (dy < -MH/2) dy += MH;
var d = Math.sqrt(dx*dx + dy*dy) + 0.1;
var disp = (d - 70) * 0.035;
dx /= d; dy /= d;
pts[a].vx += disp*dx; pts[a].vy += disp*dy;
pts[b].vx -= disp*dx; pts[b].vy -= disp*dy;
}}
// 更新
for (var a = 0; a < N; a++) {
pts[a].x += pts[a].vx * 0.5;
pts[a].y += pts[a].vy * 0.5;
pts[a].vx *= 0.7;
pts[a].vy *= 0.7;
pts[a].x = Math.max(25, Math.min(MW-25, pts[a].x));
pts[a].y = Math.max(25, Math.min(MH-25, pts[a].y));
}}
// 边列表
var edges = [];
for (var a = 0; a < N; a++) {
var nb = adj[a];
for (var ni = 0; ni < nb.length; ni++) { if (nb[ni] > a) edges.push([a, nb[ni]]); }
}

// ===== Canvas =====
var canvas = document.getElementById('mapCanvas');
var ctx = canvas.getContext('2d');
var mc = document.getElementById('minimapCanvas');
var mctx = mc.getContext('2d');
var W, H, dpr;
var viewX = pts[0].x, viewY = pts[0].y;
var zoom = 1;

function resize() {
dpr = window.devicePixelRatio || 1;
W = window.innerWidth; H = window.innerHeight;
canvas.width = W*dpr; canvas.height = H*dpr;
canvas.style.width = W+'px'; canvas.style.height = H+'px';
ctx.setTransform(dpr,0,0,dpr,0,0);
mc.width = 80*dpr; mc.height = 80*dpr;
mctx.setTransform(dpr,0,0,dpr,0,0);
}
window.addEventListener('resize', resize);
resize();

// ===== 环面坐标转换 =====
function toScreen(wx, wy) {
var dx = wx - viewX;
var dy = wy - viewY;
if (dx > MW/2) dx -= MW;
if (dx < -MW/2) dx += MW;
if (dy > MH/2) dy -= MH;
if (dy < -MH/2) dy += MH;
return {x: W/2 + dx*zoom, y: H/2 + dy*zoom};
}

// ===== 触摸 =====
var touching = false, tx0 = 0, ty0 = 0, vx0 = 0, vy0 = 0;
var pinching = false, pinchDist0 = 0, pinchZoom0 = 1;

canvas.addEventListener('touchstart', function(e) {
e.preventDefault();
if (e.touches.length === 1) {
touching = true; pinching = false;
tx0 = e.touches[0].clientX; ty0 = e.touches[0].clientY;
vx0 = viewX; vy0 = viewY;
} else if (e.touches.length === 2) {
pinching = true;
var dx = e.touches[1].clientX - e.touches[0].clientX;
var dy = e.touches[1].clientY - e.touches[0].clientY;
pinchDist0 = Math.sqrt(dx*dx + dy*dy);
pinchZoom0 = zoom;
}
}, {passive: false});

canvas.addEventListener('touchmove', function(e) {
e.preventDefault();
if (pinching && e.touches.length === 2) {
var dx = e.touches[1].clientX - e.touches[0].clientX;
var dy = e.touches[1].clientY - e.touches[0].clientY;
var dist = Math.sqrt(dx*dx + dy*dy);
zoom = Math.max(0.35, Math.min(3, pinchZoom0 * dist / pinchDist0));
} else if (touching && e.touches.length === 1) {
var dx = e.touches[0].clientX - tx0;
var dy = e.touches[0].clientY - ty0;
viewX = ((vx0 - dx/zoom) % MW + MW) % MW;
viewY = ((vy0 - dy/zoom) % MH + MH) % MH;
}
}, {passive: false});

canvas.addEventListener('touchend', function() { touching = false; pinching = false; });

// 鼠标
var mDown = false, mx0 = 0, my0 = 0, mvx0 = 0, mvy0 = 0;
canvas.addEventListener('mousedown', function(e) {
mDown = true; mx0 = e.clientX; my0 = e.clientY;
mvx0 = viewX; mvy0 = viewY;
});
canvas.addEventListener('mousemove', function(e) {
if (!mDown) return;
var dx = e.clientX - mx0;
var dy = e.clientY - my0;
viewX = ((mvx0 - dx/zoom) % MW + MW) % MW;
viewY = ((mvy0 - dy/zoom) % MH + MH) % MH;
});
canvas.addEventListener('mouseup', function() { mDown = false; });
canvas.addEventListener('mouseleave', function() { mDown = false; });
canvas.addEventListener('wheel', function(e) {
e.preventDefault();
zoom = Math.max(0.35, Math.min(3, zoom * (e.deltaY > 0 ? 0.92 : 1.08)));
}, {passive: false});

// ===== 点击 =====
var tapTime = 0;
canvas.addEventListener('touchstart', function() { tapTime = Date.now(); });
canvas.addEventListener('touchend', function(e) {
if (Date.now() - tapTime > 300) return;
if (e.changedTouches.length !== 1) return;
var tx = e.changedTouches[0].clientX;
var ty = e.changedTouches[0].clientY;
var h = hitTest(tx, ty); if (h !== null) showInfo(h);
});
canvas.addEventListener('click', function(e) {
var h = hitTest(e.clientX, e.clientY); if (h !== null) showInfo(h);
});

function hitTest(sx, sy) {
var closest = null, best = 30;
for (var i = 0; i < pts.length; i++) {
var p = toScreen(pts[i].x, pts[i].y);
var dx = sx - p.x, dy = sy - p.y;
var d = Math.sqrt(dx*dx + dy*dy);
if (d < best) { closest = i; best = d; }
}
return closest;
}

// ===== 渲染 =====
function render() {
ctx.clearRect(0, 0, W, H);
// 浅色底 + 纸质纹理
ctx.fillStyle = '#F5F0E8';
ctx.fillRect(0, 0, W, H);
ctx.fillStyle = 'rgba(42,42,62,0.01)';
for (var ix = 0; ix < W; ix += 10) {
for (var iy = 0; iy < H; iy += 10) {
if ((Math.floor(ix/10) + Math.floor(iy/10)) % 3 === 0) {
ctx.beginPath(); ctx.arc(ix, iy, 0.5, 0, Math.PI*2); ctx.fill();
}}}
var r0 = Math.max(6, 13*zoom);
// 画道路（弯曲）
ctx.lineCap = 'round';
for (var ei = 0; ei < edges.length; ei++) {
var a = edges[ei][0], b = edges[ei][1];
var pa = toScreen(pts[a].x, pts[a].y);
var pb = toScreen(pts[b].x, pts[b].y);
var margin = 200;
if (pa.x < -margin && pb.x < -margin) continue;
if (pa.x > W+margin && pb.x > W+margin) continue;
if (pa.y < -margin && pb.y < -margin) continue;
if (pa.y > H+margin && pb.y > H+margin) continue;
var screenDist = Math.sqrt((pa.x-pb.x)*(pa.x-pb.x) + (pa.y-pb.y)*(pa.y-pb.y));
if (screenDist > 320*zoom) continue;
var bothV = nodes[a].visited && nodes[b].visited;
var anySec = nodes[a].secluded || nodes[b].secluded;
// 宽底色
ctx.lineWidth = Math.max(4, 9*zoom);
ctx.strokeStyle = anySec ? 'rgba(42,42,62,0.03)' : 'rgba(42,42,62,0.05)';
var mx = (pa.x+pb.x)/2, my = (pa.y+pb.y)/2;
var nx = -(pb.y-pa.y), ny = (pb.x-pa.x);
var nlen = Math.sqrt(nx*nx+ny*ny)+0.1;
var sag = Math.min(16*zoom, 24);
var cx = mx + (nx/nlen)*sag, cy = my + (ny/nlen)*sag;
ctx.beginPath(); ctx.moveTo(pa.x, pa.y); ctx.quadraticCurveTo(cx, cy, pb.x, pb.y); ctx.stroke();
// 中线
ctx.lineWidth = Math.max(1.5, 3*zoom);
ctx.strokeStyle = anySec ? 'rgba(42,42,62,0.05)' : bothV ? 'rgba(42,42,62,0.12)' : 'rgba(42,42,62,0.06)';
ctx.beginPath(); ctx.moveTo(pa.x, pa.y); ctx.quadraticCurveTo(cx, cy, pb.x, pb.y); ctx.stroke();
}
// 画节点
for (var i = 0; i < pts.length; i++) {
var n = nodes[i];
var p = toScreen(pts[i].x, pts[i].y);
if (p.x < -60 || p.x > W+60 || p.y < -60 || p.y > H+60) continue;
var isMe = (i === 0);
var r = isMe ? r0*1.6 : r0;
if (n.secluded) {
ctx.fillStyle = 'rgba(42,42,62,0.04)';
ctx.beginPath(); ctx.arc(p.x, p.y, r, 0, Math.PI*2); ctx.fill();
ctx.strokeStyle = 'rgba(42,42,62,0.08)'; ctx.lineWidth = 1;
ctx.setLineDash([3,3]); ctx.stroke(); ctx.setLineDash([]);
ctx.globalAlpha = 0.2;
ctx.font = (r*1.1)+'px sans-serif';
ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
ctx.fillText('🪨', p.x, p.y);
ctx.globalAlpha = 1;
} else {
var c = COL[n.elem];
if (n.visited) {
// 发光
var g = ctx.createRadialGradient(p.x, p.y, r*0.3, p.x, p.y, r*2.5);
g.addColorStop(0, c.c+'18'); g.addColorStop(1, 'rgba(0,0,0,0)');
ctx.fillStyle = g;
ctx.beginPath(); ctx.arc(p.x, p.y, r*2.5, 0, Math.PI*2); ctx.fill();
// 门牌
ctx.fillStyle = c.c+'18';
ctx.beginPath(); ctx.arc(p.x, p.y, r, 0, Math.PI*2); ctx.fill();
ctx.strokeStyle = c.c+'55'; ctx.lineWidth = 1.5; ctx.stroke();
// emoji
ctx.font = (r*1.4)+'px sans-serif';
ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
ctx.fillText(n.emoji, p.x, p.y);
// 小屋顶
ctx.fillStyle = c.c+'20';
ctx.beginPath();
ctx.moveTo(p.x - r*0.6, p.y - r);
ctx.lineTo(p.x, p.y - r - 7*zoom);
ctx.lineTo(p.x + r*0.6, p.y - r);
ctx.closePath(); ctx.fill();
} else {
ctx.strokeStyle = 'rgba(42,42,62,0.13)'; ctx.lineWidth = 1;
ctx.setLineDash([3,3]); ctx.beginPath(); ctx.arc(p.x, p.y, r, 0, Math.PI*2); ctx.stroke(); ctx.setLineDash([]);
ctx.globalAlpha = 0.18;
ctx.font = (r*1.05)+'px sans-serif';
ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
ctx.fillStyle = 'rgba(42,42,62,0.45)';
ctx.fillText(n.emoji, p.x, p.y);
ctx.globalAlpha = 1;
}}
if (zoom > 0.6 && n.visited && !n.secluded) {
ctx.font = Math.max(9, 10*zoom)+'px "PingFang SC",sans-serif';
ctx.textAlign = 'center'; ctx.textBaseline = 'top';
ctx.fillStyle = 'rgba(42,42,62,0.5)';
ctx.fillText(n.name, p.x, p.y + r + 11*zoom);
}
if (isMe) {
ctx.strokeStyle = 'rgba(42,42,62,0.38)'; ctx.lineWidth = 1.5;
ctx.setLineDash([4,3]); ctx.beginPath(); ctx.arc(p.x, p.y, r+6, 0, Math.PI*2); ctx.stroke(); ctx.setLineDash([]);
ctx.font = 'bold 9px "PingFang SC",sans-serif';
ctx.textAlign = 'center'; ctx.textBaseline = 'bottom';
ctx.fillStyle = 'rgba(42,42,62,0.45)';
ctx.fillText('你在这里', p.x, p.y - r - 10);
}}
}
renderMinimap();
requestAnimationFrame(render);
}

function renderMinimap() {
var mw = 80, mh = 80;
mctx.clearRect(0, 0, mw, mh);
mctx.fillStyle = '#F5F0E8';
mctx.fillRect(0, 0, mw, mh);
var sx = mw/MW, sy = mh/MH;
// 边
mctx.strokeStyle = 'rgba(42,42,62,0.07)'; mctx.lineWidth = 0.3;
for (var ei = 0; ei < edges.length; ei++) {
mctx.beginPath();
mctx.moveTo(pts[edges[ei][0]].x*sx, pts[edges[ei][0]].y*sy);
mctx.lineTo(  pts[edges[ei][1]].x*sx, pts[edges[ei][1]].y*sy);
mctx.stroke();
}
// 节点
for (var i = 0; i < pts.length; i++) {
var n = nodes[i];
mctx.fillStyle = n.secluded ? 'rgba(42,42,62,0.1)' : n.visited ? COL[n.elem].c : 'rgba(42,42,62,0.1)';
mctx.beginPath(); mctx.arc(pts[i].x*sx, pts[i].y*sy, i===0?2.5:1, 0, Math.PI*2); mctx.fill();
}
// 视口框
var vpw = (W/zoom)*sx, vph = (H/zoom)*sy;
var vpx = ((viewX % MW)+MW)%MW*sx - vpw/2;
var vpy = ((viewY % MH)+MH)%MH*sy - vph/2;
mctx.strokeStyle = 'rgba(42,42,62,0.4)'; mctx.lineWidth = 0.8;
mctx.strokeRect(vpx, vpy, vpw, vph);
}

// ===== 信息卡 =====
function showInfo(idx) {
var n = nodes[idx];
document.getElementById('iAvatar').style.background = n.secluded ? 'rgba(42,42,62,0.06)' : COL[n.elem].c+'25';
document.getElementById('iAvatar').textContent = n.emoji;
document.getElementById('iName').textContent = n.name;
document.getElementById('iType').textContent = n.secluded ? '闭关中' : COL[n.elem].label;
document.getElementById('iType').style.color = COL[n.elem].c;
document.getElementById('iSec').style.display = n.secluded ? 'inline-block' : 'none';
// 五行条
var html = '';
for (var ki = 0; ki < KEYS.length; ki++) {
var k = KEYS[ki];
var val = n[k];
html += '<div class="bar-row"><div class="bar-label">'+CN[k]+'</div><div class="bar-track"><div class="bar-fill" style="width:'+val+'%;background:'+COL[k].c+'"></div></div><div class="bar-val">'+val+'</div></div>';
}
document.getElementById('iBars').innerHTML = html;
document.getElementById('iCol').textContent = n.col;
document.getElementById('iIgn').textContent = n.ign;
// 距离
var dx = pts[idx].x - pts[0].x, dy = pts[idx].y - pts[0].y;
if (dx > MW/2) dx -= MW; if (dx < -MW/2) dx += MW;
if (dy > MH/2) dy -= MH; if (dy < -MH/2) dy += MH;
document.getElementById('iDist').textContent = Math.round(Math.sqrt(dx*dx+dy*dy)/70)+'步';
// 按钮
var btn = document.getElementById('btnEnter');
if (n.secluded) { btn.classList.add('disabled'); btn.textContent = '闭关中，无法进入'; }
else { btn.classList.remove('disabled'); btn.textContent = '进 入 空 间'; }
document.getElementById('infoOverlay').classList.add('show');
}
function closeInfo() { document.getElementById('infoOverlay').classList.remove('show'); }
function enterSpace() { alert('进入空间（待实现）'); }

// 启动
render();
</script>
