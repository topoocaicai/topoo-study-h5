<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>TopSpace · 拓圈宇宙 · 觉醒纪元 v2</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
:root{--dark:#0B0F1E;--amber:#E8B44C;--amber-glow:rgba(232,180,76,.5);--fire:#D96B6B;--water:#4A9EB8;--wood:#A0B87A;--gold:#E8B44C;--earth:#9B7BBF;}
html,body{width:100%;height:100%;overflow:hidden;background:#000;touch-action:none;}
body{font-family:-apple-system,"PingFang SC","Helvetica Neue",sans-serif;-webkit-font-smoothing:antialiased;color:#fff;-webkit-user-select:none;user-select:none;}
#app{width:100vw;height:100vh;position:relative;overflow:hidden;background:#000;}

.starfield{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none;}
.star{position:absolute;border-radius:50%;background:#fff;animation:twinkle var(--d,3s) ease-in-out infinite alternate;opacity:0;}
@keyframes twinkle{0%{opacity:.03;transform:scale(.5)}100%{opacity:var(--o,.6);transform:scale(1.1)}}

.scene{position:absolute;top:0;left:0;width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity 1.2s cubic-bezier(.23,1,.32,1);z-index:1;padding:20px;}
.scene.active{opacity:1;pointer-events:auto;}

.act-title{position:fixed;top:env(safe-area-inset-top,20px);left:50%;transform:translateX(-50%);z-index:50;font-size:11px;color:rgba(255,255,255,.25);letter-spacing:3px;opacity:0;transition:opacity .8s;}
.act-title.show{opacity:1;}

.progress-bar{position:fixed;top:0;left:0;width:100%;height:2px;background:rgba(255,255,255,.05);z-index:60;}
.progress-fill{height:100%;width:0;background:linear-gradient(90deg,var(--amber),var(--fire));transition:width 1s ease;}

.chapter-screen{position:fixed;top:0;left:0;width:100%;height:100%;z-index:80;background:#000;display:flex;flex-direction:column;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .8s;}
.chapter-screen.show{opacity:1;pointer-events:auto;}
.chapter-num{font-size:12px;color:var(--amber);letter-spacing:4px;margin-bottom:16px;font-family:"SF Mono","Menlo",monospace;}
.chapter-name{font-size:28px;font-weight:200;color:#fff;letter-spacing:8px;margin-bottom:8px;}
.chapter-sub{font-size:11px;color:rgba(255,255,255,.2);letter-spacing:3px;}

.dialogue-area{position:absolute;bottom:10%;left:50%;transform:translateX(-50%);width:86vw;max-width:400px;max-height:55vh;overflow-y:auto;z-index:10;padding:8px;}
.dia-line{margin-bottom:16px;opacity:0;transform:translateY(12px);transition:all .6s cubic-bezier(.23,1,.32,1);}
.dia-line.show{opacity:1;transform:translateY(0);}
.dia-label{font-size:10px;color:var(--amber);letter-spacing:2px;margin-bottom:6px;font-family:"SF Mono","Menlo",monospace;}
.dia-text{font-size:14px;color:rgba(255,255,255,.85);line-height:1.8;letter-spacing:.3px;white-space:pre-wrap;}
.dia-text.user{color:rgba(245,240,232,.6);font-style:italic;border-left:2px solid rgba(232,180,76,.3);padding-left:12px;}

.touch-hint{position:fixed;bottom:8%;left:50%;transform:translateX(-50%);z-index:20;display:flex;align-items:center;gap:8px;opacity:0;transition:opacity .6s;}
.touch-hint.show{opacity:1;animation:hintFloat 2.5s ease infinite;}
@keyframes hintFloat{0%,100%{transform:translateX(-50%) translateY(0)}50%{transform:translateX(-50%) translateY(-6px)}}
.touch-hint-icon{opacity:.3;}
.touch-hint-text{font-size:11px;color:rgba(255,255,255,.2);letter-spacing:2px;}

.act-hook{position:absolute;bottom:18%;left:50%;transform:translateX(-50%);width:86vw;max-width:360px;text-align:center;z-index:15;opacity:0;transition:opacity 1s ease;}
.act-hook.show{opacity:1;}
.act-hook-tag{display:inline-block;font-size:9px;letter-spacing:3px;color:rgba(232,180,76,.8);margin-bottom:10px;font-family:"SF Mono","Menlo",monospace;}
.act-hook-line{width:24px;height:1px;background:rgba(232,180,76,.4);margin:0 auto 10px;}
.act-hook-text{font-size:13px;color:rgba(255,255,255,.85);line-height:1.9;letter-spacing:.5px;font-style:italic;}
.act-hook-text em{color:rgba(232,180,76,.95);font-style:normal;}

.visual-planet{position:absolute;bottom:-50px;left:50%;transform:translateX(-50%) scale(.15);width:200px;height:200px;background:radial-gradient(circle at 35% 35%,rgba(74,158,184,.3),rgba(11,15,30,.9) 70%);border-radius:50%;box-shadow:0 0 60px rgba(74,158,184,.15),inset 0 0 40px rgba(232,180,76,.05);opacity:0;transition:all 2.2s cubic-bezier(.23,1,.32,1);z-index:2;}
.visual-planet.show{bottom:15%;opacity:1;transform:translateX(-50%) scale(1);}

.visual-notebook{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%) scale(0) rotate(-6deg);width:120px;height:155px;background:linear-gradient(135deg,rgba(245,240,232,.12),rgba(245,240,232,.04));border:1px solid rgba(245,240,232,.1);border-radius:8px;opacity:0;transition:all 1.2s cubic-bezier(.34,1.56,.64,1);z-index:3;box-shadow:0 0 24px rgba(232,180,76,.2);}
.visual-notebook.show{opacity:1;transform:translate(-50%,-50%) scale(1) rotate(0);}

.visual-card{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%) scale(0);width:100px;height:140px;perspective:900px;opacity:0;transition:all 1s cubic-bezier(.34,1.56,.64,1);z-index:4;}
.visual-card.show{opacity:1;transform:translate(-50%,-50%) scale(1);}
.visual-card-inner{width:100%;height:100%;position:relative;transform-style:preserve-3d;transition:transform .7s ease;cursor:pointer;}
.visual-card-inner.flipped{transform:rotateY(180deg);}
.visual-card-face{position:absolute;width:100%;height:100%;backface-visibility:hidden;border-radius:10px;border:1px solid rgba(232,180,76,.2);display:flex;flex-direction:column;align-items:center;justify-content:center;}
.visual-card-back{transform:rotateY(180deg);background:rgba(232,180,76,.05);}

.visual-npc{position:absolute;bottom:25%;right:12%;opacity:0;transform:scale(0);transition:all 1.2s cubic-bezier(.34,1.56,.64,1);z-index:5;}
.visual-npc.show{opacity:1;transform:scale(1);}
.npc-body{width:60px;height:60px;border-radius:50%;background:linear-gradient(135deg,rgba(245,240,232,.15),rgba(245,240,232,.05));display:flex;align-items:center;justify-content:center;font-size:28px;box-shadow:0 0 30px rgba(232,180,76,.1);}
.npc-name{font-size:10px;color:rgba(255,255,255,.3);text-align:center;margin-top:6px;letter-spacing:2px;animation:npcBreathe 3s ease-in-out infinite;}
@keyframes npcBreathe{0%,100%{opacity:.3}50%{opacity:.6}}

.choice-area{position:absolute;bottom:15%;left:50%;transform:translateX(-50%);width:80vw;max-width:360px;z-index:20;display:flex;flex-direction:column;gap:10px;opacity:0;transition:opacity .8s;}
.choice-area.show{opacity:1;}
.choice-btn{padding:14px 20px;border-radius:12px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);color:rgba(255,255,255,.6);font-size:13px;letter-spacing:1px;cursor:pointer;transition:all .3s;text-align:center;}
.choice-btn.selected{background:rgba(232,180,76,.12);border-color:rgba(232,180,76,.3);color:var(--amber);}

.wuxing-row{display:flex;gap:10px;position:absolute;top:30%;opacity:0;transition:opacity 1.5s;}
.wuxing-row.show{opacity:1;}
.wx-item{width:52px;text-align:center;padding:10px 4px;border-radius:12px;border:1px solid rgba(255,255,255,.06);background:rgba(255,255,255,.02);}
.wx-icon{font-size:20px;margin-bottom:4px;}
.wx-label{font-size:10px;color:rgba(255,255,255,.4);}
.wx-name{font-size:8px;margin-top:2px;letter-spacing:1px;}

.collision-flash{position:fixed;top:0;left:0;width:100%;height:100%;z-index:90;background:radial-gradient(circle,rgba(232,180,76,.15),transparent 70%);opacity:0;pointer-events:none;transition:opacity .4s;}
.collision-flash.show{opacity:1;}

.finale-glow{position:absolute;top:30%;left:50%;transform:translate(-50%,-50%);width:300px;height:300px;border-radius:50%;background:radial-gradient(circle,rgba(232,180,76,.08) 0%,transparent 70%);animation:finalePulse 4s ease-in-out infinite;}
@keyframes finalePulse{0%,100%{transform:translate(-50%,-50%) scale(1);opacity:.5}50%{transform:translate(-50%,-50%) scale(1.3);opacity:1}}

.fall-particle{position:absolute;width:3px;height:3px;border-radius:50%;background:var(--amber);opacity:0;transition:all 1.5s cubic-bezier(.23,1,.32,1);z-index:3;}
</style>
</head>
<body>
<div id="app">
  <div class="starfield" id="starfield"></div>
  <div class="collision-flash" id="collisionFlash"></div>
  <div class="scene" id="sc-01"></div>
  <div class="scene" id="sc-02"></div>
  <div class="scene" id="sc-03"></div>
  <div class="scene" id="sc-04"></div>
  <div class="scene" id="sc-05"></div>
  <div class="scene" id="sc-06"></div>
  <div class="scene" id="sc-07"></div>
  <div class="scene" id="sc-08"></div>
  <div class="scene" id="sc-09"></div>
  <div class="scene" id="sc-10"></div>
  <div class="scene" id="sc-easter"></div>
  <div class="chapter-screen" id="chapterScreen">
    <div class="chapter-num" id="chNum"></div>
    <div class="chapter-name" id="chName"></div>
    <div class="chapter-sub" id="chSub"></div>
  </div>
  <div class="act-title" id="actTitle"></div>
  <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
</div>

<script>
/* ===== 星空 ===== */
(function(){
  var el=document.getElementById('starfield');
  for(var i=0;i<100;i++){
    var s=document.createElement('div');
    s.className='star';
    var maxO=(.2+Math.random()*.5).toFixed(2);
    s.style.cssText='left:'+(Math.random()*100)+'%;top:'+(Math.random()*100)+'%;width:'+(0.4+Math.random()*1.6)+'px;height:'+(0.4+Math.random()*1.6)+'px;--d:'+(2+Math.random()*5)+'s;--o:'+maxO+';animation-delay:'+(Math.random()*4)+'s;';
    el.appendChild(s);
  }
})();

/* ===== 音效 ===== */
var audioCtx=null;
function ensureAudio(){try{if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();if(audioCtx.state==='suspended')audioCtx.resume();}catch(e){}}
function playTone(freq,dur,type,vol){try{if(!audioCtx)return;var now=audioCtx.currentTime;var o=audioCtx.createOscillator();var g=audioCtx.createGain();o.type=type||'triangle';o.frequency.setValueAtTime(freq,now);g.gain.setValueAtTime(vol||.04,now);g.gain.exponentialRampToValueAtTime(.001,now+(dur||.1));o.connect(g);g.connect(audioCtx.destination);o.start(now);o.stop(now+(dur||.1));}catch(e){}}

/* ===== 打字机 ===== */
function typewriter(text,el,speed){
  return new Promise(function(resolve){
    el.textContent='';el.classList.remove('done');
    var i=0;
    function tick(){
      if(i<text.length){
        el.textContent+=text.charAt(i);i++;
        if(i%3===0)playTone(500+Math.random()*300,.03,'triangle',.02);
        setTimeout(tick,speed||90);
      }else{el.classList.add('done');resolve();}
    }
    tick();
  });
}

/* ===== 消息添加 ===== */
function addLine(label,text,isUser){
  return new Promise(function(resolve){
    var sc=document.querySelector('.scene.active');
    if(!sc){resolve();return;}
    var area=sc.querySelector('.dialogue-area');
    if(!area){area=document.createElement('div');area.className='dialogue-area';sc.appendChild(area);}
    var line=document.createElement('div');line.className='dia-line';
    if(label){var lbl=document.createElement('div');lbl.className='dia-label';lbl.textContent=label;line.appendChild(lbl);}
    var txt=document.createElement('div');txt.className='dia-text'+(isUser?' user':'');
    line.appendChild(txt);area.appendChild(line);area.scrollTop=area.scrollHeight;
    line.classList.add('show');
    typewriter(text,txt,85).then(function(){setTimeout(resolve,Math.max(text.length*85+800,1800));});
  });
}

/* ===== 场景切换 ===== */
function switchScene(id,duration){
  return new Promise(function(resolve){
    document.querySelectorAll('.scene').forEach(function(s){s.classList.remove('active');});
    var target=document.getElementById(id);
    if(target)target.classList.add('active');
    setTimeout(resolve,duration||1200);
  });
}

/* ===== 章节过渡 ===== */
function showChapter(num,name,sub){
  return new Promise(function(resolve){
    var cs=document.getElementById('chapterScreen');
    document.getElementById('chNum').textContent=num;
    document.getElementById('chName').textContent=name;
    document.getElementById('chSub').textContent=sub||'';
    cs.classList.add('show');
    setTimeout(function(){cs.classList.remove('show');setTimeout(resolve,600);},2200);
  });
}

/* ===== 进度 ===== */
function setProgress(pct){document.getElementById('progressFill').style.width=pct+'%';}
function setActTitle(t){var el=document.getElementById('actTitle');el.textContent=t;el.classList.add('show');}

/* ===== 碰撞闪光 ===== */
function flashCollision(){var el=document.getElementById('collisionFlash');el.classList.add('show');playTone(200,1.2,'sine',.08);setTimeout(function(){el.classList.remove('show');},800);}

/* ===== 视觉元素 ===== */
function addPlanet(sceneId){
  return new Promise(function(resolve){
    var sc=document.getElementById(sceneId);var p=document.createElement('div');p.className='visual-planet';
    sc.appendChild(p);setTimeout(function(){p.classList.add('show');setTimeout(resolve,2200);},100);
  });
}
function addNotebook(sceneId){
  return new Promise(function(resolve){
    var sc=document.getElementById(sceneId);var n=document.createElement('div');n.className='visual-notebook';
    sc.appendChild(n);setTimeout(function(){n.classList.add('show');playTone(800,.15,'sine',.05);setTimeout(resolve,1200);},100);
  });
}
function addCard(sceneId){
  return new Promise(function(resolve){
    var sc=document.getElementById(sceneId);var c=document.createElement('div');c.className='visual-card';
    c.innerHTML='<div class="visual-card-inner"><div class="visual-card-face visual-card-front"><div style="font-size:10px;color:rgba(232,180,76,.5);letter-spacing:2px">TOPSPACE</div><div style="font-size:20px;margin-top:8px">🌍</div><div style="font-size:8px;color:rgba(255,255,255,.3);margin-top:8px">你的星球</div></div><div class="visual-card-face visual-card-back"><div style="font-size:9px;color:rgba(232,180,76,.4);letter-spacing:1px">背面</div></div></div>';
    sc.appendChild(c);setTimeout(function(){c.classList.add('show');setTimeout(resolve,1000);},100);
  });
}
function addNpc(sceneId){
  return new Promise(function(resolve){
    var sc=document.getElementById(sceneId);var n=document.createElement('div');n.className='visual-npc';
    n.innerHTML='<div class="npc-body">🫧</div><div class="npc-name">噢</div>';
    sc.appendChild(n);setTimeout(function(){n.classList.add('show');setTimeout(resolve,1500);},100);
  });
}

/* ===== 选择交互 ===== */
function showChoices(sceneId,items){
  return new Promise(function(resolve){
    var sc=document.getElementById(sceneId);var ca=document.createElement('div');ca.className='choice-area';
    items.forEach(function(item){
      var btn=document.createElement('div');btn.className='choice-btn';btn.textContent=item;
      btn.addEventListener('click',function(){document.querySelectorAll('.choice-btn').forEach(function(b){b.classList.remove('selected');});btn.classList.add('selected');setTimeout(function(){resolve(item);},600);});
      ca.appendChild(btn);
    });
    sc.appendChild(ca);setTimeout(function(){ca.classList.add('show');},100);
  });
}

/* ===== 触摸提示 ===== */
function showHint(text){
  return new Promise(function(resolve){
    var sc=document.querySelector('.scene.active');
    if(!sc){resolve();return;}
    var h=document.createElement('div');h.className='touch-hint';
    h.innerHTML='<div class="touch-hint-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,.3)" stroke-width="1.5"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2z"/><path d="M8 12l3 3 5-6"/></svg></div><div class="touch-hint-text">'+text+'</div>';
    sc.appendChild(h);setTimeout(function(){h.classList.add('show');},100);
    function done(){h.remove();resolve();}
    document.addEventListener('click',done,{once:true});
    document.addEventListener('touchstart',done,{once:true});
  });
}

/* ===== 坠落粒子 ===== */
function fallParticles(){
  return new Promise(function(resolve){
    var sc=document.getElementById('sc-01');
    for(var i=0;i<8;i++){
      (function(idx){
        var p=document.createElement('div');p.className='fall-particle';
        p.style.left=(30+Math.random()*40)+'%';p.style.top='-10px';
        sc.appendChild(p);
        setTimeout(function(){p.style.transition='all '+(1.5+Math.random())+'s cubic-bezier(.23,1,.32,1)';p.style.top=(50+Math.random()*30)+'%';p.style.opacity='1';setTimeout(function(){p.style.opacity='0';},1000);},idx*200);
      })(i);
    }
    playTone(400,2,'sine',.06);setTimeout(resolve,3500);
  });
}

/* ===== 五行展示 ===== */
function showWuxing(){
  return new Promise(function(resolve){
    var sc=document.getElementById('sc-06');var row=document.createElement('div');row.className='wuxing-row';
    var items=[{icon:'🔥',label:'火',name:'聚集力',color:'#D96B6B'},{icon:'💧',label:'水',name:'渗透力',color:'#4A9EB8'},{icon:'🌱',label:'木',name:'生长力',color:'#A0B87A'},{icon:'⚙️',label:'金',name:'打磨力',color:'#E8B44C'},{icon:'🌍',label:'土',name:'承载力',color:'#9B7BBF'}];
    items.forEach(function(it){var d=document.createElement('div');d.className='wx-item';d.innerHTML='<div class="wx-icon">'+it.icon+'</div><div class="wx-label">'+it.label+'</div><div class="wx-name" style="color:'+it.color+'">'+it.name+'</div>';row.appendChild(d);});
    sc.appendChild(row);setTimeout(function(){row.classList.add('show');setTimeout(resolve,2500);},200);
  });
}

/* ===== 闪烁光芒 ===== */
function showRays(){
  return new Promise(function(resolve){
    var sc=document.getElementById('sc-09');var rz=document.createElement('div');
    rz.style.cssText='position:absolute;top:20%;left:50%;transform:translateX(-50%);width:2px;height:60px;background:linear-gradient(180deg,rgba(232,180,76,.6),transparent);opacity:0;transition:all 2s;z-index:3;';
    sc.appendChild(rz);setTimeout(function(){rz.classList.add('show');rz.style.height='200px';rz.style.width='3px';setTimeout(resolve,2000);},100);
  });
}

/* ===== 幕尾钩子 ===== */
function showHook(sceneId,tag,questions){
  return new Promise(function(resolve){
    var sc=document.getElementById(sceneId);
    var h=document.createElement('div');h.className='act-hook';
    var html='<div class="act-hook-tag">'+tag+'</div><div class="act-hook-line"></div><div class="act-hook-text">';
    if(Array.isArray(questions)){questions.forEach(function(q,i){if(i>0)html+='<br>';html+=q.replace(/"([^"]+)"/g,'<em>"$1"</em>');});}
    else{html+=questions.replace(/"([^"]+)"/g,'<em>"$1"</em>');}
    html+='</div>';h.innerHTML=html;sc.appendChild(h);
    setTimeout(function(){h.classList.add('show');playTone(600,.1,'sine',.02);setTimeout(resolve,2200);},200);
  });
}

/* ===== 彩蛋幕：偷看部落总部 ===== */
function easterEgg(){
  return switchScene('sc-easter',1000).then(function(){return addNpc('sc-easter');})
  .then(function(){return addLine('噢','（压低声音）那边那个最大的星球，就是部落总部。');})
  .then(function(){return addLine(null,'为什么要偷偷的？',true);})
  .then(function(){return addLine('噢','因为……我也不知道能不能进。反正我昨天是翻进来的。');})
  .then(function(){return addLine('噢','就是……绕了一圈没找到门，就钻进来了。');})
  .then(function(){return addLine('噢','（两人扒在一颗小卫星后面）你看——红色的，是市场中心。');})
  .then(function(){return addLine('噢','他们管外面的人怎么知道我们。品牌站、广播站、情报局、推广局。');})
  .then(function(){return addLine(null,'听着像一支军队。',true);})
  .then(function(){return addLine('噢','哈哈哈！他们的武器不是刀枪，是故事和创意。');})
  .then(function(){return addLine('噢','那个蓝色的，是内容中心。市场中心负责让别人看到我们，他们负责让别人觉得"哇"。');})
  .then(function(){return addLine('噢','金色的，商务中心。他们找到那些"有东西但没人看到"的人，还跟外面组织联手。');})
  .then(function(){return addLine('噢','绿色的，产品中心。技术部、AI研究院——他们研究怎么帮创造者做得更好。');})
  .then(function(){return addLine('噢','紫色的，体验中心。如果产品中心管"能不能用"，他们管"好不好玩"。');})
  .then(function(){return addLine('噢','中间最大的，就是部落总部。里面只有两个人——后勤站和账房。');})
  .then(function(){return addLine(null,'后勤和算账？',true);})
  .then(function(){return addLine('噢','对。后勤管所有鸡毛蒜皮的事，账房管钱。创造者负责创造，总得有人盯着账本。');})
  .then(function(){return addLine('系统','我管你们。');})
  .then(function(){return addLine('噢','你！！怎么——');})
  .then(function(){return addLine('系统','我什么都会。我一直都在。');})
  .then(function(){return addLine('系统','你们两个，偷看得还开心吗？');})
  .then(function(){return addLine('噢','（小声）还、还行。');})

/* ===== 启动 ===== */
var currentChapter=0;
var started=false;

function runChapter(idx){
  if(idx>=chapters.length){setProgress(100);setActTitle('【觉醒纪元 · 完】');return;}
  currentChapter=idx;
  setProgress(Math.round((idx+1)/chapters.length*100));
  var sceneId='sc-'+String(idx+1).padStart(2,'0');
  function afterChapter(){
    if(idx>=chapters.length-1){setProgress(100);setActTitle('【觉醒纪元 · 完】');return;}
    showHint('点击继续').then(function(){runChapter(idx+1);});
  }
  switchScene(sceneId,800).then(function(){return chapters[idx]();}).then(afterChapter);
}

// 启动遮罩
var startOverlay=document.createElement('div');
startOverlay.style.cssText='position:fixed;top:0;left:0;width:100%;height:100%;z-index:999;background:rgba(0,0,0,.85);display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;';
startOverlay.innerHTML='<div style="text-align:center;"><div style="font-size:24px;margin-bottom:12px;">🌌</div><div style="font-size:14px;color:rgba(232,180,76,.6);letter-spacing:3px;">拓圈宇宙 · 觉醒纪元</div><div style="font-size:11px;color:rgba(255,255,255,.2);margin-top:8px;letter-spacing:2px;">点击开始</div></div>';
startOverlay.addEventListener('click',function(){
  if(started)return;started=true;
  ensureAudio();
  startOverlay.style.transition='opacity .6s';
  startOverlay.style.opacity='0';
  setTimeout(function(){startOverlay.remove();runChapter(0);},600);
});
startOverlay.addEventListener('touchstart',function(e){
  if(started)return;started=true;
  ensureAudio();
  startOverlay.style.transition='opacity .6s';
  startOverlay.style.opacity='0';
  setTimeout(function(){startOverlay.remove();runChapter(0);},600);
});
document.body.appendChild(startOverlay);
</script>
