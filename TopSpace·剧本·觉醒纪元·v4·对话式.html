<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>TopSpace · 拓圈宇宙 · 觉醒纪元 v4</title>
<style>*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}:root{--dark:#0B0F1E;--amber:#E8B44C;--amber-glow:rgba(232,180,76,.35);--fire:#D96B6B;--water:#4A9EB8;--wood:#A0B87A;--gold:#E8B44C;--earth:#9B7BBF;--paper:#F5F0E8;}html,body{width:100%;height:100%;overflow:hidden;background:#000;}body{font-family:-apple-system,"PingFang SC","Helvetica Neue",sans-serif;-webkit-font-smoothing:antialiased;color:#fff;-webkit-user-select:none;user-select:none;touch-action:manipulation;}#app{width:100vw;height:100vh;position:relative;overflow:hidden;background:#000;}/* ===== 星空背景 ===== */
.starfield{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none;}.star{position:absolute;border-radius:50%;background:#fff;animation:twinkle var(--d,3s) ease-in-out infinite alternate;opacity:0;}@keyframes twinkle{0%{opacity:.03;transform:scale(.5)}100%{opacity:var(--o,.6);transform:scale(1.1)}}/* ===== 顶部栏 ===== */
.top-bar{position:fixed;top:0;left:0;right:0;z-index:60;padding:calc(env(safe-area-inset-top,12px) + 6px) 16px 8px;display:flex;align-items:center;justify-content:center;gap:8px;background:linear-gradient(180deg,rgba(11,15,30,.95) 0%,rgba(11,15,30,.7) 70%,transparent 100%);}.top-bar-title{font-size:12px;color:rgba(255,255,255,.5);letter-spacing:2px;}.top-bar-dot{width:6px;height:6px;border-radius:50%;background:rgba(232,180,76,.5);animation:dotPulse 2s ease-in-out infinite;}@keyframes dotPulse{0%,100%{opacity:.3;transform:scale(.8)}50%{opacity:1;transform:scale(1.2)}}/* ===== 进度条 ===== */
.progress-bar{position:fixed;top:0;left:0;width:100%;height:2px;background:rgba(255,255,255,.04);z-index:70;}.progress-fill{height:100%;width:0;background:linear-gradient(90deg,var(--amber),var(--fire));transition:width 1s ease;}/* ===== 聊天容器 ===== */
.chat-container{position:absolute;top:0;left:0;right:0;bottom:0;z-index:5;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;padding:calc(env(safe-area-inset-top,12px) + 40px) 12px 80px 12px;scroll-behavior:smooth;}.chat-container::-webkit-scrollbar{display:none;}/* ===== 章节分隔 ===== */
.chapter-divider{display:flex;align-items:center;justify-content:center;padding:24px 0 16px;opacity:0;transform:translateY(10px);transition:all .8s cubic-bezier(.23,1,.32,1);}.chapter-divider.show{opacity:1;transform:translateY(0);}.chapter-divider-line{flex:1;height:1px;background:linear-gradient(90deg,transparent,rgba(232,180,76,.2),transparent);}.chapter-divider-text{padding:0 16px;font-size:11px;color:var(--amber);letter-spacing:3px;font-family:"SF Mono","Menlo",monospace;white-space:nowrap;}/* ===== 聊天气泡 ===== */
.msg-row{display:flex;margin-bottom:12px;opacity:0;transform:translateY(16px);transition:all .5s cubic-bezier(.23,1,.32,1);}.msg-row.show{opacity:1;transform:translateY(0);}.msg-row.left{justify-content:flex-start;}.msg-row.right{justify-content:flex-end;}/* 头像+名字组 */
.msg-avatar-group{display:flex;flex-direction:column;align-items:center;flex-shrink:0;margin-right:8px;}.msg-row.right .msg-avatar-group{order:2;margin-right:0;margin-left:8px;}.msg-avatar{width:36px;height:36px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:14px;}.msg-row.left .msg-avatar{background:linear-gradient(135deg,rgba(232,180,76,.15),rgba(232,180,76,.05));border:1px solid rgba(232,180,76,.15);}.msg-row.right .msg-avatar{background:linear-gradient(135deg,rgba(74,158,184,.15),rgba(74,158,184,.05));border:1px solid rgba(74,158,184,.15);}/* 发送者名字（头像下方） */
.msg-sender{font-size:9px;color:rgba(255,255,255,.35);letter-spacing:1px;margin-top:3px;font-family:"SF Mono","Menlo",monospace;white-space:nowrap;}/* 气泡 */
.msg-bubble{max-width:75%;padding:10px 14px;border-radius:16px;font-size:14px;line-height:1.7;letter-spacing:.3px;position:relative;cursor:pointer;}.msg-row.left .msg-bubble{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.06);color:rgba(255,255,255,.88);border-top-left-radius:4px;}.msg-row.right .msg-bubble{background:rgba(232,180,76,.1);border:1px solid rgba(232,180,76,.12);color:rgba(245,240,232,.9);border-top-right-radius:4px;}/* 打字光标 */
.typing-cursor{display:inline-block;width:2px;height:14px;background:var(--amber);margin-left:2px;animation:cursorBlink .6s step-end infinite;vertical-align:middle;}@keyframes cursorBlink{0%,100%{opacity:1}50%{opacity:0}}.msg-bubble.done .typing-cursor{display:none;}/* 时间戳 */
.msg-time-row{text-align:center;padding:8px 0;opacity:0;transition:opacity .6s;}.msg-time-row.show{opacity:1;}.msg-time{font-size:10px;color:rgba(255,255,255,.15);letter-spacing:1px;}/* ===== 系统提示（居中） ===== */
.sys-msg{text-align:center;padding:12px 0;opacity:0;transform:translateY(10px);transition:all .6s cubic-bezier(.23,1,.32,1);}.sys-msg.show{opacity:1;transform:translateY(0);}.sys-msg-text{display:inline-block;padding:4px 14px;border-radius:10px;font-size:11px;color:rgba(255,255,255,.25);background:rgba(255,255,255,.03);letter-spacing:1px;}/* ===== 阶段性旁白（画外音） ===== */
.narration{text-align:center;padding:16px 20px;opacity:0;transform:translateY(10px);transition:all .8s cubic-bezier(.23,1,.32,1);}.narration.show{opacity:1;transform:translateY(0);}.narration-text{display:inline-block;padding:8px 16px;border-radius:10px;font-size:12px;color:rgba(232,180,76,.85);line-height:1.8;font-style:italic;letter-spacing:.5px;background:rgba(232,180,76,.08);border:1px solid rgba(232,180,76,.2);}/* ===== 视觉元素 ===== */
.visual-planet{display:flex;justify-content:center;padding:16px 0;opacity:0;transform:scale(.3);transition:all 1.5s cubic-bezier(.34,1.56,.64,1);}.visual-planet.show{opacity:1;transform:scale(1);}.planet-orb{width:80px;height:80px;border-radius:50%;background:radial-gradient(circle at 35% 35%,rgba(74,158,184,.4),rgba(11,15,30,.9) 70%);box-shadow:0 0 40px rgba(74,158,184,.2),inset 0 0 30px rgba(232,180,76,.05);}.visual-npc{display:flex;justify-content:center;padding:12px 0;opacity:0;transform:scale(0);transition:all 1s cubic-bezier(.34,1.56,.64,1);}.visual-npc.show{opacity:1;transform:scale(1);}.npc-body{width:50px;height:50px;border-radius:50%;background:linear-gradient(135deg,rgba(245,240,232,.15),rgba(245,240,232,.05));display:flex;align-items:center;justify-content:center;font-size:24px;box-shadow:0 0 24px rgba(232,180,76,.1);}.npc-name-tag{font-size:9px;color:rgba(255,255,255,.3);text-align:center;margin-top:4px;letter-spacing:2px;}/* ===== 视觉：笔记本 ===== */
.notebook-visual{width:100px;height:72px;border-radius:6px;background:linear-gradient(135deg,rgba(245,240,232,.08),rgba(245,240,232,.02));border:1px solid rgba(245,240,232,.1);position:relative;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 20px rgba(0,0,0,.3);margin:0 auto;}.notebook-visual::before{content:'';position:absolute;left:12px;top:0;bottom:0;width:1px;background:rgba(245,240,232,.08);}.notebook-visual::after{content:'📒';font-size:28px;}.notebook-label{position:absolute;bottom:-18px;width:100%;text-align:center;font-size:9px;color:rgba(255,255,255,.25);letter-spacing:1px;white-space:nowrap;}/* ===== 视觉：身份卡 ===== */
.idcard-visual{width:110px;height:68px;border-radius:8px;background:linear-gradient(135deg,rgba(232,180,76,.08),rgba(232,180,76,.02));border:1px solid rgba(232,180,76,.15);position:relative;display:flex;flex-direction:column;align-items:center;justify-content:center;box-shadow:0 4px 24px rgba(232,180,76,.06);margin:0 auto;}.idcard-visual::before{content:'拓圈宇宙';position:absolute;top:6px;font-size:7px;color:rgba(232,180,76,.3);letter-spacing:2px;}.idcard-visual::after{content:'身份卡';font-size:9px;color:rgba(232,180,76,.5);letter-spacing:2px;margin-top:6px;}.idcard-label{position:absolute;bottom:-18px;width:100%;text-align:center;font-size:9px;color:rgba(255,255,255,.25);letter-spacing:1px;white-space:nowrap;}/* ===== 选择按钮 ===== */
.choice-area{padding:8px 0;opacity:0;transform:translateY(10px);transition:all .6s;}.choice-area.show{opacity:1;transform:translateY(0);}.choice-btn{width:100%;padding:12px 16px;margin-bottom:8px;border-radius:12px;background:rgba(232,180,76,.06);border:1px solid rgba(232,180,76,.15);color:rgba(232,180,76,.8);font-size:13px;letter-spacing:1px;cursor:pointer;transition:all .3s;text-align:center;}.choice-btn:active{background:rgba(232,180,76,.15);transform:scale(.98);}/* ===== 钩子文字 ===== */
.hook-area{text-align:center;padding:20px 24px;opacity:0;transition:opacity 1s ease;}.hook-area.show{opacity:1;}.hook-tag{display:inline-block;font-size:9px;letter-spacing:3px;color:rgba(232,180,76,.6);margin-bottom:8px;font-family:"SF Mono","Menlo",monospace;}.hook-text{font-size:13px;color:rgba(255,255,255,.75);line-height:1.9;letter-spacing:.5px;font-style:italic;}.hook-text em{color:rgba(232,180,76,.9);font-style:normal;}/* ===== 底部提示 ===== */
.bottom-hint{position:fixed;bottom:0;left:0;right:0;z-index:20;text-align:center;padding:16px 0 calc(env(safe-area-inset-bottom,8px) + 12px);background:linear-gradient(0deg,rgba(11,15,30,.9) 0%,transparent 100%);opacity:0;transition:opacity .6s;pointer-events:none;}.bottom-hint.show{opacity:1;pointer-events:auto;}.bottom-hint-text{font-size:11px;color:rgba(255,255,255,.2);letter-spacing:2px;animation:hintFloat 2.5s ease infinite;}@keyframes hintFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)}}/* ===== 章节过渡屏 ===== */
.chapter-screen{position:fixed;top:0;left:0;width:100%;height:100%;z-index:80;background:rgba(0,0,0,.92);display:flex;flex-direction:column;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .8s;}.chapter-screen.show{opacity:1;pointer-events:auto;}.chapter-num{font-size:11px;color:var(--amber);letter-spacing:4px;margin-bottom:14px;font-family:"SF Mono","Menlo",monospace;opacity:.6;}.chapter-name{font-size:26px;font-weight:200;color:#fff;letter-spacing:8px;margin-bottom:8px;}.chapter-sub{font-size:10px;color:rgba(255,255,255,.2);letter-spacing:3px;}/* ===== 五行展示 ===== */
.wuxing-row{display:flex;gap:8px;justify-content:center;padding:16px 0;opacity:0;transition:opacity 1.5s;flex-wrap:wrap;}.wuxing-row.show{opacity:1;}.wx-item{width:56px;text-align:center;padding:10px 4px;border-radius:12px;border:1px solid rgba(255,255,255,.06);background:rgba(255,255,255,.02);}.wx-icon{font-size:20px;margin-bottom:4px;}.wx-label{font-size:10px;color:rgba(255,255,255,.4);}.wx-name{font-size:8px;margin-top:2px;letter-spacing:1px;}/* ===== 碰撞闪光 ===== */
.collision-flash{position:fixed;top:0;left:0;width:100%;height:100%;z-index:90;background:radial-gradient(circle,rgba(232,180,76,.15),transparent 70%);opacity:0;pointer-events:none;transition:opacity .4s;}.collision-flash.show{opacity:1;}/* ===== 终章光芒 ===== */
.finale-glow{width:200px;height:200px;border-radius:50%;background:radial-gradient(circle,rgba(232,180,76,.08) 0%,transparent 70%);animation:finalePulse 4s ease-in-out infinite;margin:16px auto;}@keyframes finalePulse{0%,100%{transform:scale(1);opacity:.5}50%{transform:scale(1.3);opacity:1}}/* ===== CTA按钮 ===== */
.cta-btn{display:block;margin:20px auto;padding:14px 32px;border-radius:30px;background:rgba(232,180,76,.1);border:1px solid rgba(232,180,76,.25);color:var(--amber);font-size:14px;letter-spacing:3px;cursor:pointer;opacity:0;transition:all .8s;text-align:center;}.cta-btn.show{opacity:1;}.cta-btn:active{transform:scale(.96);background:rgba(232,180,76,.18);}/* ===== 纸条 ===== */
.note-card{max-width:280px;margin:16px auto;padding:20px;background:rgba(245,240,232,.06);border:1px solid rgba(245,240,232,.08);border-radius:4px;opacity:0;transform:scale(.8) rotate(-2deg);transition:all 1s cubic-bezier(.34,1.56,.64,1);}.note-card.show{opacity:1;transform:scale(1) rotate(0);}.note-card-text{font-size:13px;color:rgba(245,240,232,.7);line-height:2;font-style:italic;text-align:center;letter-spacing:.5px;}</style>
</head>
<body>
<div id="app"> <div class="starfield" id="starfield"></div> <div class="collision-flash" id="collisionFlash"></div> <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div> <div class="top-bar" id="topBar" style="opacity:0;transition:opacity 1s;"> <div class="top-bar-dot"></div> <div class="top-bar-title" id="topBarTitle">拓圈宇宙</div> <div class="top-bar-dot"></div> </div> <div class="chat-container" id="chatContainer"></div> <div class="bottom-hint" id="bottomHint"> <div class="bottom-hint-text">点击可加速对话</div> </div> <div class="chapter-screen" id="chapterScreen"> <div class="chapter-num" id="chNum"></div> <div class="chapter-name" id="chName"></div> <div class="chapter-sub" id="chSub"></div> </div>
</div> <script>/* ===== 星空 ===== */
(function(){var el=document.getElementById('starfield');for(var i=0;i<80;i++){var s=document.createElement('div');s.className='star';var maxO=(.15+Math.random()*.4).toFixed(2);s.style.cssText='left:'+(Math.random()*100)+'%;top:'+(Math.random()*100)+'%;width:'+(0.4+Math.random()*1.4)+'px;height:'+(0.4+Math.random()*1.4)+'px;--d:'+(2+Math.random()*5)+'s;--o:'+maxO+';animation-delay:'+(Math.random()*4)+'s;';el.appendChild(s);}})();/* ===== 音效 ===== */
var audioCtx=null;function ensureAudio(){try{if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();if(audioCtx.state==='suspended')audioCtx.resume();}catch(e){}}function playTone(freq,dur,type,vol){try{if(!audioCtx)return;var now=audioCtx.currentTime;var o=audioCtx.createOscillator();var g=audioCtx.createGain();o.type=type||'triangle';o.frequency.setValueAtTime(freq,now);g.gain.setValueAtTime(vol||.03,now);g.gain.exponentialRampToValueAtTime(.001,now+(dur||.1));o.connect(g);g.connect(audioCtx.destination);o.start(now);o.stop(now+(dur||.1));}catch(e){}}/* ===== 工具函数 ===== */
function sleep(ms){return new Promise(function(r){setTimeout(r,ms);});}function $(sel){return document.querySelector(sel);}/* ===== 聊天容器操作 ===== */
var chatEl=$('#chatContainer');function scrollBottom(){chatEl.scrollTop=chatEl.scrollHeight;}/* ===== 打字机气泡（核心） ===== */
function addChatBubble(speaker,text,isUser,avatar){return new Promise(function(resolve){var row=document.createElement('div');row.className='msg-row '+(isUser?'right':'left');var avGroup=document.createElement('div');avGroup.className='msg-avatar-group';var av=document.createElement('div');av.className='msg-avatar';av.textContent=avatar||(isUser?'✦':'⚡');avGroup.appendChild(av);if(speaker){var sender=document.createElement('div');sender.className='msg-sender';sender.textContent=speaker;avGroup.appendChild(sender);}var bubble=document.createElement('div');bubble.className='msg-bubble';var cursor=document.createElement('span');cursor.className='typing-cursor';var charIdx=0;var typing=true;var done=false;function skipType(){if(done)return;bubble.textContent=text;done=true;typing=false;cursor.remove();bubble.classList.add('done');row.classList.add('show');scrollBottom();setTimeout(resolve,600);}bubble.addEventListener('click',skipType);row.addEventListener('click',skipType);function tick(){if(!typing)return;if(charIdx<text.length){bubble.textContent=text.substring(0,charIdx+1);charIdx++;if(charIdx%3===0)playTone(400+Math.random()*200,.02,'triangle',.01);scrollBottom();setTimeout(tick,50+Math.random()*40);}else{done=true;typing=false;cursor.remove();bubble.classList.add('done');setTimeout(resolve,400);}}bubble.appendChild(cursor);row.appendChild(avGroup);row.appendChild(bubble);chatEl.appendChild(row);requestAnimationFrame(function(){row.classList.add('show');scrollBottom();});setTimeout(tick,300);});}/* ===== 系统消息（居中） ===== */
function addSysMsg(text){return new Promise(function(resolve){var el=document.createElement('div');el.className='sys-msg';el.innerHTML='<div class="sys-msg-text">'+text+'</div>';chatEl.appendChild(el);requestAnimationFrame(function(){el.classList.add('show');scrollBottom();});setTimeout(resolve,600);});}/* ===== 旁白 ===== */
function addNarration(text){return new Promise(function(resolve){var el=document.createElement('div');el.className='narration';el.innerHTML='<div class="narration-text">'+text+'</div>';chatEl.appendChild(el);requestAnimationFrame(function(){el.classList.add('show');scrollBottom();});setTimeout(resolve,800);});}/* ===== 章节分隔线 ===== */
function addChapterDivider(text){return new Promise(function(resolve){var el=document.createElement('div');el.className='chapter-divider';el.innerHTML='<div class="chapter-divider-line"></div><div class="chapter-divider-text">'+text+'</div><div class="chapter-divider-line"></div>';chatEl.appendChild(el);requestAnimationFrame(function(){el.classList.add('show');scrollBottom();});setTimeout(resolve,600);});}/* ===== 视觉元素 ===== */
function addPlanetVisual(){return new Promise(function(resolve){var el=document.createElement('div');el.className='visual-planet';el.innerHTML='<div class="planet-orb"></div>';chatEl.appendChild(el);requestAnimationFrame(function(){el.classList.add('show');scrollBottom();});playTone(600,.2,'sine',.04);setTimeout(resolve,1500);});}function addNpcVisual(){return new Promise(function(resolve){var el=document.createElement('div');el.className='visual-npc';el.innerHTML='<div><div class="npc-body">🫧</div><div class="npc-name-tag">噢</div></div>';chatEl.appendChild(el);requestAnimationFrame(function(){el.classList.add('show');scrollBottom();});setTimeout(resolve,1200);});}/* ===== 视觉：笔记本 ===== */
function addNotebookVisual(){return new Promise(function(resolve){var el=document.createElement('div');el.className='visual-planet';el.innerHTML='<div><div class="notebook-visual"></div><div class="notebook-label">笔记本</div></div>';chatEl.appendChild(el);requestAnimationFrame(function(){el.classList.add('show');scrollBottom();});playTone(500,.15,'sine',.03);setTimeout(resolve,1500);});}/* ===== 视觉：身份卡 ===== */
function addIdCardVisual(){return new Promise(function(resolve){var el=document.createElement('div');el.className='visual-planet';el.innerHTML='<div><div class="idcard-visual"></div><div class="idcard-label">身份卡</div></div>';chatEl.appendChild(el);requestAnimationFrame(function(){el.classList.add('show');scrollBottom();});playTone(700,.15,'sine',.03);setTimeout(resolve,1500);});}/* ===== 选择 ===== */
function showChoice(items){return new Promise(function(resolve){var area=document.createElement('div');area.className='choice-area';items.forEach(function(item){var btn=document.createElement('div');btn.className='choice-btn';btn.textContent=item;btn.addEventListener('click',function(){document.querySelectorAll('.choice-btn').forEach(function(b){b.style.opacity='.3';b.style.pointerEvents='none';});btn.style.background='rgba(232,180,76,.15)';btn.style.borderColor='rgba(232,180,76,.3)';setTimeout(function(){area.remove();resolve(item);},500);});area.appendChild(btn);});chatEl.appendChild(area);requestAnimationFrame(function(){area.classList.add('show');scrollBottom();});});}/* ===== 钩子 ===== */
function addHook(tag,html){return new Promise(function(resolve){var el=document.createElement('div');el.className='hook-area';el.innerHTML='<div class="hook-tag">'+tag+'</div><div class="hook-text">'+html+'</div>';chatEl.appendChild(el);setTimeout(function(){el.classList.add('show');scrollBottom();playTone(500,.15,'sine',.02);setTimeout(resolve,2000);},200);});}/* ===== 章节过渡屏 ===== */
function showChapterScreen(num,name,sub){return new Promise(function(resolve){var cs=$('#chapterScreen');$('#chNum').textContent=num;$('#chName').textContent=name;$('#chSub').textContent=sub||'';cs.classList.add('show');setTimeout(function(){cs.classList.remove('show');setTimeout(resolve,600);},2000);});}/* ===== 五行 ===== */
function showWuxing(){return new Promise(function(resolve){var el=document.createElement('div');el.className='wuxing-row';var items=[{icon:'🔥',label:'火',name:'聚集力',color:'#D96B6B'},{icon:'💧',label:'水',name:'渗透力',color:'#4A9EB8'},{icon:'🌱',label:'木',name:'生长力',color:'#A0B87A'},{icon:'⚙️',label:'金',name:'打磨力',color:'#E8B44C'},{icon:'🌍',label:'土',name:'承载力',color:'#9B7BBF'}];items.forEach(function(it){var d=document.createElement('div');d.className='wx-item';d.innerHTML='<div class="wx-icon">'+it.icon+'</div><div class="wx-label">'+it.label+'</div><div class="wx-name" style="color:'+it.color+'">'+it.name+'</div>';el.appendChild(d);});chatEl.appendChild(el);setTimeout(function(){el.classList.add('show');scrollBottom();setTimeout(resolve,2500);},200);});}/* ===== 碰撞闪光 ===== */
function flashCollision(){var el=$('#collisionFlash');el.classList.add('show');playTone(200,1,'sine',.06);setTimeout(function(){el.classList.remove('show');},800);}/* ===== 纸条 ===== */
function addNoteCard(text){return new Promise(function(resolve){var el=document.createElement('div');el.className='note-card';el.innerHTML='<div class="note-card-text">'+text+'</div>';chatEl.appendChild(el);setTimeout(function(){el.classList.add('show');scrollBottom();playTone(800,.1,'sine',.03);setTimeout(resolve,2000);},200);});}/* ===== 底部提示 ===== */
var hintShown=false;function showBottomHint(show){var h=$('#bottomHint');if(show&&!hintShown){h.classList.add('show');hintShown=true;setTimeout(function(){h.classList.remove('show');},4000);}}/* ===== 进度 & 标题 ===== */
